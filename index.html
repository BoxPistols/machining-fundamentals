// =============================================================================
// IndexedDB 音声キャッシュ
// =============================================================================
// キー形式: provider + ':' + voice_id + ':' + rate + ':' + hash(text)
// 値: { blob: Blob, createdAt: number, size: number }

const cacheDB = {
  db: null,
  DB_NAME: 'cfd-tts-cache',
  STORE: 'audio',
  VERSION: 1,
};

async function openCacheDB() {
  if (cacheDB.db) return cacheDB.db;
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(cacheDB.DB_NAME, cacheDB.VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(cacheDB.STORE)) {
        const store = db.createObjectStore(cacheDB.STORE, { keyPath: 'key' });
        store.createIndex('createdAt', 'createdAt');
      }
    };
    req.onsuccess = (e) => {
      cacheDB.db = e.target.result;
      resolve(cacheDB.db);
    };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function cacheGet(key) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readonly');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function cachePut(key, blob) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readwrite');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.put({ key, blob, createdAt: Date.now(), size: blob.size });
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function cacheStats() {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readonly');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.getAll();
      req.onsuccess = () => {
        const all = req.result || [];
        const total = all.reduce((a, b) => a + (b.size || 0), 0);
        resolve({ count: all.length, bytes: total });
      };
      req.onerror = () => resolve({ count: 0, bytes: 0 });
    });
  } catch { return { count: 0, bytes: 0 }; }
}

async function cacheClear() {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readwrite');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.clear();
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

// 簡易ハッシュ（キャッシュキー用）
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return h.toString(36);
}

// =============================================================================
// TTSプロバイダー抽象化
// =============================================================================

// 各プロバイダーは以下のインターフェースを実装:
//   id: 識別子
//   label: 表示名
//   requiresApiKey: bool
//   isConfigured(): bool
//   getVoices(): [{id, label, lang}]
//   synthesize(text, opts): Promise<Blob>  // opts: {voiceId, rate, lang}
//   （Web Speech API のみ）speak(text, opts, utterHandlers): SpeechSynthesisUtterance

const providers = {
  // ----- ブラウザ内蔵（Web Speech API） -----
  browser: {
    id: 'browser',
    label: 'ブラウザ内蔵（無料）',
    requiresApiKey: false,
    isConfigured: () => 'speechSynthesis' in window,
    getVoices() {
      if (!('speechSynthesis' in window)) return [];
      return window.speechSynthesis.getVoices()
        .filter(v => v.lang && (v.lang.startsWith('ja') || v.lang.startsWith('en')))
        .sort((a, b) => {
          const aJa = a.lang.startsWith('ja') ? 0 : 1;
          const bJa = b.lang.startsWith('ja') ? 0 : 1;
          return aJa - bJa;
        })
        .map(v => ({ id: v.voiceURI, label: `${v.name} (${v.lang})`, lang: v.lang, _raw: v }));
    },
    // browserプロバイダーはsynthesize不要（Web Speech APIで直接speakする）
    synthesize: null,
  },

  // ----- xAI Grok TTS -----
  // 2モード: BYOK (自分の xAI キー) / Shared (プロキシ側の共有キー、1日N回制限)
  grok: {
    id: 'grok',
    label: 'xAI Grok TTS（$4.20/1M文字）',
    requiresApiKey: false, // プロキシが共有キーを持っていれば鍵なしでも動く
    isConfigured: () => !!apiConfig.grokProxyUrl,
    getVoices() {
      return [
        { id: 'ara', label: 'Ara（温かく親しみやすい）', lang: 'ja' },
        { id: 'eve', label: 'Eve（エネルギッシュ）', lang: 'ja' },
        { id: 'leo', label: 'Leo（権威的・力強い）', lang: 'ja' },
        { id: 'rex', label: 'Rex（自信・プロフェッショナル）', lang: 'ja' },
        { id: 'sal', label: 'Sal（滑らか・汎用）', lang: 'ja' },
      ];
    },
    async synthesize(text, opts) {
      if (!apiConfig.grokProxyUrl) {
        throw new Error('Grok プロキシ URL が未設定です。[設定]から登録してください。');
      }
      const voiceId = opts.voiceId || 'ara';
      const proxyUrl = apiConfig.grokProxyUrl.replace(/\/+$/, '');
      const endpoint = `${proxyUrl}/v1/tts`;
      const headers = { 'Content-Type': 'application/json' };
      // BYOK: キーがあれば送る (→ Worker 側で無制限モードになる)
      if (apiConfig.grokKey) {
        headers['Authorization'] = `Bearer ${apiConfig.grokKey}`;
      }
      if (apiConfig.grokProxySecret) {
        headers['X-Proxy-Secret'] = apiConfig.grokProxySecret;
      }
      const res = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          text,
          voice_id: voiceId,
          language: opts.lang || 'ja',
          output_format: { codec: 'mp3', sample_rate: 24000, bit_rate: 128000 },
        }),
      });
      // レート制限ヘッダ取得 (Shared モードのみ付与される)
      apiConfig.lastRateLimit = extractRateLimit(res);
      if (!res.ok) {
        throw buildGrokError(res);
      }
      return await res.blob();
    },
  },
};

function getActiveProvider() {

// テキスト正規化：HTMLタグ除去、記号整形、読み上げに不要な文字を削除
function normalizeForSpeech(text) {
  if (!text) return '';
  // HTMLタグ除去
  let t = text.replace(/<[^>]+>/g, ' ');
  // HTMLエンティティ
  t = t.replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&')
       .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
       .replace(/&quot;/g, '"').replace(/&#39;/g, "'");
  // 読み上げに邪魔な記号（複数連続スペース・改行）
  t = t.replace(/\s+/g, ' ').trim();
  // 一部の記号を読みやすく置換
  t = t.replace(/・/g, '、');
  t = t.replace(/＝|=/g, 'イコール');
  t = t.replace(/→/g, '、');
  t = t.replace(/〜|～/g, 'から');
  t = t.replace(/★/g, '');
  // 長すぎる文字列は区切る
  return t;
}

// 章のテキストをキュー化（セクション単位）
function buildQueue(ch) {
  const q = [];
  if (voice.mode === 'summary') {
    // 要約モード：voiceSummary 1本
    if (ch.voiceSummary) {
      q.push({
        text: normalizeForSpeech(ch.voiceSummary),
        sectionIdx: -1,  // 全体
      });
    }
  } else {
    // 全文モード：導入＋各セクション (block 単位で natural highlight 可能に)
    q.push({ text: normalizeForSpeech(ch.title + '。' + ch.lead), sectionIdx: -1 });
    ch.sections.forEach((s, i) => {
      // セクション見出しを単独 item として先に push (heading にスポット highlight)
      q.push({
        text: normalizeForSpeech(s.heading),
        sectionIdx: i,
        blockIdx: -1,
        isFirstOfSection: true,
      });
      // セクション本文をブロック単位で分割。
      // renderChapter 後の DOM があれば優先 (data-voice-block-id がついている)、
      // 無ければ HTML 文字列を fallback で文単位 split。
      const container = document.querySelector(`[data-voice-content="${i}"]`);
      if (container && container.children.length > 0) {
        let blockIdx = 0;
        for (const child of container.children) {
          if (!child.hasAttribute('data-voice-block-id')) continue;
          const blockText = normalizeForSpeech(child.outerHTML);
          if (!blockText.trim()) continue;
          // 長いブロックは Chrome speechSynthesis 対策で文単位 sub-split
          const chunks = splitLongText(blockText, 180);
          chunks.forEach((chunk, subIdx) => {
            q.push({
              text: chunk,
              sectionIdx: i,
              blockIdx,
              subIdx,
              isFirstOfSection: false,
            });
          });
          blockIdx++;
        }
      } else {
        // fallback: DOM 未レンダリング時 (旧挙動互換)
        const body = normalizeForSpeech(s.html);
        const chunks = splitLongText(body, 180);
        chunks.forEach((chunk, j) => {
          q.push({
            text: chunk,
            sectionIdx: i,
            blockIdx: 0,
            subIdx: j,
            isFirstOfSection: false,
          });
        });
      }
    });
  }
  return q;
}

function splitLongText(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const result = [];
  const sentences = text.split(/(?<=[。！？])/);
  let buffer = '';
  for (const s of sentences) {
    if ((buffer + s).length <= maxLen) {
      buffer += s;
    } else {
      if (buffer) result.push(buffer);
      buffer = s;
    }
  }
  if (buffer) result.push(buffer);
  return result.length > 0 ? result : [text];
}

// 現在の HTML5 Audio を停止し、Blob URL を解放する。
// playSynthesized() の ended/error リスナーも同じ URL を revoke するが、
// pause 経由の停止 (jumpToChunk / restartCurrentIfPlaying / stopSpeech) では
// ended が発火しないため、明示的に解放する必要がある。
// URL.revokeObjectURL は冪等なので二重呼び出しは安全。
function disposeCurrentAudio() {
  if (!voice.currentAudio) return;
  try { voice.currentAudio.pause(); } catch {}
  try {
    const src = voice.currentAudio.src;
    if (src && src.startsWith('blob:')) URL.revokeObjectURL(src);
  } catch {}
  try { voice.currentAudio.src = ''; } catch {}
  voice.currentAudio = null;
}

function stopSpeech() {
  // 中断フラグを立てて、onend/onerrorで次に進まないようにする
  if (voice.markInterrupted) voice.markInterrupted();

  // Web Speech API の停止
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  // HTML5 Audio の停止 (Blob URL も解放)
  disposeCurrentAudio();
  // synthesize中のfetchを中断
  if (voice.currentSynthAbort) {
    try { voice.currentSynthAbort.abort(); } catch {}
    voice.currentSynthAbort = null;
  }

  voice.queue = [];
  voice.currentIdx = -1;
  voice.playing = false;
  voice.currentUtterance = null;
  voice.markInterrupted = null;
  updateVoiceUI();
  // ハイライト解除 (セクション + ブロックの両方)
  document.querySelectorAll('[data-voice-current]').forEach(el => {
    el.removeAttribute('data-voice-current');
  });
  document.querySelectorAll('.voice-block-current').forEach(el => {
    el.classList.remove('voice-block-current');
  });
}

function playQueue() {
  if (voice.queue.length === 0) return;
  voice.currentIdx++;
  speakCurrent();
}

// 対話型ビジュアライザー: ch3 切削3要素 → MRR + Pc + n のリアルタイム表示
// XSS 回避のため innerHTML は使わず createElement のみ
function buildMrrVisualizer(container) {
  // 既存内容を破棄
  while (container.firstChild) container.removeChild(container.firstChild);

  const root = document.createElement('div');
  root.className = 'viz-mrr';

  const heading = document.createElement('h4');
  heading.textContent = '切削3要素 → MRR / 切削動力 / 主軸回転数';
  root.appendChild(heading);

  // sliders
  const sliders = document.createElement('div');
  sliders.className = 'sliders';
  const params = [
    { id: 'vc',  label: 'Vc',  min: 50,   max: 400, step: 10,   def: 200, unit: 'm/min' },
    { id: 'f',   label: 'f',   min: 0.05, max: 0.6, step: 0.01, def: 0.3, unit: 'mm/rev', precision: 2 },
    { id: 'ap',  label: 'ap',  min: 0.5,  max: 6.0, step: 0.1,  def: 2.0, unit: 'mm', precision: 1 },
  ];
  const inputs = {};
  const valueEls = {};
  for (const p of params) {
    const row = document.createElement('div');
    row.className = 'row';
    const lbl = document.createElement('label');
    lbl.textContent = p.label;
    const input = document.createElement('input');
    input.type = 'range';
    input.min = p.min; input.max = p.max; input.step = p.step; input.value = p.def;
    const val = document.createElement('div');
    val.className = 'value';
    inputs[p.id] = input;
    valueEls[p.id] = { el: val, p };
    row.appendChild(lbl); row.appendChild(input); row.appendChild(val);
    sliders.appendChild(row);
  }
  root.appendChild(sliders);

  // results
  const results = document.createElement('div');
  results.className = 'results';
  const resultDefs = [
    { id: 'n',   label: 'n (主軸回転数)', unit: 'rpm' },
    { id: 'mrr', label: 'MRR',           unit: 'cm³/min' },
    { id: 'pc',  label: 'Pc (概算動力)',  unit: 'kW' },
  ];
  const resultEls = {};
  for (const r of resultDefs) {
    const card = document.createElement('div');
    card.className = 'result-card';
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = r.label;
    const num = document.createElement('div');
    num.className = 'num';
    const numVal = document.createTextNode('—');
    const unit = document.createElement('span');
    unit.className = 'unit';
    unit.textContent = ' ' + r.unit;
    num.appendChild(numVal);
    num.appendChild(unit);
    card.appendChild(lbl);
    card.appendChild(num);
    resultEls[r.id] = numVal;
    results.appendChild(card);
  }
  root.appendChild(results);

  // SVG bar chart (Vc/f/ap/MRR の相対比、最大値を 100% で正規化)
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', '0 0 400 100');
  svg.setAttribute('class', 'bar-svg');
  svg.setAttribute('aria-label', 'パラメータ相対比較バー');
  const barLabels = ['Vc', 'f', 'ap', 'MRR'];
  const bars = {};
  const labels = {};
  for (let i = 0; i < barLabels.length; i++) {
    const yBase = 20 + i * 20;
    const lblText = document.createElementNS(svgNS, 'text');
    lblText.setAttribute('x', '0'); lblText.setAttribute('y', yBase + 4);
    lblText.setAttribute('font-family', 'JetBrains Mono, monospace');
    lblText.setAttribute('font-size', '10');
    lblText.setAttribute('fill', 'var(--text-2)');
    lblText.textContent = barLabels[i];
    svg.appendChild(lblText);

    const trk = document.createElementNS(svgNS, 'rect');
    trk.setAttribute('x', '40'); trk.setAttribute('y', yBase - 6);
    trk.setAttribute('width', '320'); trk.setAttribute('height', '12');
    trk.setAttribute('fill', 'var(--bg-1)'); trk.setAttribute('rx', '2');
    svg.appendChild(trk);

    const bar = document.createElementNS(svgNS, 'rect');
    bar.setAttribute('x', '40'); bar.setAttribute('y', yBase - 6);
    bar.setAttribute('width', '0'); bar.setAttribute('height', '12');
    bar.setAttribute('fill', 'var(--accent)'); bar.setAttribute('rx', '2');
    svg.appendChild(bar);
    bars[barLabels[i]] = bar;

    const valLbl = document.createElementNS(svgNS, 'text');
    valLbl.setAttribute('x', '370'); valLbl.setAttribute('y', yBase + 4);
    valLbl.setAttribute('font-family', 'JetBrains Mono, monospace');
    valLbl.setAttribute('font-size', '10');
    valLbl.setAttribute('fill', 'var(--text-1)');
    valLbl.setAttribute('text-anchor', 'end');
    valLbl.textContent = '0';
    svg.appendChild(valLbl);
    labels[barLabels[i]] = valLbl;
  }
  root.appendChild(svg);

  container.appendChild(root);

  // 計算式
  // n   = 1000·Vc / (π·D)        [rpm]   D=50 mm 固定
  // MRR = Vc·f·ap                [cm³/min]  (mm·mm/rev·m/min → /1000 で cm³/min)
  // Pc  = Kc·f·ap·Vc / 60000     [kW]    Kc=2100 N/mm² (S45C 想定)
  const D = 50;       // 工具径 mm (固定)
  const Kc = 2100;    // N/mm² (S45C)
  function recompute() {
    const Vc = parseFloat(inputs.vc.value);
    const f  = parseFloat(inputs.f.value);
    const ap = parseFloat(inputs.ap.value);
    // value 表示
    valueEls.vc.el.textContent = `${Vc.toFixed(0)} ${valueEls.vc.p.unit}`;
    valueEls.f.el.textContent  = `${f.toFixed(2)} ${valueEls.f.p.unit}`;
    valueEls.ap.el.textContent = `${ap.toFixed(1)} ${valueEls.ap.p.unit}`;
    // results
    const n   = 1000 * Vc / (Math.PI * D);
    const mrr = Vc * f * ap;       // m/min × mm × mm = cm³/min (∵ 1 m × 1 mm² = 1 cm³)
    const pc  = (Kc * f * ap * Vc) / 60000;
    resultEls.n.nodeValue   = n.toFixed(0);
    resultEls.mrr.nodeValue = mrr.toFixed(1);
    resultEls.pc.nodeValue  = pc.toFixed(2);
    // bars (各最大値で 0-100% 正規化)
    const maxes = { Vc: 400, f: 0.6, ap: 6.0, MRR: 1500 };
    const vals  = { Vc, f, ap, MRR: mrr };
    for (const k of Object.keys(maxes)) {
      const w = Math.min(320, (vals[k] / maxes[k]) * 320);
      bars[k].setAttribute('width', String(w));
      labels[k].textContent = (k === 'f') ? vals[k].toFixed(2) :
                              (k === 'ap') ? vals[k].toFixed(1) :
                              vals[k].toFixed(k === 'MRR' ? 1 : 0);
    }
  }
  for (const id of Object.keys(inputs)) {
    inputs[id].addEventListener('input', recompute);
  }
  recompute();
}

// === ch6: Kienzle 主分力 Fc + 概算動力 Pc ===
// Fc = Kc · h^(1−mc) · b、 Pc = Fc·Vc / 60000  (Vc=200 m/min 固定)
function buildKienzleVisualizer(container) {
  while (container.firstChild) container.removeChild(container.firstChild);
  const root = vizFrame('Kienzle 式 → 主分力 Fc / 切削動力 Pc');
  const materials = {
    'AL7075':   { Kc:  700, mc: 0.18, label: 'AL7075-T6' },
    'S45C':     { Kc: 2100, mc: 0.17, label: 'S45C 中炭素鋼' },
    'SUS304':   { Kc: 2600, mc: 0.21, label: 'SUS304 ステンレス' },
    'Ti-6Al-4V':{ Kc: 2000, mc: 0.21, label: 'Ti-6Al-4V チタン合金' },
    'Inconel':  { Kc: 2900, mc: 0.25, label: 'Inconel 718' },
  };
  const { el: sliders, inputs, valueEls } = vizSliders([
    { id: 'mat', label: '材料', def: 'S45C', options: Object.keys(materials).map(k => ({ value: k, label: materials[k].label })) },
    { id: 'f',   label: 'f (h)', min: 0.05, max: 0.6, step: 0.01, def: 0.3 },
    { id: 'ap',  label: 'ap (b)', min: 0.5, max: 6.0, step: 0.1, def: 2.0 },
  ], () => recompute());
  root.appendChild(sliders);
  const { el: results, els: resultEls } = vizResults([
    { id: 'kc',  label: 'Kc (材料)',     unit: 'N/mm²' },
    { id: 'fc',  label: 'Fc (主分力)',  unit: 'N' },
    { id: 'pc',  label: 'Pc (Vc=200)', unit: 'kW' },
  ]);
  root.appendChild(results);
  // SVG bar: Fc 相対比 (材料切替で大きく動くのが見えるよう)

  function recompute() {
    const matKey = inputs.mat.value;
    const m = materials[matKey];
    const f = parseFloat(inputs.f.value);
    const ap = parseFloat(inputs.ap.value);
    const Vc = 200;
    const h = f, b = ap;
    const Fc = m.Kc * Math.pow(h, 1 - m.mc) * b;
    const Pc = Fc * Vc / 60000;
    valueEls.mat.el.textContent = m.label;
    valueEls.f.el.textContent = `${f.toFixed(2)} mm`;
    valueEls.ap.el.textContent = `${ap.toFixed(1)} mm`;
    resultEls.kc.nodeValue = m.Kc;
    resultEls.fc.nodeValue = Fc.toFixed(0);
    resultEls.pc.nodeValue = Pc.toFixed(2);
    // bar 0-6000N で正規化
    const w = Math.min(320, (Fc / 6000) * 320);
    bar.setAttribute('width', String(w));
  }
  recompute();
}

// === ch8: Taylor 工具寿命 V·T^n = C, T = (C/V)^(1/n) ===
function buildTaylorVisualizer(container) {
  while (container.firstChild) container.removeChild(container.firstChild);
  const root = vizFrame('Taylor 工具寿命式 → V を変えて T を見る (両対数)');
  const tools = {
    HSS:       { n: 0.125, C: 80,  label: 'HSS' },
    Carbide:   { n: 0.22,  C: 200, label: '超硬' },
    Coated:    { n: 0.25,  C: 250, label: 'コーティング超硬' },
    Ceramic:   { n: 0.45,  C: 400, label: 'セラミクス' },
    CBN:       { n: 0.50,  C: 500, label: 'CBN' },
    PCD:       { n: 0.60,  C: 1500,label: 'PCD (AL用)' },
  };
  const { el: sliders, inputs, valueEls } = vizSliders([
    { id: 'tool', label: '工具', def: 'Carbide', options: Object.keys(tools).map(k => ({ value: k, label: tools[k].label })) },
    { id: 'vc',   label: 'Vc',  min: 30, max: 800, step: 5, def: 200 },
  ], () => recompute());
  root.appendChild(sliders);
  const { el: results, els: resultEls } = vizResults([
    { id: 'n', label: 'n (Taylor 指数)', unit: '' },
    { id: 'c', label: 'C (Taylor 定数)', unit: '' },
    { id: 't', label: 'T (工具寿命)',    unit: 'min' },
  ]);
  root.appendChild(results);
  // log-log plot
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', '0 0 400 220');
  svg.setAttribute('class', 'bar-svg');
  svg.style.height = '220px';
  // 軸
  const axisX = document.createElementNS(SVG_NS, 'line');
  axisX.setAttribute('x1', '50'); axisX.setAttribute('y1', '180');
  axisX.setAttribute('x2', '380'); axisX.setAttribute('y2', '180');
  axisX.setAttribute('stroke', 'var(--line-hi)');
  svg.appendChild(axisX);
  const axisY = document.createElementNS(SVG_NS, 'line');
  axisY.setAttribute('x1', '50'); axisY.setAttribute('y1', '20');
  axisY.setAttribute('x2', '50'); axisY.setAttribute('y2', '180');
  axisY.setAttribute('stroke', 'var(--line-hi)');
  svg.appendChild(axisY);
  // 軸ラベル
  const lblX = document.createElementNS(SVG_NS, 'text');
  lblX.setAttribute('x', '215'); lblX.setAttribute('y', '210');
  lblX.setAttribute('font-family', 'JetBrains Mono, monospace');
  lblX.setAttribute('font-size', '10'); lblX.setAttribute('fill', 'var(--text-2)');
  lblX.setAttribute('text-anchor', 'middle');
  lblX.textContent = 'log Vc [m/min]';
  svg.appendChild(lblX);
  const lblY = document.createElementNS(SVG_NS, 'text');
  lblY.setAttribute('x', '12'); lblY.setAttribute('y', '100');
  lblY.setAttribute('font-family', 'JetBrains Mono, monospace');
  lblY.setAttribute('font-size', '10'); lblY.setAttribute('fill', 'var(--text-2)');
  lblY.setAttribute('transform', 'rotate(-90 12 100)');
  lblX.setAttribute('text-anchor', 'middle');
  lblY.textContent = 'log T [min]';
  svg.appendChild(lblY);
  // 直線 (Taylor 線): log T = (log C - log V) / n  →  両対数で傾き -1/n の直線
  const line = document.createElementNS(SVG_NS, 'line');
  line.setAttribute('stroke', 'var(--accent)'); line.setAttribute('stroke-width', '2');
  svg.appendChild(line);
  // 現条件マーカー
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('r', '6'); dot.setAttribute('fill', 'var(--ylw, #f59e0b)');
  dot.setAttribute('stroke', 'var(--bg-1)'); dot.setAttribute('stroke-width', '2');
  svg.appendChild(dot);
  const dotLbl = document.createElementNS(SVG_NS, 'text');
  dotLbl.setAttribute('font-family', 'JetBrains Mono, monospace');
  dotLbl.setAttribute('font-size', '10');
  dotLbl.setAttribute('fill', 'var(--ylw, #f59e0b)');
  svg.appendChild(dotLbl);
  root.appendChild(svg);
  container.appendChild(root);

  // 軸範囲 (両対数): Vc 30-800 → log10 1.477-2.903、T 1-10000 → log10 0-4
  const Vmin = 30, Vmax = 800;
  const Tmin = 1, Tmax = 10000;
  function xOf(V) {
    const f = (Math.log10(V) - Math.log10(Vmin)) / (Math.log10(Vmax) - Math.log10(Vmin));
    return 50 + f * 330;
  }
  function yOf(T) {
    const f = (Math.log10(T) - Math.log10(Tmin)) / (Math.log10(Tmax) - Math.log10(Tmin));
    return 180 - f * 160;
  }

  function recompute() {
    const tk = inputs.tool.value;
    const t = tools[tk];
    const Vc = parseFloat(inputs.vc.value);
    const T = Math.pow(t.C / Vc, 1 / t.n);
    valueEls.tool.el.textContent = t.label;
    valueEls.vc.el.textContent = `${Vc.toFixed(0)} m/min`;
    resultEls.n.nodeValue = t.n.toFixed(3);
    resultEls.c.nodeValue = t.C;
    resultEls.t.nodeValue = T.toFixed(T < 10 ? 2 : 0);
    // Taylor 直線: 2点 (V=Vmin, T=(C/Vmin)^(1/n)) と (V=Vmax, T=(C/Vmax)^(1/n))
    const T1 = Math.pow(t.C / Vmin, 1 / t.n);
    const T2 = Math.pow(t.C / Vmax, 1 / t.n);
    line.setAttribute('x1', xOf(Vmin));
    line.setAttribute('y1', yOf(Math.max(Tmin, Math.min(Tmax, T1))));
    line.setAttribute('x2', xOf(Vmax));
    line.setAttribute('y2', yOf(Math.max(Tmin, Math.min(Tmax, T2))));
    // 現条件 dot
    const dx = xOf(Vc), dy = yOf(Math.max(Tmin, Math.min(Tmax, T)));
    dot.setAttribute('cx', dx); dot.setAttribute('cy', dy);
    dotLbl.setAttribute('x', dx + 10); dotLbl.setAttribute('y', dy + 4);
    dotLbl.textContent = `T=${T.toFixed(T < 10 ? 1 : 0)} min`;
  }
  recompute();
}

// === ch10: Stability Lobe Diagram (簡易概念) ===
// Altintas 2012 の単一 DOF SLD: blim = -1 / (2·Kc·z·Re{Φ(ω_c)})
// 厳密モーダル同定なしで「概念曲線」を描画 — modal rank で振幅を変えるだけ。
function buildSldVisualizer(container) {
  while (container.firstChild) container.removeChild(container.firstChild);
  const root = vizFrame('Stability Lobe Diagram (概念) — 安定領域に入っているか判定');
  const modalRanks = {
    rigid: { kStiff: 8e7, fn: 1200, label: '高剛性 (大型機械)' },
    med:   { kStiff: 3e7, fn: 900,  label: '中剛性 (汎用機械)' },
    flex:  { kStiff: 1e7, fn: 600,  label: '低剛性 (薄物治具・長突出)' },
  };
  const { el: sliders, inputs, valueEls } = vizSliders([
    { id: 'machine', label: '機械剛性', def: 'med', options: Object.keys(modalRanks).map(k => ({ value: k, label: modalRanks[k].label })) },
    { id: 'rpm',     label: 'n (rpm)',  min: 500, max: 30000, step: 50, def: 8000 },
    { id: 'ap',      label: 'ap (mm)',  min: 0.2, max: 6.0,   step: 0.1, def: 2.0 },
  ], () => recompute());
  root.appendChild(sliders);
  const { el: results, els: resultEls } = vizResults([
    { id: 'blim', label: 'blim @ 現 rpm',     unit: 'mm' },
    { id: 'stat', label: '判定',                unit: '' },
    { id: 'fc',   label: 'チャタリング周波数', unit: 'Hz' },
  ]);
  root.appendChild(results);
  // SLD 曲線 SVG
  const svg = document.createElementNS(SVG_NS, 'svg');
  svg.setAttribute('viewBox', '0 0 400 220');
  svg.setAttribute('class', 'bar-svg');
  svg.style.height = '220px';
  // 軸
  const axisX = document.createElementNS(SVG_NS, 'line');
  axisX.setAttribute('x1', '50'); axisX.setAttribute('y1', '180');
  axisX.setAttribute('x2', '390'); axisX.setAttribute('y2', '180');
  axisX.setAttribute('stroke', 'var(--line-hi)');
  svg.appendChild(axisX);
  const axisY = document.createElementNS(SVG_NS, 'line');
  axisY.setAttribute('x1', '50'); axisY.setAttribute('y1', '20');
  axisY.setAttribute('x2', '50'); axisY.setAttribute('y2', '180');
  axisY.setAttribute('stroke', 'var(--line-hi)');
  svg.appendChild(axisY);
  const lblX = document.createElementNS(SVG_NS, 'text');
  lblX.setAttribute('x', '220'); lblX.setAttribute('y', '210');
  lblX.setAttribute('font-family', 'JetBrains Mono, monospace');
  lblX.setAttribute('font-size', '10'); lblX.setAttribute('fill', 'var(--text-2)');
  lblX.setAttribute('text-anchor', 'middle');
  lblX.textContent = 'spindle speed n [rpm]';
  svg.appendChild(lblX);
  const lblY = document.createElementNS(SVG_NS, 'text');
  lblY.setAttribute('x', '12'); lblY.setAttribute('y', '100');
  lblY.setAttribute('font-family', 'JetBrains Mono, monospace');
  lblY.setAttribute('font-size', '10'); lblY.setAttribute('fill', 'var(--text-2)');
  lblY.setAttribute('transform', 'rotate(-90 12 100)');
  lblY.textContent = 'blim [mm]';
  svg.appendChild(lblY);
  // SLD 曲線 (path)
  const sldPath = document.createElementNS(SVG_NS, 'path');
  sldPath.setAttribute('fill', 'none');
  sldPath.setAttribute('stroke', 'var(--accent)');
  sldPath.setAttribute('stroke-width', '1.8');
  svg.appendChild(sldPath);
  // 現条件マーカー
  const dot = document.createElementNS(SVG_NS, 'circle');
  dot.setAttribute('r', '6');
  dot.setAttribute('stroke', 'var(--bg-1)'); dot.setAttribute('stroke-width', '2');
  svg.appendChild(dot);
  root.appendChild(svg);
  container.appendChild(root);

  const Kc = 2100; // S45C 想定固定
  const z = 4;     // 4枚刃想定
  const RPM_MIN = 500, RPM_MAX = 30000;
  function xOf(rpm) {
    const f = (Math.log10(rpm) - Math.log10(RPM_MIN)) / (Math.log10(RPM_MAX) - Math.log10(RPM_MIN));
    return 50 + f * 340;
  }
  function yOf(b) {
    return 180 - Math.min(160, (b / 6) * 160);
  }
  // 概念 SLD: blim(n) = base + amplitude·sin(2π·n·k/fn) のような周期的近似
  // 真面目な Altintas 計算は複素 FRF が必要なので、教育用の概念曲線で代替
  function blimAt(n, modalKey) {
    const m = modalRanks[modalKey];
    const base = m.kStiff / (2 * Kc * z * 1e6); // 単位整合は教育用近似、blim 0.5-3 範囲に収まるよう
    // tooth passing freq f_tp = n·z/60、これと fn の比でローブを生成
    const ftp = n * z / 60;
    const ratio = ftp / m.fn;
    const lobe = 0.6 + 1.4 * Math.abs(Math.sin(Math.PI * ratio));
    return base * lobe;
  }
  function recompute() {
    const machine = inputs.machine.value;
    const rpm = parseFloat(inputs.rpm.value);
    const ap = parseFloat(inputs.ap.value);
    valueEls.machine.el.textContent = modalRanks[machine].label;
    valueEls.rpm.el.textContent = `${rpm.toFixed(0)} rpm`;
    valueEls.ap.el.textContent = `${ap.toFixed(1)} mm`;
    // SLD 曲線: 50 サンプル
    const N = 80;
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const r = RPM_MIN * Math.pow(RPM_MAX / RPM_MIN, i / N);
      const b = blimAt(r, machine);
      pts.push(`${xOf(r).toFixed(1)},${yOf(b).toFixed(1)}`);
    }
    sldPath.setAttribute('d', 'M' + pts.join(' L'));
    // 現条件
    const blim = blimAt(rpm, machine);
    const stable = ap < blim;
    resultEls.blim.nodeValue = blim.toFixed(2);
    resultEls.stat.nodeValue = stable ? '安定' : 'びびり領域';
    resultEls.fc.nodeValue = (rpm * z / 60).toFixed(0);
    dot.setAttribute('cx', xOf(rpm));
    dot.setAttribute('cy', yOf(ap));
    dot.setAttribute('fill', stable ? 'var(--grn, #2ade7a)' : 'var(--ylw, #f59e0b)');
  }
  recompute();
}

    const f = parseFloat(inputs.f.value);
    const ap = parseFloat(inputs.ap.value);
    // ワーク回転インジケータ (n rpm を視覚化、ストライプを横方向に動かす)
    stripePhase = (stripePhase + n / 600) % 50;
    workG.querySelectorAll('.work-stripe').forEach((s, i) => {
      const x = 60 + ((i * 50 + stripePhase) % 420);
      s.setAttribute('x1', x); s.setAttribute('x2', x);
    });
    // バイト位置 (右→左に進む、Vf 比例)
    toolX -= f * n / 2400;  // 速度を見やすく抑制
    if (toolX < 65) toolX = 470; // ループ
    tool.setAttribute('transform', `translate(${toolX}, ${107 - ap * 2.5})`);
    // 切削済み領域更新
    cutWidth = Math.max(0, 470 - toolX);
    cutPart.setAttribute('x', toolX);
    cutPart.setAttribute('width', cutWidth);
    cutPart.setAttribute('y', 105 - ap * 2.5);
    cutPart.setAttribute('height', 30 + ap * 2.5);
    // 切屑スパーク (バイト先端から飛ばす)
    chip.querySelectorAll('.chip-spark').forEach((sp, i) => {
      const phase = (t / 200 + i * 0.3) % 1;
      const sx = toolX;
      const sy = 100 - ap * 2.5;
      const ex = sx + 10 + phase * 30;
      const ey = sy - phase * 25;
      sp.setAttribute('x1', sx); sp.setAttribute('y1', sy);
      sp.setAttribute('x2', ex); sp.setAttribute('y2', ey);
      sp.setAttribute('opacity', String(0.8 - phase * 0.8));
    });
    raf = requestAnimationFrame(tick);
  }

  playBtn.addEventListener('click', () => {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  });
  stopBtn.addEventListener('click', () => {
    if (raf) { cancelAnimationFrame(raf); raf = null; }
    toolX = 470;
    tool.setAttribute('transform', `translate(470, 105)`);
    cutPart.setAttribute('width', '0');
    chip.querySelectorAll('.chip-spark').forEach(sp => sp.setAttribute('opacity', '0'));
  });

  updateAnim();
  // 初期表示でバイトの位置を反映
  tool.setAttribute('transform', `translate(470, 105)`);
}

// セクション + ブロック単位 highlight + スクロール
function updateHighlight(item) {
  // 手動ジャンプ (prev/next/seek) 時は suppressScrollOnce が立っている。
  // その場合はターゲットが完全にビュー外の時だけスクロールし、視野内なら据え置く
  // (連打中に勝手にスクロールしてボタンを見失う問題への対策)。
  const manual = !!voice.suppressScrollOnce;
  voice.suppressScrollOnce = false;
  const shouldScroll = (el) => {
    if (!el) return false;
    if (!manual) return true;
    const rect = el.getBoundingClientRect();
    const vh = window.innerHeight || document.documentElement.clientHeight;
    return rect.bottom < 0 || rect.top > vh;
  };

  document.querySelectorAll('[data-voice-current]').forEach(el => {
    el.removeAttribute('data-voice-current');
  });
  document.querySelectorAll('.voice-block-current').forEach(el => {
    el.classList.remove('voice-block-current');
  });
  if (item.sectionIdx < 0) return;

  const h3 = document.querySelector(`h3[data-voice-section="${item.sectionIdx}"]`);
  if (h3) h3.setAttribute('data-voice-current', 'true');

  // blockIdx === -1 はセクション見出し読み上げ中、本文ブロックなし
  if (item.blockIdx === -1 || item.blockIdx === undefined) {
    if (shouldScroll(h3)) h3.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // 本文ブロック highlight + 必要ならスクロール
  const block = document.querySelector(
    `[data-voice-block-id="${item.sectionIdx}-${item.blockIdx}"]`
  );
  if (block) {
    block.classList.add('voice-block-current');
    // 同じブロック内の sub-chunk (subIdx > 0) はスクロールしない (ジッタ回避)
    if (!item.subIdx && shouldScroll(block)) {
      block.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  } else if (item.isFirstOfSection && shouldScroll(h3)) {
    h3.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// 現在の voice.currentIdx のキュー項目を再生
// プロバイダーに応じて Web Speech API or HTML5 Audio を使用
function speakCurrent() {
  if (voice.currentIdx < 0 || voice.currentIdx >= voice.queue.length) {
    // 終了処理
    voice.playing = false;
    voice.currentIdx = -1;
    voice.currentUtterance = null;
    voice.currentAudio = null;
    updateVoiceUI();
    document.querySelectorAll('[data-voice-current]').forEach(el => {
      el.removeAttribute('data-voice-current');
    });
    return;
  }
  const item = voice.queue[voice.currentIdx];
  const provider = getActiveProvider();

  // 中断フラグ
  let interrupted = false;
  voice.markInterrupted = () => { interrupted = true; };

  if (provider.id === 'browser') {
    // ---- Web Speech API ----
    if (!('speechSynthesis' in window)) {
      alert('お使いのブラウザは Web Speech API に対応していません');
      stopSpeech();
      return;
    }
    const utter = new SpeechSynthesisUtterance(item.text);
    utter.lang = 'ja-JP';
    utter.rate = voice.rate;
    // 音声選択
    const voiceURI = voice.selectedVoiceByProvider.browser || voice.selectedVoiceURI;
    if (voiceURI) {
      const v = voice.availableVoices.find(x => x.voiceURI === voiceURI);
      if (v) utter.voice = v;
    }
    utter.onstart = () => {
      voice.playing = true;
      updateVoiceUI();
      updateHighlight(item);
    };
    utter.onend = () => {
      if (interrupted) return;
      if (voice.playing) playQueue();
    };
    utter.onerror = (e) => {
      if (interrupted) return;
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      console.warn('Speech error:', e);
      if (voice.playing) playQueue();
    };
    voice.currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  } else {
    // ---- API型プロバイダー（Grok等）：synthesize → Audio再生 ----
    playSynthesized(item, provider, interrupted);
  }
}

async function playSynthesized(item, provider, interruptedFlagClosure) {
  // キャッシュキー（rateは含めない：ブラウザ側でplaybackRateで制御するため、同一音声で速度変更可能）
  const voiceId = voice.selectedVoiceByProvider[provider.id] || provider.getVoices()[0]?.id;
  const cacheKey = `${provider.id}:${voiceId}:${simpleHash(item.text)}`;

  // ステータス表示：生成中
  const status = document.getElementById('vc-status');
  if (status) status.textContent = '音声生成中...';

  let blob = null;

  // キャッシュ確認
  try {
    blob = await cacheGet(cacheKey);
  } catch {}

  // 中断チェック
  if (voice.markInterrupted && !voice.playing) return;

  if (!blob) {
    // 新規生成
    try {
      voice.currentSynthAbort = new AbortController();
      blob = await provider.synthesize(item.text, {
        voiceId,
        rate: voice.rate,
        lang: 'ja',
      });
      voice.currentSynthAbort = null;
      // キャッシュに保存
      cachePut(cacheKey, blob);
    } catch (e) {
      voice.currentSynthAbort = null;
      if (e.name === 'AbortError') return;
      console.error('TTS synthesize error:', e);
      alert(`音声生成に失敗しました：${e.message}`);
      stopSpeech();
      return;
    }
  }

  // 中断チェック（生成中に停止された場合）
  if (!voice.playing) return;

  // Audio で再生
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.playbackRate = voice.rate;
  voice.currentAudio = audio;

  audio.addEventListener('play', () => {
    voice.playing = true;
    updateVoiceUI();
    updateHighlight(item);
  });
  audio.addEventListener('ended', () => {
    URL.revokeObjectURL(url);
    voice.currentAudio = null;
    if (!voice.playing) return;
    playQueue();
  });
  audio.addEventListener('error', (e) => {
    URL.revokeObjectURL(url);
    voice.currentAudio = null;
    if (!voice.playing) return;
    console.warn('Audio playback error:', e);
    playQueue();
  });

  try {
    await audio.play();
  } catch (e) {
    URL.revokeObjectURL(url);
    if (e.name === 'AbortError') return;
    console.warn('Audio play failed:', e);
  }
}

// 再生中のパラメータ変更：現在のセクションを打ち切って新しい設定で再開
function restartCurrentIfPlaying() {
  if (!voice.playing || voice.currentIdx < 0) return;
  const provider = getActiveProvider();
  // 速度変更のみの場合、HTML5 Audioなら playbackRate をその場で変えるだけで済む
  if (provider.id !== 'browser' && voice.currentAudio) {
    voice.currentAudio.playbackRate = voice.rate;
    return;
  }
  // それ以外（音声変更、プロバイダー変更、Web Speech API の速度変更）
  // は完全再生成
  if (voice.markInterrupted) voice.markInterrupted();
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  disposeCurrentAudio();
  if (voice.currentSynthAbort) {
    try { voice.currentSynthAbort.abort(); } catch {}
    voice.currentSynthAbort = null;
  }
  setTimeout(() => {
    if (voice.playing) {
      speakCurrent();
    }
  }, 100);
}

// chunk index へジャンプ (前/次/シーク共通)。queue は維持。
// IndexedDB cache に既に Blob があれば API は再消費されない。
// autoPlay=true の場合は再生を継続/開始、false の場合は currentIdx だけ移動。
//
// 連打対応:
//   - 直前の jumpTimer があれば clearTimeout で破棄 → 最後のクリック位置でのみ
//     speakCurrent が走るので無駄な発声/API 消費が起きない。
//   - suppressScrollOnce フラグを立て、次の updateHighlight で消費。
//     手動ジャンプ中は「ターゲットがビュー外の時のみスクロール」に切替わるので、
//     ▶▶ 連打中にページがスクロールしてボタンを見失うのを防ぐ。
function jumpToChunk(targetIdx, autoPlay = true) {
  if (voice.queue.length === 0) return;
  const clamped = Math.max(0, Math.min(voice.queue.length - 1, targetIdx));

  if (voice.markInterrupted) voice.markInterrupted();
  if ('speechSynthesis' in window) {
    try { window.speechSynthesis.cancel(); } catch {}
  }
  disposeCurrentAudio();
  if (voice.currentSynthAbort) {
    try { voice.currentSynthAbort.abort(); } catch {}
    voice.currentSynthAbort = null;
  }
  voice.currentUtterance = null;
  voice.currentIdx = clamped;

  if (voice.jumpTimer) {
    clearTimeout(voice.jumpTimer);
    voice.jumpTimer = null;
  }

  if (autoPlay) {
    voice.playing = true;
    voice.suppressScrollOnce = true;
    voice.jumpTimer = setTimeout(() => {
      voice.jumpTimer = null;
      if (voice.playing) speakCurrent();
    }, 100);
    updateVoiceUI();
  } else {
    voice.playing = false;
    updateVoiceUI();
  }
}

function updateVoiceUI() {
  const status = document.getElementById('vc-status');
  const playBtn = document.getElementById('vc-play');
  const pauseBtn = document.getElementById('vc-pause');
  const stopBtn = document.getElementById('vc-stop');
  const prevBtn = document.getElementById('vc-prev');
  const nextBtn = document.getElementById('vc-next');
  const seek = document.getElementById('vc-seek');
  const seekPos = document.getElementById('vc-seek-pos');
  if (!status || !playBtn) return;

  const total = voice.queue.length;
  const hasQueue = total > 0 && voice.currentIdx >= 0;
  const idx = hasQueue ? voice.currentIdx : -1;

  if (voice.playing) {
    status.textContent = `再生中 ${idx + 1} / ${total}`;
    status.classList.add('playing');
    playBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
  } else if (hasQueue) {
    status.textContent = '一時停止中';
    status.classList.remove('playing');
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = false;
  } else {
    status.textContent = '待機中';
    status.classList.remove('playing');
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
  }

  if (prevBtn) prevBtn.disabled = !hasQueue || idx <= 0;
  if (nextBtn) nextBtn.disabled = !hasQueue || idx >= total - 1;
  if (seek) {
    seek.disabled = !hasQueue;
    seek.max = String(Math.max(0, total - 1));
    // ユーザーがドラッグ中は上書きしない (input イベントで _seeking フラグを立てる)
    if (!seek.dataset.seeking) {
      seek.value = String(Math.max(0, idx));
    }
    // スクリーンリーダーに「位置 N / total」を読ませる
    seek.setAttribute('aria-valuetext', hasQueue ? `${idx + 1} / ${total}` : `0 / ${total}`);
  }
  if (seekPos) {
    seekPos.textContent = hasQueue ? `${idx + 1} / ${total}` : `0 / ${total}`;
  }
}

function populateProviderSelect() {
  const sel = document.getElementById('vc-provider');
  if (!sel) return;
  sel.innerHTML = '';
  Object.values(providers).forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    let label = p.label;
    if (p.requiresApiKey && !p.isConfigured()) {
      label += ' (未設定)';
    }
    opt.textContent = label;
    if (voice.provider === p.id) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateVoiceSelect() {
  const sel = document.getElementById('vc-voice');
  if (!sel) return;
  sel.innerHTML = '';

  const provider = getActiveProvider();
  // Web Speech APIの場合は、voiceschangedイベント後でないと取れないことがある
  const voices = provider.getVoices();

  if (voices.length === 0) {
    const opt = document.createElement('option');
    opt.textContent = '（読み込み中）';
    sel.appendChild(opt);
    // Web Speech APIなら再試行
    if (provider.id === 'browser') {
      setTimeout(() => {
        loadVoices();
        if (provider.getVoices().length > 0) populateVoiceSelect();
      }, 300);
    }
    return;
  }

  // 現在のプロバイダー用の選択済み音声
  const currentSelected = voice.selectedVoiceByProvider[provider.id] ||
    (provider.id === 'browser' ? voice.selectedVoiceURI : null) ||
    voices[0].id;

  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.label;
    if (currentSelected === v.id) opt.selected = true;
    sel.appendChild(opt);
  });

  // availableVoices（browser用）を更新
  if (provider.id === 'browser') {
    voice.availableVoices = voices.map(x => x._raw);
    if (!voice.selectedVoiceURI) {
      voice.selectedVoiceURI = voices[0].id;
    }
  }
  // selectedVoiceByProvider も初期化
  if (!voice.selectedVoiceByProvider[provider.id]) {
    voice.selectedVoiceByProvider[provider.id] = voices[0].id;
    saveVoicePrefs();
  }
}

function initVoicePanel(ch) {
  // 章切り替え時は必ず停止
  stopSpeech();

  const panel = document.getElementById('voice-panel');
  if (!panel) return;

  populateVoiceSelect();

  // 速度スライダー初期値
  const rateInput = document.getElementById('vc-rate');
  const rateVal = document.getElementById('vc-rate-val');
  rateInput.value = voice.rate;
  rateVal.textContent = voice.rate.toFixed(1) + 'x';

  // 速度変更：ドラッグ中は表示更新のみ、離したときに再生に反映
  let rateDebounce = null;
  rateInput.addEventListener('input', (e) => {
    voice.rate = parseFloat(e.target.value);
    rateVal.textContent = voice.rate.toFixed(1) + 'x';
    saveVoicePrefs();
    // 再生中なら、少し遅延させて現在のセクションから新しい速度で再開
    // （HTML5 Audio の場合は restartCurrentIfPlaying 内で playbackRate を即反映）
    if (voice.playing) {
      if (rateDebounce) clearTimeout(rateDebounce);
      rateDebounce = setTimeout(() => {
        restartCurrentIfPlaying();
      }, 300);
    }
  });
  // ドラッグ終了時は即座に反映（確定タイミング）
  rateInput.addEventListener('change', () => {
    if (voice.playing) {
      if (rateDebounce) clearTimeout(rateDebounce);
      restartCurrentIfPlaying();
    }
  });

  // モード切替（全文/要約）
  document.querySelectorAll('.voice-mode-toggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === voice.mode);
    btn.addEventListener('click', () => {
      stopSpeech();
      voice.mode = btn.dataset.mode;
      document.querySelectorAll('.voice-mode-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === voice.mode);
      });
      document.body.classList.toggle('voice-mode-summary', voice.enabled && voice.mode === 'summary');
      saveVoicePrefs();
    });
  });

  // プロバイダー選択
  populateProviderSelect();
  document.getElementById('vc-provider').addEventListener('change', (e) => {
    const newProvider = e.target.value;
    // APIキー未設定のプロバイダーに切り替えようとしたら確認
    const p = providers[newProvider];
    if (p && p.requiresApiKey && !p.isConfigured()) {
      if (!confirm(`${p.label} は API キーが未設定です。設定画面を開きますか？`)) {
        // キャンセル → 選択を戻す
        e.target.value = voice.provider;
        return;
      }
      // 選択は維持したまま設定モーダルを開く
      voice.provider = newProvider;
      saveVoicePrefs();
      stopSpeech();
      populateVoiceSelect();
      openSettingsDialog();
      return;
    }
    voice.provider = newProvider;
    saveVoicePrefs();
    stopSpeech();
    populateVoiceSelect();
  });

  // 音声選択：再生中でも即時に切り替え可能
  document.getElementById('vc-voice').addEventListener('change', (e) => {
    const provider = getActiveProvider();
    voice.selectedVoiceByProvider[provider.id] = e.target.value;
    if (provider.id === 'browser') {
      voice.selectedVoiceURI = e.target.value;
    }
    saveVoicePrefs();
    // 再生中なら現在のセクションから新しい音声で再開
    if (voice.playing) {
      restartCurrentIfPlaying();
    }
  });

  // 再生
  document.getElementById('vc-play').addEventListener('click', () => {
    const provider = getActiveProvider();
    // ブラウザ内蔵の一時停止からの再開
    if (provider.id === 'browser' && voice.currentIdx >= 0 &&
        'speechSynthesis' in window && window.speechSynthesis.paused) {
      const utter = voice.currentUtterance;
      const paramsChanged = utter && (
        Math.abs(utter.rate - voice.rate) > 0.01 ||
        (voice.selectedVoiceURI && utter.voice && utter.voice.voiceURI !== voice.selectedVoiceURI)
      );
      if (paramsChanged) {
        voice.playing = true;
        if (voice.markInterrupted) voice.markInterrupted();
        window.speechSynthesis.cancel();
        setTimeout(() => {
          if (voice.playing) speakCurrent();
        }, 100);
      } else {
        window.speechSynthesis.resume();
        voice.playing = true;
        updateVoiceUI();
      }
      return;
    }
    // HTML5 Audio（Grok等）の一時停止からの再開
    if (provider.id !== 'browser' && voice.currentAudio && voice.currentAudio.paused &&
        voice.currentIdx >= 0) {
      voice.playing = true;
      voice.currentAudio.play().catch(e => console.warn('Resume failed:', e));
      updateVoiceUI();
      return;
    }
    // 新規再生
    stopSpeech();
    voice.queue = buildQueue(ch);
    if (voice.queue.length === 0) {
      alert('読み上げる内容がありません');
      return;
    }
    voice.currentIdx = -1;
    voice.playing = true;
    playQueue();
  });

  // 一時停止
  document.getElementById('vc-pause').addEventListener('click', () => {
    const provider = getActiveProvider();
    if (provider.id === 'browser') {
      if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
        window.speechSynthesis.pause();
        voice.playing = false;
        updateVoiceUI();
      }
    } else {
      // HTML5 Audio
      if (voice.currentAudio && !voice.currentAudio.paused) {
        voice.currentAudio.pause();
        voice.playing = false;
        updateVoiceUI();
      }
    }
  });

  // 停止
  document.getElementById('vc-stop').addEventListener('click', () => {
    stopSpeech();
  });

  // 前の文へ (キュー未構築なら何もしない。構築済みなら前の chunk にジャンプして再生継続)
  document.getElementById('vc-prev').addEventListener('click', () => {
    if (voice.queue.length === 0) return;
    jumpToChunk(voice.currentIdx - 1);
  });

  // 次の文へ
  document.getElementById('vc-next').addEventListener('click', () => {
    if (voice.queue.length === 0) return;
    jumpToChunk(voice.currentIdx + 1);
  });

  // シークバー
  // input 中: ラベルだけ更新 (ドラッグ操作で API を浪費しないため)
  // change (リリース) で実ジャンプ
  const seek = document.getElementById('vc-seek');
  const seekPos = document.getElementById('vc-seek-pos');
  if (seek) {
    seek.addEventListener('input', (e) => {
      seek.dataset.seeking = '1';
      const v = parseInt(e.target.value, 10) || 0;
      if (seekPos && voice.queue.length > 0) {
        seekPos.textContent = `${v + 1} / ${voice.queue.length}`;
      }
    });
    seek.addEventListener('change', (e) => {
      delete seek.dataset.seeking;
      if (voice.queue.length === 0) return;
      const v = parseInt(e.target.value, 10) || 0;
      jumpToChunk(v);
    });
  }

  // 段落クリックで指定位置から再生 (voice.enabled 時のみ)。
  // テキスト選択 (ドラッグ) と両立: getSelection() に文字列が残っていれば
  // コピー目的の選択とみなして無視する (click イベントは大きなドラッグでは
  // そもそも発火しないが、短い選択時の保険)。
  // インタラクティブ要素 (a / button / フォーム / 対話型ビジュアライザ) は除外。
  // queue 未構築 (まだ再生していない or 停止中) なら buildQueue でその場で構築。
  const chBody = document.querySelector('.ch-body');
  if (chBody) {
    chBody.addEventListener('click', (e) => {
      if (!voice.enabled || e.button !== 0) return;
      const sel = window.getSelection();
      if (sel && sel.toString().trim().length > 0) return;
      if (e.target.closest(
        'a, button, input, select, textarea, summary, [data-interactive], [contenteditable], [data-no-voice-jump]'
      )) return;

      const block = e.target.closest('[data-voice-block-id]');
      const heading = e.target.closest('h3[data-voice-section]');
      let sectionIdx, blockIdx;
      if (block) {
        const [s, b] = block.getAttribute('data-voice-block-id').split('-').map(Number);
        sectionIdx = s;
        blockIdx = b;
      } else if (heading) {
        sectionIdx = parseInt(heading.getAttribute('data-voice-section'), 10);
        blockIdx = -1;  // セクション見出し
      } else {
        return;
      }
      if (Number.isNaN(sectionIdx) || Number.isNaN(blockIdx)) return;

      // 要約モードはブロック単位の mapping が無いため対応外
      if (voice.queue.length === 0) {
        if (voice.mode === 'summary') return;
        voice.queue = buildQueue(ch);
        if (voice.queue.length === 0) return;
      }

      // 該当 chunk の最初の sub-chunk へジャンプ
      const idx = voice.queue.findIndex((it) =>
        it.sectionIdx === sectionIdx &&
        it.blockIdx === blockIdx &&
        (it.subIdx === 0 || it.subIdx === undefined)
      );
      if (idx < 0) return;
      jumpToChunk(idx, true);
    });
  }

  updateVoiceUI();
}

const exporter = {

  includeFurther: false, // 参考資料を含めるか

// HTMLからテキストを抽出してTTSフレンドリーに整形
function htmlToPlainText(html) {
  if (!html) return '';
  // DOM使ってタグを除去
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  let text = tmp.textContent || tmp.innerText || '';
  // 余分な空白を整理
  text = text.replace(/[ \t]+/g, ' ');
  // 改行の整理：複数改行は一つに
  text = text.replace(/\n{2,}/g, '\n');
  text = text.trim();
  return text;
}

// リスト項目を改行区切りに変換してから抽出
function htmlToPlainTextWithLists(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // li を句点で区切る
  tmp.querySelectorAll('li').forEach(li => {
    // 先頭に付け、末尾に句点を入れる（すでに句点があれば何もしない）
    let t = li.textContent.trim();
    if (t && !/[。．]$/.test(t)) t += '。';
    li.textContent = t + '\n';
  });
  // p/h3/div の末尾にも改行を入れる
  tmp.querySelectorAll('p, h3, div').forEach(el => {
    el.insertAdjacentText('beforeend', '\n');
  });
  let text = tmp.textContent || '';
  // 空白・改行整理
  text = text.replace(/[ \t]+/g, ' ');
  text = text.replace(/\n[ \t]+/g, '\n');
  text = text.replace(/\n{2,}/g, '\n\n');
  text = text.trim();
  return text;
}

// 章1つ分をプレーンテキスト化
function buildChapterText(ch, opts) {
  const mode = opts.mode || 'full';
  const includeTerms = opts.includeTerms !== false;
  const includeFurther = opts.includeFurther === true;
  const parts = [];

  // ヘッダー
  parts.push(`第${parseInt(ch.num, 10)}章　${ch.title}`);
  parts.push('');

  if (mode === 'summary') {
    // 要約モード
    if (ch.voiceSummary) {
      parts.push(ch.voiceSummary);
    } else {
      parts.push(ch.summary || ch.lead || '');
    }
    parts.push('');
  } else {
    // 全文モード
    if (ch.lead) {
      parts.push(ch.lead);
      parts.push('');
    }
    // 各セクション
    ch.sections.forEach(s => {
      parts.push(`■ ${s.heading}`);
      parts.push('');
      const body = htmlToPlainTextWithLists(s.html);
      if (body) parts.push(body);
      parts.push('');
    });
  }

  // 用語集
  if (includeTerms && ch.terms && ch.terms.length > 0 && mode === 'full') {
    parts.push('■ この章で出てきた用語');
    parts.push('');
    ch.terms.forEach(t => {
      parts.push(`${t.name}（${t.en}）：${t.def}`);
    });
    parts.push('');
  }

  // 参考資料
  if (includeFurther && ch.further && ch.further.length > 0 && mode === 'full') {
    parts.push('■ さらに学ぶには');
    parts.push('');
    ch.further.forEach(f => {
      const plain = htmlToPlainText(f);
      parts.push(`・${plain}`);
    });
    parts.push('');
  }

  return parts.join('\n').replace(/\n{3,}/g, '\n\n').trim();
}

// 全10章をまとめる
function buildAllChaptersText(opts) {
  const header = [
    '切削加工入門',
    'Machining Fundamentals — 学習ロードマップ',
    '',
    '金属切削加工の全体像を概観するための教材です。',
    'はじめて学ぶ人を対象に、全10章で構成しています。',
    '',
    '----------------------------------------',
    '',
  ].join('\n');

  const sep = '\n\n----------------------------------------\n\n';
  const chapters = CHAPTERS.map(ch => buildChapterText(ch, opts));
  return header + chapters.join(sep);
}

// ダイアログを開く
function openExportDialog(target) {
  // target: { type: 'chapter', chapter } or { type: 'all' }
  closeExportDialog();

  const backdrop = document.createElement('div');
  backdrop.className = 'dialog-backdrop';
  backdrop.id = 'export-dialog';
  backdrop.innerHTML = `
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="export-dialog-title">

      </div>

        </div>
        <div class="dialog-actions">
          <button class="dialog-btn" data-download="true">⬇ .txt保存</button>
          <button class="dialog-btn primary" id="exp-copy">📋 クリップボードにコピー</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  // 初期モードを要約モードにしたい場合は、現在の音声モードと連動させる
  if (voice.mode === 'summary') {
    exporter.mode = 'summary';
    backdrop.querySelectorAll('[data-export-mode]').forEach(b => {
      b.classList.toggle('active', b.dataset.exportMode === 'summary');
    });
  }

  function refreshText() {
    const opts = {
      mode: exporter.mode,
      includeTerms: document.getElementById('exp-include-terms').checked,
      includeFurther: document.getElementById('exp-include-further').checked,
    };
    const text = target.type === 'all'
      ? buildAllChaptersText(opts)
      : buildChapterText(target.chapter, opts);
    const textarea = document.getElementById('exp-textarea');
    textarea.value = text;
    // 統計
    const charCount = text.length;
    const lineCount = text.split('\n').length;
    // 読み上げ時間推定（日本語は300〜400字/分が標準、ここは中間値350字で計算）
    const estMin = Math.max(1, Math.round(charCount / 350));
    document.getElementById('exp-stats').textContent =
      `${charCount.toLocaleString()}文字 / ${lineCount}行 / 読み上げ約${estMin}分`;
  }

  refreshText();

  // モード切替
  backdrop.querySelectorAll('[data-export-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      exporter.mode = btn.dataset.exportMode;
      backdrop.querySelectorAll('[data-export-mode]').forEach(b => {
        b.classList.toggle('active', b.dataset.exportMode === exporter.mode);
      });
      refreshText();
    });
  });

  // チェックボックス
  document.getElementById('exp-include-terms').addEventListener('change', refreshText);
  document.getElementById('exp-include-further').addEventListener('change', refreshText);

  // コピー
  const copyBtn = document.getElementById('exp-copy');
  copyBtn.addEventListener('click', async () => {
    const text = document.getElementById('exp-textarea').value;
    let success = false;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        success = true;
      } else {
        // フォールバック：textareaを選択してexecCommand
        const ta = document.getElementById('exp-textarea');
        ta.removeAttribute('readonly');
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        success = document.execCommand('copy');
        ta.setAttribute('readonly', 'true');
      }
    } catch (e) {
      console.warn('Copy failed:', e);
    }
    if (success) {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓ コピーしました';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '📋 クリップボードにコピー';
      }, 1800);
    } else {
      alert('コピーに失敗しました。テキストを手動で選択してコピーしてください。');
    }
  });

  // .txt ダウンロード
  backdrop.querySelector('[data-download]').addEventListener('click', () => {
    const text = document.getElementById('exp-textarea').value;
    const filename = target.type === 'all'
      ? `machining-fundamentals-all-chapters${exporter.mode === 'summary' ? '-summary' : ''}.txt`
      : `machining-fundamentals-ch${target.chapter.num}-${target.chapter.title.replace(/\s/g, '')}${exporter.mode === 'summary' ? '-summary' : ''}.txt`;
    const blob = new Blob(['\uFEFF' + text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  // 閉じる
  backdrop.querySelector('[data-close]').addEventListener('click', closeExportDialog);
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeExportDialog();
  });

  // ESCキーで閉じる
  const escHandler = (e) => {
    if (e.key === 'Escape') closeExportDialog();
  };
  backdrop._escHandler = escHandler;
  document.addEventListener('keydown', escHandler);
}

function closeExportDialog() {
  const dialog = document.getElementById('export-dialog');
  if (!dialog) return;
  if (dialog._escHandler) {
    document.removeEventListener('keydown', dialog._escHandler);
  }
  dialog.remove();
}

      const rl = extractRateLimit(res);
      if (res.ok) {
        const blob = await res.blob();
        statusEl.className = 'settings-field-status ok';
        let msg = `✓ 接続成功 (${modeLabel}, ${(blob.size/1024).toFixed(1)} KB)`;
        if (rl) msg += `　残り ${rl.remaining}/${rl.limit}（本日分）`;
        statusEl.textContent = msg;
      } else {
        statusEl.className = 'settings-field-status ng';
        let msg = `${res.status} エラー`;
        try {
          const err = await res.json();
          if (err.error && err.error.message) msg += `: ${err.error.message}`;
          else if (err.message) msg += `: ${err.message}`;
        } catch {}
        if (res.status === 429) {
          msg = '共有プロキシの1日上限に到達。設定 [歯車] で xAI キーを入れると BYOK になり無制限。';
        } else if (res.status === 503) {
          msg += '（プロキシ側に共有キー未設定。自分の xAI キーを入れて BYOK で試してください）';
        } else if (res.status === 401 && proxySecret) {
          msg += '（プロキシ合言葉が違う可能性）';
        } else if (res.status === 401) {
          msg += '（xAI API キーが無効の可能性）';
        }
        statusEl.textContent = '✗ ' + msg;
      }
    } catch (e) {
      statusEl.className = 'settings-field-status ng';
      let msg = e.message || '通信エラー';
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
        msg += '（プロキシURL誤り・Worker未デプロイ・CORS未許可の可能性）';
      }
      statusEl.textContent = '✗ ' + msg;
    } finally {
      testBtn.disabled = false;
    }
  });

  // キャッシュ削除
  clearBtn.addEventListener('click', async () => {
    if (!confirm('音声キャッシュをすべて削除します。よろしいですか？\n削除後は、同じ章を再生すると再度課金されます。')) return;
    const ok = await cacheClear();
    if (ok) {
      const s = await cacheStats();
      statsDisplay.textContent = `${s.count} 件 / ${(s.bytes/1024/1024).toFixed(2)} MB`;
      alert('キャッシュを削除しました');
    } else {
      alert('キャッシュ削除に失敗しました');
    }
  });

  // 閉じるボタン
  backdrop.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', closeSettingsDialog);
  });
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeSettingsDialog();
  });

  const escHandler = (e) => {
    if (e.key === 'Escape') closeSettingsDialog();
  };
  backdrop._escHandler = escHandler;
  document.addEventListener('keydown', escHandler);

  // キー入力欄にフォーカス
  setTimeout(() => keyInput.focus(), 50);
}

function closeSettingsDialog() {
  const dialog = document.getElementById('settings-dialog');
  if (!dialog) return;
  if (dialog._escHandler) {
    document.removeEventListener('keydown', dialog._escHandler);
  }
  dialog.remove();
}

// 設定ボタンのハンドラ
document.getElementById('settings-toggle').addEventListener('click', openSettingsDialog);

// 章ページ・ホーム画面のボタンにイベント委任
document.addEventListener('click', (e) => {
  const chBtn = e.target.closest('[data-export-chapter]');
  if (chBtn) {
    // Part A は文字列 ID ('a1' 等)、Part B は数値 (1〜10)。両対応で parse。
    const raw = chBtn.dataset.exportChapter;
    const id = /^\d+$/.test(raw) ? parseInt(raw, 10) : raw;
    const ch = CHAPTERS.find(c => c.id === id);
    if (ch) openExportDialog({ type: 'chapter', chapter: ch });
    return;
  }
  const allBtn = e.target.closest('[data-export-all]');
  if (allBtn) {
    openExportDialog({ type: 'all' });
    return;
  }
});

// =============================================================================
// 横断検索 dialog (Cmd/Ctrl+P で起動)
// =============================================================================
// search-overlay 等は main スクリプト閉じタグ以降に出てくるため DOMContentLoaded 待ち
document.addEventListener('DOMContentLoaded', function setupSearch() {
  const overlay = document.getElementById('search-overlay');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  const trigger = document.getElementById('search-trigger');
  let activeIndex = 0;
  let currentResults = [];

  function open() {
    overlay.hidden = false;
    input.value = '';
    renderResults([]);
    setTimeout(() => input.focus(), 30);
  }
  function close() {
    overlay.hidden = true;
    activeIndex = 0;
  }
  function renderResults(items) {
    currentResults = items;
    while (results.firstChild) results.removeChild(results.firstChild);
    if (items.length === 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = input.value.trim()
        ? '結果なし。別キーワードで試してください。'
        : '章タイトル / 用語 / 本文 を横断検索。例: Vc, 転位, クライオ';
      results.appendChild(div);
      return;
    }
    items.forEach((it, i) => {
      const a = document.createElement('a');
      a.className = 'search-result' + (i === activeIndex ? ' active' : '');
      a.href = it.url;
      a.dataset.idx = String(i);
      const typeLabel = { chapter: '章', section: 'セクション', term: '用語' }[it.type] || it.type;
      const t = document.createElement('span'); t.className = 'type'; t.textContent = typeLabel;
      const ti = document.createElement('span'); ti.className = 'title'; ti.textContent = it.label;
      const wrap = document.createElement('div');
      wrap.appendChild(t); wrap.appendChild(ti);
      a.appendChild(wrap);
      if (it.body) {
        const b = document.createElement('div'); b.className = 'body';
        b.textContent = it.body.length > 120 ? it.body.slice(0, 120) + '…' : it.body;
        a.appendChild(b);
      }
      a.addEventListener('click', (e) => {
        e.preventDefault();
        location.hash = it.url.replace(/^#/, '');
        close();
      });
      results.appendChild(a);
    });
  }
  function updateActive() {
    [...results.querySelectorAll('.search-result')].forEach((el, i) => {
      el.classList.toggle('active', i === activeIndex);
      if (i === activeIndex) el.scrollIntoView({ block: 'nearest' });
    });
  }
  input.addEventListener('input', () => {
    activeIndex = 0;
    renderResults(searchAll(input.value));
  });
  input.addEventListener('keydown', (e) => {
    if (e.isComposing) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); }
    else if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, currentResults.length - 1);
      updateActive();
    }
    else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      updateActive();
    }
    else if (e.key === 'Enter') {
      e.preventDefault();
      const it = currentResults[activeIndex];
      if (it) { location.hash = it.url.replace(/^#/, ''); close(); }
    }
  });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  trigger.addEventListener('click', open);
  // Cmd/Ctrl+P でも開く (グローバル)
  document.addEventListener('keydown', (e) => {
    if (e.isComposing) return;
    const isMac = navigator.platform.toUpperCase().includes('MAC');
    const mod = isMac ? e.metaKey : e.ctrlKey;
    if (mod && (e.key === 'p' || e.key === 'P')) {
      e.preventDefault();
      if (overlay.hidden) open(); else close();
    }
  });
});

// 初期描画 (URL ハッシュから初期 state を復元 → 外部からの deep link 対応)
{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

document.getElementById('loader-status').textContent = '3Dエンジン準備完了...';

// =============================================================================
// 2D SOLVER — carried over from v0.2, same Stable-Fluids implementation
// =============================================================================

const NX = 160, NY = 120;
const SIZE = (NX + 2) * (NY + 2);
const IX = (i, j) => i + (NX + 2) * j;

let u = new Float32Array(SIZE);
let v = new Float32Array(SIZE);
let u_prev = new Float32Array(SIZE);
let v_prev = new Float32Array(SIZE);
let dens = new Float32Array(SIZE);
let dens_prev = new Float32Array(SIZE);
let pressure = new Float32Array(SIZE);
let divergence = new Float32Array(SIZE);
let solid = new Uint8Array(SIZE);
let solidU = new Float32Array(SIZE);
let solidV = new Float32Array(SIZE);
const vort = new Float32Array(SIZE);

// Physical bounding box of the simulation domain (in world units = mm)
// Domain: X from -80 to +80, Z from -60 to +60 (i.e. width 160mm, depth 120mm)
const DOMAIN = { x0: -80, x1: 80, z0: -60, z1: 60 };
const DOMAIN_W = DOMAIN.x1 - DOMAIN.x0;
const DOMAIN_D = DOMAIN.z1 - DOMAIN.z0;

// Grid → world mapping helpers
function gridToWorld(i, j) {
  const x = DOMAIN.x0 + ((i - 0.5) / NX) * DOMAIN_W;
  const z = DOMAIN.z0 + ((j - 0.5) / NY) * DOMAIN_D;
  return [x, z];
}
function worldToGrid(x, z) {
  const i = ((x - DOMAIN.x0) / DOMAIN_W) * NX + 0.5;
  const j = ((z - DOMAIN.z0) / DOMAIN_D) * NY + 0.5;
  return [i, j];
}

const scenario = {
  toolCenter: [80, 60], // grid
  toolCenterWorld: [0, 0],
  toolRadiusGrid: 10,
  toolRadiusWorld: 8,
  toolOmega: 0,
  nozzles: [], // {x,y grid, dirX,dirY, radius, worldPos: [x,z]}
  feedDir: [1, 0],
  slicePlaneY: 0, // mm, vertical position of the slice
};

const params = {
  inlet: 4.0,
  visc: 0.0005,
  diff: 0.0001,
  rpm: 2400,
  dia: 16,       // mm, tool diameter
  feed: 180,
  dt: 0.016,
  viz: 'velocity',
  paused: false,
  step: 0,
  showSlice: true,
  showParticles: true,
  showGrid: true,
  animToolSpin: true,
};

// --- Solver core ---

function setBoundary(b, x) {
  for (let j = 1; j <= NY; j++) {
    x[IX(0, j)]    = b === 1 ? -x[IX(1, j)]  : x[IX(1, j)];
    x[IX(NX+1, j)] = b === 1 ? -x[IX(NX, j)] : x[IX(NX, j)];
  }
  for (let i = 1; i <= NX; i++) {
    x[IX(i, 0)]    = b === 2 ? -x[IX(i, 1)]  : x[IX(i, 1)];
    x[IX(i, NY+1)] = b === 2 ? -x[IX(i, NY)] : x[IX(i, NY)];
  }
  x[IX(0,0)]       = 0.5*(x[IX(1,0)]    + x[IX(0,1)]);
  x[IX(0,NY+1)]    = 0.5*(x[IX(1,NY+1)] + x[IX(0,NY)]);
  x[IX(NX+1,0)]    = 0.5*(x[IX(NX,0)]   + x[IX(NX+1,1)]);
  x[IX(NX+1,NY+1)] = 0.5*(x[IX(NX,NY+1)]+ x[IX(NX+1,NY)]);
}

function applySolidVelocity() {
  for (let k = 0; k < SIZE; k++) {
    if (solid[k] === 1) {
      u[k] = solidU[k];
      v[k] = solidV[k];
    } else if (solid[k] !== 0) {
      u[k] = 0;
      v[k] = 0;
    }
  }
}

function linearSolve(b, x, x0, a, c, iters = 20) {
  const cRecip = 1.0 / c;
  for (let k = 0; k < iters; k++) {
    for (let j = 1; j <= NY; j++) {
      for (let i = 1; i <= NX; i++) {
        if (solid[IX(i, j)]) continue;
        x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i-1, j)] + x[IX(i+1, j)] + x[IX(i, j-1)] + x[IX(i, j+1)])) * cRecip;
      }
    }
    setBoundary(b, x);
  }
}

function diffuse(b, x, x0, diff, dt) {
  const a = dt * diff * NX * NY;
  linearSolve(b, x, x0, a, 1 + 4 * a);
}

function advect(b, d, d0, uf, vf, dt) {
  const dtx = dt * NX;
  const dty = dt * NY;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      let x = i - dtx * uf[IX(i, j)];
      let y = j - dty * vf[IX(i, j)];
      if (x < 0.5) x = 0.5; if (x > NX + 0.5) x = NX + 0.5;
      if (y < 0.5) y = 0.5; if (y > NY + 0.5) y = NY + 0.5;
      const i0 = Math.floor(x), i1 = i0 + 1;
      const j0 = Math.floor(y), j1 = j0 + 1;
      const s1 = x - i0, s0 = 1 - s1;
      const t1 = y - j0, t0 = 1 - t1;
      d[IX(i, j)] =
        s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
    }
  }
  setBoundary(b, d);
}

function project(uf, vf, p, div) {
  const h = 1.0 / Math.min(NX, NY);
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) { div[IX(i, j)] = 0; p[IX(i, j)] = 0; continue; }
      div[IX(i, j)] = -0.5 * h * (uf[IX(i+1, j)] - uf[IX(i-1, j)] + vf[IX(i, j+1)] - vf[IX(i, j-1)]);
      p[IX(i, j)] = 0;
    }
  }
  setBoundary(0, div);
  setBoundary(0, p);
  linearSolve(0, p, div, 1, 4);
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      uf[IX(i, j)] -= 0.5 * (p[IX(i+1, j)] - p[IX(i-1, j)]) / h;
      vf[IX(i, j)] -= 0.5 * (p[IX(i, j+1)] - p[IX(i, j-1)]) / h;
    }
  }
  setBoundary(1, uf);
  setBoundary(2, vf);
}

function applyNozzles(dt) {
  const speed = params.inlet * 0.5;
  for (const n of scenario.nozzles) {
    const r2 = n.radius * n.radius;
    for (let dj = -n.radius; dj <= n.radius; dj++) {
      for (let di = -n.radius; di <= n.radius; di++) {
        if (di*di + dj*dj > r2) continue;
        const i = Math.round(n.x + di);
        const j = Math.round(n.y + dj);
        if (i < 1 || i > NX || j < 1 || j > NY) continue;
        if (solid[IX(i, j)]) continue;
        u[IX(i, j)] = n.dirX * speed;
        v[IX(i, j)] = n.dirY * speed;
        dens[IX(i, j)] = Math.min(1.0, dens[IX(i, j)] + 0.05);
      }
    }
  }
}

function velocityStep(dt) {
  const visc = params.visc;
  applyNozzles(dt);
  applySolidVelocity();
  [u_prev, u] = [u, u_prev];
  diffuse(1, u, u_prev, visc, dt);
  [v_prev, v] = [v, v_prev];
  diffuse(2, v, v_prev, visc, dt);
  applySolidVelocity();
  project(u, v, pressure, divergence);
  [u_prev, u] = [u, u_prev];
  [v_prev, v] = [v, v_prev];
  advect(1, u, u_prev, u_prev, v_prev, dt);
  advect(2, v, v_prev, u_prev, v_prev, dt);
  applySolidVelocity();
  project(u, v, pressure, divergence);
  applySolidVelocity();
}

function densityStep(dt) {
  [dens_prev, dens] = [dens, dens_prev];
  diffuse(0, dens, dens_prev, params.diff, dt);
  [dens_prev, dens] = [dens, dens_prev];
  advect(0, dens, dens_prev, u, v, dt);
  for (let k = 0; k < SIZE; k++) dens[k] *= 0.994;
}

function computeVorticity() {
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const dvdx = (v[IX(i+1, j)] - v[IX(i-1, j)]) * 0.5;
      const dudy = (u[IX(i, j+1)] - u[IX(i, j-1)]) * 0.5;
      vort[IX(i, j)] = dvdx - dudy;
    }
  }
}

function computeOmegaSign() {
  const SCALE = 0.00035;
  return params.rpm * SCALE;
}

function setupScenario() {
  solid.fill(0);
  solidU.fill(0);
  solidV.fill(0);
  u.fill(0); v.fill(0);
  u_prev.fill(0); v_prev.fill(0);
  dens.fill(0);
  pressure.fill(0);
  scenario.nozzles = [];

  const omega = computeOmegaSign();
  const toolRWorld = params.dia / 2; // mm
  const toolRGrid = toolRWorld / DOMAIN_W * NX;

  // === SLOTTING (溝切削) LAYOUT ===
  // Workpiece: large block centered, fills most of the XZ domain
  // Tool: positioned slightly LEFT of center (already advanced from -X toward +X)
  // Groove: already-cut channel behind the tool (-X side), narrow slot width = tool diameter
  //
  // Viewed from above (TOP):
  //   [==WP==][GROOVE][TOOL][==WP_UNCUT==]
  //           <------ cleared ----->  uncut

  const cxWorld = -10;    // tool center X (advanced from left)
  const czWorld = 0;      // tool center Z (centered)
  const [cxGrid, czGrid] = worldToGrid(cxWorld, czWorld);

  scenario.toolCenter = [cxGrid, czGrid];
  scenario.toolCenterWorld = [cxWorld, czWorld];
  scenario.toolRadiusGrid = toolRGrid;
  scenario.toolRadiusWorld = toolRWorld;
  scenario.toolOmega = omega;
  scenario.feedDir = [1, 0];

  // Workpiece footprint (larger than v3, fills most of domain)
  const wpLeftWorld   = -65;
  const wpRightWorld  = 65;
  const wpFrontWorld  = -45;
  const wpBackWorld   = 45;
  const wpHeight      = 22;  // mm, workpiece thickness

  // Groove: left side of tool is already cut
  // Groove extends from wpLeft to tool center x, width = 2 * toolR centered on Z=0
  const grooveLeftWorld  = wpLeftWorld;
  const grooveRightWorld = cxWorld; // tool is at the current cutting face
  const grooveFrontWorld = czWorld - toolRWorld;
  const grooveBackWorld  = czWorld + toolRWorld;

  // Fill solid=2 for workpiece, but leave groove open
  const [wpLeftI]  = worldToGrid(wpLeftWorld, 0);
  const [wpRightI] = worldToGrid(wpRightWorld, 0);
  const [, wpFrontJ] = worldToGrid(0, wpFrontWorld);
  const [, wpBackJ]  = worldToGrid(0, wpBackWorld);

  const [grvLeftI]  = worldToGrid(grooveLeftWorld, 0);
  const [grvRightI] = worldToGrid(grooveRightWorld, 0);
  const [, grvFrontJ] = worldToGrid(0, grooveFrontWorld);
  const [, grvBackJ]  = worldToGrid(0, grooveBackWorld);

  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const inWp = (i >= wpLeftI && i <= wpRightI && j >= wpFrontJ && j <= wpBackJ);
      const inGroove = (i >= grvLeftI && i <= grvRightI && j >= grvFrontJ && j <= grvBackJ);
      if (inWp && !inGroove) {
        solid[IX(i, j)] = 2; // solid workpiece
      }
    }
  }

  // Tool rotating disk (overwrites part of the groove)
  const r2 = toolRGrid * toolRGrid;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const dx = i - cxGrid, dy = j - czGrid;
      if (dx*dx + dy*dy <= r2) {
        solid[IX(i, j)] = 1;
        solidU[IX(i, j)] = -omega * dy;
        solidV[IX(i, j)] =  omega * dx;
      }
    }
  }

  // Save workpiece info for 3D rendering (used by rebuildWorkpieceMesh)
  scenario.workpiece = {
    x0: wpLeftWorld, x1: wpRightWorld,
    z0: wpFrontWorld, z1: wpBackWorld,
    height: wpHeight,
  };
  scenario.groove = {
    x0: grooveLeftWorld, x1: grooveRightWorld,
    z0: grooveFrontWorld, z1: grooveBackWorld,
    depth: wpHeight * 0.6, // how deep the groove is cut (fraction of wp thickness)
    toolR: toolRWorld,
  };

  // Nozzle: from above-front, aimed at tool-workpiece contact (just ahead of tool in +X)
  const contactXWorld = cxWorld + toolRWorld * 0.85; // just inside leading edge
  const contactZWorld = 0;
  const nozzleXWorld = contactXWorld - 6;
  const nozzleZWorld = -22;
  const [nxGrid, nzGrid] = worldToGrid(nozzleXWorld, nozzleZWorld);
  const dirX = (contactXWorld - nozzleXWorld);
  const dirZ = (contactZWorld - nozzleZWorld);
  const len = Math.hypot(dirX, dirZ);
  scenario.nozzles.push({
    x: nxGrid, y: nzGrid,
    dirX: dirX / len, dirY: dirZ / len,
    radius: 3,
    worldPos: [nozzleXWorld, nozzleZWorld],
    worldDir: [dirX / len, dirZ / len],
  });
}

function refreshRotation() {
  const omega = computeOmegaSign();
  scenario.toolOmega = omega;
  const [cx, cz] = scenario.toolCenter;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)] === 1) {
        const dx = i - cx, dy = j - cz;
        solidU[IX(i, j)] = -omega * dy;
        solidV[IX(i, j)] =  omega * dx;
      }
    }
  }
}

function colormap(t) {
  t = Math.max(0, Math.min(1, t));
  const stops = [
    [  2,   8,  40],
    [  0,  78, 146],
    [  0, 180, 219],
    [ 42, 222, 122],
    [255, 201,  64],
    [255, 107,  26],
    [255,  59,  59],
  ];
  const f = t * (stops.length - 1);
  const i = Math.floor(f);
  const k = f - i;
  const a = stops[i];
  const b = stops[Math.min(i + 1, stops.length - 1)];
  return [
    a[0] + (b[0] - a[0]) * k,
    a[1] + (b[1] - a[1]) * k,
    a[2] + (b[2] - a[2]) * k,
  ];
}
