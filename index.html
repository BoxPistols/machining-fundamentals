<style>
:root {
  /* ダークテーマ（デフォルト） */
  --bg-0: #0a0d10;
  --bg-1: #11151a;
  --bg-2: #1a2026;
  --bg-3: #242c34;
  --line: #2f3942;
  --line-hi: #3d4852;
  --text-0: #e8ecef;
  --text-1: #9aa5ad;
  --text-2: #5f6b74;
  --accent: #ff6b1a;
  --accent-dim: #8a3a0e;
  --cyan: #00a8a8;
  --ylw: #d4a000;
  --grn: #2ade7a;
  --red: #ff3b3b;
  /* ダークでは cyan/ylw はそのまま明るく保つ */
  --cyan: #00d4d4;
  --ylw: #ffc940;
  /* レイアウト定数: topbar の高さはチャットサイドバーの top 位置と連動するため一元管理 */
  --topbar-height: 56px;
}

/* ライトテーマ */
[data-theme="light"] {
  --bg-0: #f8f9fa;
  --bg-1: #ffffff;
  --bg-2: #f0f2f5;
  --bg-3: #e2e6ea;
  --line: #d4d9de;
  --line-hi: #c0c6cc;
  --text-0: #1a1f24;
  --text-1: #4a5560;
  --text-2: #7a8590;
  --accent: #e05a0c;
  --accent-dim: #ffd4b8;
  --cyan: #0099a0;
  --ylw: #b88a00;
  --grn: #1a9f5a;
  --red: #d42626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-0);
  color: var(--text-0);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* === ヘッダー === */
.topbar {
  height: var(--topbar-height);
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar::before {
  content: ''; position: absolute; left: 0; top: 0;
  width: 3px; height: 100%; background: var(--accent);
}
.brand {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.05em;
}
.brand .sub {
  color: var(--text-2);
  font-weight: 400;
  font-size: 12px;
  margin-left: 12px;
}
.nav {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-1);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.05em;
  white-space: nowrap; /* ナビラベルが縦崩れしないよう固定 */
}
.brand { white-space: nowrap; }
/* 狭いビューポートではサブタイトルと検索 kbd を畳み、ナビの占有幅を削る */
@media (max-width: 1100px) {
  .brand .sub { display: none; }
  .search-trigger kbd { display: none; }
}
@media (max-width: 720px) {
  .topbar { padding: 0 12px; gap: 12px; }
  .brand { flex-shrink: 0; }
  .nav {
    gap: 2px;
    margin-left: auto;
    min-width: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav button { padding: 6px 10px; flex-shrink: 0; }
  .search-trigger span[data-i18n] { display: none; }
}
.nav button:hover {
  background: var(--bg-2);
  color: var(--text-0);
}
.nav button.active {
  background: var(--accent-dim);
  color: var(--text-0);
  border-color: var(--accent);
}
[data-theme="light"] .nav button.active {
  color: var(--accent);
  background: var(--accent-dim);
}

/* テーマトグル */
.theme-toggle {
  margin-left: 8px;
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.theme-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}
.theme-icon-dark, .theme-icon-light { display: none; }
:root .theme-icon-light { display: inline; }
[data-theme="light"] .theme-icon-dark { display: inline; }
[data-theme="light"] .theme-icon-light { display: none; }

/* === 音声モード === */
.voice-toggle {
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.voice-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}
.voice-icon-off, .voice-icon-on { display: none; }
.voice-icon-off { display: inline; }
body.voice-enabled .voice-icon-off { display: none; }
body.voice-enabled .voice-icon-on { display: inline; }
body.voice-enabled .voice-toggle {
  background: var(--accent-dim) !important;
  border-color: var(--accent) !important;
}

/* 読み上げコントロールパネル */
.voice-panel {
  background: var(--bg-1);
  border: 1px solid var(--accent);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: none;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
body.voice-enabled .voice-panel {
  display: flex;
}
.voice-panel-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
.voice-panel-section + .voice-panel-section {
  padding-left: 16px;
  border-left: 1px solid var(--line);
}
.voice-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  min-width: 36px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.voice-btn:hover {
  background: var(--bg-3);
  border-color: var(--line-hi);
}
.voice-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.voice-btn.primary:hover {
  background: var(--accent);
  opacity: 0.9;
}
.voice-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.voice-mode-toggle {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 2px;
}
.voice-mode-toggle button {
  background: transparent;
  border: none;
  color: var(--text-1);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.voice-mode-toggle button.active {
  background: var(--accent);
  color: #fff;
}
.voice-panel label {
  font-size: 12px;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
}
.voice-panel input[type=range] {
  width: 100px;
  height: 4px;
  -webkit-appearance: none;
  background: var(--bg-3);
  border: 1px solid var(--line);
  outline: none;
  cursor: pointer;
}
.voice-panel input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.voice-panel input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.voice-panel select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 6px 10px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  max-width: 200px;
}
.voice-seek-section { flex: 1 1 200px; min-width: 180px; }
.voice-seek-section label { width: 100%; gap: 8px; }
.voice-seek-section input[type=range] { flex: 1; min-width: 120px; width: auto; }
.voice-seek-pos {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  font-size: 11px;
  min-width: 56px;
  text-align: right;
}
.voice-status {
  font-size: 12px;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}
.voice-status.playing {
  color: var(--accent);
}
.voice-status.playing::before {
  content: '● ';
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 現在読み上げ中のセクション */
.ch-body h3[data-voice-current="true"],
.ch-body [data-voice-section][data-voice-current="true"] {
  background: var(--accent-dim);
  border-left-width: 6px !important;
  transition: all 0.2s;
}
body.voice-enabled .ch-body h3 {
  scroll-margin-top: 80px;
  transition: all 0.2s;
}
/* 現在読み上げ中のブロック (paragraph 単位の natural highlight) */
.ch-body [data-voice-block-id] {
  scroll-margin-top: 96px;
  transition: background-color 0.4s ease, border-left-color 0.4s ease;
  border-left: 3px solid transparent;
  padding-left: 12px;
  margin-left: -15px;
}
.ch-body [data-voice-block-id].voice-block-current {
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border-left-color: var(--accent);
}
/* 音声ON時: ブロック/見出しはクリックで「ここから再生」に対応。
   ただし対話型ビジュアライザ ([data-interactive]) はクリックハンドラ側で
   除外しているため、cursor/hover も付けない (誤誘導防止)。 */
body.voice-enabled .ch-body [data-voice-block-id]:not([data-interactive]),
body.voice-enabled .ch-body h3[data-voice-section] {
  cursor: pointer;
}
@media (hover: hover) {
  /* 再生中ブロックの highlight (12% accent) を hover (6%) で上書きしないよう除外 */
  body.voice-enabled .ch-body [data-voice-block-id]:not([data-interactive]):not(.voice-block-current):hover {
    background: color-mix(in srgb, var(--accent) 6%, transparent);
    border-left-color: color-mix(in srgb, var(--accent) 50%, transparent);
  }
  body.voice-enabled .ch-body h3[data-voice-section]:not([data-voice-current="true"]):hover {
    background: color-mix(in srgb, var(--accent) 8%, transparent);
  }
}

/* 要約モード表示の案内 */
.voice-summary-note {
  background: var(--bg-1);
  border: 1px solid var(--cyan);
  border-left: 3px solid var(--cyan);
  padding: 14px 18px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
  display: none;
}
body.voice-enabled.voice-mode-summary .voice-summary-note {
  display: block;
}
.voice-summary-note strong {
  color: var(--cyan);
  display: block;
  margin-bottom: 6px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

@media (max-width: 720px) {
  .voice-panel-section + .voice-panel-section {
    padding-left: 0;
    border-left: none;
  }
}

/* === テキスト書き出しダイアログ === */
.dialog-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  animation: dialogFadeIn 0.15s ease-out;
}
[data-theme="light"] .dialog-backdrop {
  background: rgba(0, 0, 0, 0.4);
}

/* 設定ボタン */
.settings-toggle {
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.settings-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}

/* 設定モーダル内のフォーム */
.settings-section {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.settings-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.settings-section h3 {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.settings-section p.desc {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
  margin-bottom: 14px;
}
.settings-section p.desc strong { color: var(--ylw); }
.settings-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.settings-field label {
  font-size: 12px;
  color: var(--text-1);
  font-weight: 600;
}
.settings-field input[type="password"],
.settings-field input[type="text"] {
  background: var(--bg-0);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
}
.settings-field input:focus {
  border-color: var(--accent);
}
.settings-field .field-hint {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
}
.settings-field .field-hint a {
  color: var(--cyan);
  text-decoration: none;
}
.settings-field .field-hint a:hover {
  text-decoration: underline;
}
.settings-field-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 8px;
  display: inline-block;
  margin-left: 8px;
}
.settings-field-status.ok {
  color: var(--grn);
  background: rgba(42, 222, 122, 0.1);
}
.settings-field-status.ng {
  color: var(--red);
  background: rgba(255, 59, 59, 0.1);
}
.settings-warning {
  background: var(--bg-2);
  border: 1px solid var(--ylw);
  border-left: 3px solid var(--ylw);
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-1);
}
.settings-warning strong {
  color: var(--ylw);
  display: block;
  margin-bottom: 6px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.settings-cache-info {
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 13px;
  color: var(--text-1);
  margin-top: 12px;
}
.settings-cache-info .cache-stats {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  font-weight: 600;
}

/* プロバイダー選択用（音声パネル内） */
.voice-panel select.provider-select {
  min-width: 140px;
}
.voice-provider-note {
  font-size: 11px;
  color: var(--text-2);
  margin-left: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.voice-provider-note.configured {
  color: var(--grn);
}
.voice-provider-note.missing {
  color: var(--red);
}
@keyframes dialogFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.dialog {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 2px;
  width: 100%;
  max-width: 780px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  animation: dialogScaleIn 0.18s ease-out;
}
@keyframes dialogScaleIn {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.dialog-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.dialog-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-0);
  display: flex;
  align-items: center;
  gap: 10px;
}
/* dialog-title アイコンは各 dialog の中で SVG で個別指定するため、共通の prefix は廃止 */
.dialog-close {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-1);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 12px;
  cursor: pointer;
  line-height: 1;
}
.dialog-close:hover {
  background: var(--bg-2);
  color: var(--text-0);
}
.dialog-toolbar {
  padding: 14px 24px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.dialog-toolbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.dialog-toolbar .export-mode-toggle {
  display: flex;
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 2px;
}
.dialog-toolbar .export-mode-toggle button {
  background: transparent;
  border: none;
  color: var(--text-1);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.dialog-toolbar .export-mode-toggle button.active {
  background: var(--accent);
  color: #fff;
}
.dialog-toolbar label {
  font-size: 12px;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.dialog-toolbar input[type="checkbox"] {
  accent-color: var(--accent);
  cursor: pointer;
}
.dialog-stats {
  font-size: 12px;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
}
.dialog-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  min-height: 200px;
}
.dialog-textarea {
  width: 100%;
  min-height: 360px;
  background: var(--bg-0);
  border: 1px solid var(--line);
  color: var(--text-0);
  font-family: 'Noto Sans JP', 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.9;
  padding: 16px;
  resize: vertical;
  outline: none;
  letter-spacing: 0.02em;
}
.dialog-textarea:focus {
  border-color: var(--accent);
}
.dialog-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--bg-2);
  flex-wrap: wrap;
}
.dialog-hint {
  font-size: 12px;
  color: var(--text-2);
  flex: 1;
  min-width: 200px;
}
.dialog-actions {
  display: flex;
  gap: 8px;
}
.dialog-btn {
  background: var(--bg-1);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 10px 16px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.dialog-btn:hover {
  background: var(--bg-3);
  border-color: var(--line-hi);
}
.dialog-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.dialog-btn.primary:hover {
  opacity: 0.9;
}
.dialog-btn.copied {
  background: var(--grn) !important;
  border-color: var(--grn) !important;
  color: var(--bg-0) !important;
}

/* テキスト書き出しボタン（章ページとロードマップ） */
.export-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 10px 18px;
  font-family: inherit;
  font-size: 12px;
  line-height: 1.4;        /* mark-done と高さ揃え */
  min-height: 40px;        /* SVG の有無で高さがブレないよう固定 */
  cursor: pointer;
  margin-left: 10px;
}
.export-btn .icon { width: 14px; height: 14px; }
.export-btn:hover {
  background: var(--bg-3);
  color: var(--text-0);
  border-color: var(--line-hi);
}
.export-btn.header-style {
  margin-left: 0;
  padding: 8px 14px;
}

/* 章ページ下部のボタン群 */
.ch-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 24px;
}

@media (max-width: 720px) {
  .dialog-toolbar { gap: 8px; }
  .dialog-footer { flex-direction: column; align-items: stretch; }
  .dialog-actions { justify-content: stretch; }
  .dialog-btn { flex: 1; justify-content: center; }
}

/* === メインレイアウト === */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.main.wide {
  max-width: none;
  padding: 0;
}
/* 章詳細のタイポグラフィ列。デフォルトは 880px、ユーザー設定で切替 */
.chapter-detail { max-width: 880px; margin: 0 auto; }
.chapter-detail .fig { margin-left: auto; margin-right: auto; }
[data-content-width="narrow"]  .chapter-detail { max-width: 720px; }
[data-content-width="wide"]    .chapter-detail { max-width: 1080px; }
[data-content-width="full"]    .chapter-detail { max-width: 1280px; }

/* フォントサイズスケール (root font-size を倍率で変える) */
[data-font-size="s"]  { font-size: 14px; }
[data-font-size="m"]  { font-size: 16px; }
[data-font-size="l"]  { font-size: 17.5px; }
[data-font-size="xl"] { font-size: 19px; }

/* フォントファミリ切替 */
[data-font="sans-jp"] body { font-family: 'Noto Sans JP', system-ui, sans-serif; }
[data-font="serif-jp"] body { font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif; }
[data-font="mono"] body { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
[data-font="system"] body { font-family: -apple-system, system-ui, "Segoe UI", sans-serif; }

/* === SVG sprite を使ったアイコン共通 (絵文字を全廃) === */
.icon {
  display: inline-block;
  width: 1em; height: 1em;
  vertical-align: -0.15em;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.icon-fill { fill: currentColor; stroke: none; }
.icon-lg { width: 18px; height: 18px; }

/* 表示設定セクション */
.prefs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 540px) { .prefs-grid { grid-template-columns: 1fr; } }
.prefs-row { display: flex; gap: 6px; align-items: center; }
.prefs-row select {
  flex: 1; padding: 6px 8px; background: var(--bg-1);
  border: 1px solid var(--line); color: var(--text-0);
  border-radius: 4px; font-family: inherit; font-size: 13px;
}
.pref-reset {
  padding: 6px 8px; background: transparent; border: 1px solid var(--line);
  color: var(--text-2); cursor: pointer; border-radius: 4px;
}
.pref-reset:hover { color: var(--ylw, #f59e0b); border-color: var(--ylw, #f59e0b); }

/* === Quiz 章 (確認テスト) === */
:root {
  --ok: #4ec9a8;     /* 正解 (teal、緑よりアクセシブル) */
  --miss: #d97757;   /* 不正解 (warm coral、罰的でない) */
}
.quiz-shell {
  max-width: 720px; margin: 0 auto; padding: 8px 4px 60px;
}
.quiz-progress {
  position: sticky; top: 0; left: 0; right: 0; height: 3px;
  background: var(--bg-3); margin: 0 -4px 24px; z-index: 10;
}
.quiz-progress-bar {
  height: 100%; background: var(--accent);
  transform-origin: left; transition: transform 0.3s ease;
}
.quiz-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--text-2); margin-bottom: 18px;
}
.quiz-meta .score { color: var(--ok); font-weight: 700; }
.quiz-chapter-tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-3); color: var(--text-2);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  margin-bottom: 10px;
}
.quiz-question {
  font-size: 17px; font-weight: 700; color: var(--text-0);
  line-height: 1.6; margin: 0 0 24px 0;
}
.quiz-blank {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  background: var(--bg-2); padding: 12px; border-radius: 4px;
  margin-bottom: 12px; color: var(--text-1);
  border-left: 3px solid var(--accent);
}
.quiz-blank-input {
  width: 100%; padding: 10px 14px; font-size: 15px;
  background: var(--bg-1); border: 2px solid var(--line);
  color: var(--text-0); border-radius: 6px; font-family: inherit;
}
.quiz-blank-input:focus { outline: none; border-color: var(--accent); }
.quiz-choices {
  display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px;
}
.quiz-choice {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px 16px; background: var(--bg-2); border: 2px solid var(--line);
  color: var(--text-0); border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 14px; line-height: 1.5;
  text-align: left; transition: border-color 0.15s, background 0.15s;
}
.quiz-choice:hover:not(:disabled):not(.picked) {
  border-color: var(--line-hi); background: var(--bg-3);
}
.quiz-choice:focus-visible {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 30%, transparent);
}
.quiz-choice .key {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-2); min-width: 18px; padding-top: 1px;
}
.quiz-choice.picked { border-color: var(--accent); background: var(--bg-3); }
.quiz-choice.correct {
  border-color: var(--ok); background: color-mix(in srgb, var(--ok) 12%, transparent);
  animation: quiz-correct 0.32s cubic-bezier(.2,.8,.2,1);
  box-shadow: 0 0 0 2px var(--ok), 0 0 24px -4px var(--ok);
}
.quiz-choice.wrong {
  border-color: var(--miss); background: color-mix(in srgb, var(--miss) 10%, transparent);
  animation: quiz-wrong 0.36s ease-out;
}
.quiz-choice.show-correct {
  border-color: var(--ok); background: color-mix(in srgb, var(--ok) 10%, transparent);
}
@keyframes quiz-correct {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}
@keyframes quiz-wrong {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.quiz-feedback {
  padding: 14px 16px; border-radius: 6px;
  margin-top: 16px; font-size: 13px; line-height: 1.7;
  display: none;
}
.quiz-feedback.show { display: block; animation: quiz-fade-in 0.32s ease-out; }
.quiz-feedback.ok {
  background: color-mix(in srgb, var(--ok) 10%, transparent);
  border-left: 3px solid var(--ok); color: var(--text-0);
}
.quiz-feedback.miss {
  background: color-mix(in srgb, var(--miss) 10%, transparent);
  border-left: 3px solid var(--miss); color: var(--text-0);
}
.quiz-feedback strong { color: var(--accent); }
@keyframes quiz-fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.quiz-hint-area {
  margin-top: 14px; padding: 10px 14px;
  background: color-mix(in srgb, var(--accent) 6%, transparent);
  border-left: 3px solid var(--accent); border-radius: 4px;
  font-size: 13px; color: var(--text-1); line-height: 1.6;
  display: none;
}
.quiz-hint-area.show { display: block; animation: quiz-fade-in 0.4s ease-out; }
.quiz-nav {
  display: flex; gap: 10px; margin-top: 24px;
  padding-top: 20px; border-top: 1px solid var(--line);
}
.quiz-btn {
  padding: 10px 18px; background: var(--bg-2); border: 1px solid var(--line);
  color: var(--text-1); border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 700;
}
.quiz-btn:hover:not(:disabled) { background: var(--bg-3); color: var(--text-0); border-color: var(--line-hi); }
.quiz-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.quiz-btn.primary { background: var(--accent); color: var(--bg-1); border-color: var(--accent); }
.quiz-btn.primary:hover:not(:disabled) { filter: brightness(1.1); }
.quiz-btn-spacer { flex: 1; }

.quiz-review {
  max-width: 720px; margin: 0 auto; padding: 8px 4px 60px;
}
.quiz-review h2 { font-size: 24px; font-weight: 700; margin: 0 0 18px 0; color: var(--text-0); }
.quiz-review-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-bottom: 28px;
}
.quiz-review-card {
  background: var(--bg-2); border: 1px solid var(--line);
  padding: 16px; border-radius: 6px; text-align: center;
}
.quiz-review-card .label {
  font-size: 11px; color: var(--text-2);
  font-family: 'JetBrains Mono', monospace; margin-bottom: 6px;
}
.quiz-review-card .num {
  font-size: 28px; font-weight: 700; color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
}
.quiz-review-card.score .num { color: var(--ok); }
.quiz-review-list {
  background: var(--bg-2); border: 1px solid var(--line);
  border-radius: 6px; overflow: hidden;
}
.quiz-review-item {
  display: grid; grid-template-columns: 24px 1fr auto; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  align-items: center; font-size: 13px;
}
.quiz-review-item:last-child { border-bottom: none; }
.quiz-review-item .icon {
  width: 18px; height: 18px;
}
.quiz-review-item.ok .icon { color: var(--ok); }
.quiz-review-item.miss .icon { color: var(--miss); }
.quiz-review-item.skipped .icon { color: var(--text-2); }
.quiz-review-item .q { color: var(--text-1); line-height: 1.5; }
.quiz-review-item button {
  padding: 4px 10px; background: transparent; border: 1px solid var(--line);
  color: var(--text-2); border-radius: 4px; cursor: pointer; font-size: 11px;
}
.quiz-review-item button:hover { color: var(--accent); border-color: var(--accent); }
.quiz-review-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: center; }

/* === WhyNowBox / InfoBox 構造化マークアップ (peer dev-album パターン) === */
.why-now, .info-box {
  display: grid; grid-template-columns: 28px 1fr; gap: 12px;
  padding: 14px 16px; border-radius: 6px;
  margin: 18px 0;
  border: 1px solid var(--line);
  background: var(--bg-2);
}
.why-now { border-left: 3px solid var(--accent); }
.why-now__icon, .info-box__icon { width: 20px; height: 20px; color: var(--accent); margin-top: 2px; }
.why-now__title, .info-box h3 {
  margin: 0 0 4px 0; font-size: 13px; font-weight: 700; color: var(--text-0);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
}
.why-now__body, .info-box p, .info-box ul {
  margin: 0; font-size: 13px; color: var(--text-1); line-height: 1.7;
}
.info-box ul { padding-left: 18px; }
.info-box--warn { border-left: 3px solid var(--ylw, #f59e0b); }
.info-box--warn .info-box__icon, .info-box--warn h3 { color: var(--ylw, #f59e0b); }
.info-box--tip { border-left: 3px solid var(--ok, #4ec9a8); }
.info-box--tip .info-box__icon, .info-box--tip h3 { color: var(--ok, #4ec9a8); }

/* === 検索ダイアログ === */
.search-trigger {
  background: transparent; border: 1px solid var(--line); color: var(--text-2);
  padding: 6px 10px; border-radius: 6px; font-size: 12px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
}
.search-trigger:hover { color: var(--text-0); border-color: var(--line-hi); }
.search-trigger kbd {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 1px 4px; background: var(--bg-3); border-radius: 2px; color: var(--text-2);
}
.search-overlay {
  position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
  z-index: 10000; display: flex; align-items: flex-start; justify-content: center;
  padding-top: 80px;
}
.search-overlay[hidden] { display: none; }
.search-modal {
  width: min(640px, calc(100vw - 32px));
  background: var(--bg-1); border: 1px solid var(--line-hi); border-radius: 8px;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
  display: flex; flex-direction: column; max-height: 70vh; overflow: hidden;
}
.search-modal input {
  padding: 16px 18px; font-size: 16px; background: transparent; border: 0;
  color: var(--text-0); border-bottom: 1px solid var(--line);
  font-family: inherit; outline: none;
}
.search-results { overflow-y: auto; flex: 1; }
.search-result {
  display: block; padding: 12px 18px; border-bottom: 1px solid var(--line);
  color: var(--text-1); text-decoration: none; cursor: pointer;
}
.search-result:hover, .search-result.active {
  background: var(--bg-2); color: var(--text-0);
}
.search-result .type {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-2); margin-right: 8px;
  padding: 2px 6px; border-radius: 3px; background: var(--bg-3);
  text-transform: uppercase;
}
.search-result .title { font-weight: 700; font-size: 14px; }
.search-result .body { font-size: 11px; color: var(--text-2); margin-top: 4px; line-height: 1.5; }
.search-modal .empty { padding: 40px 20px; text-align: center; color: var(--text-2); font-size: 13px; }
.search-modal .footer {
  padding: 8px 18px; font-size: 10px; color: var(--text-2);
  border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 14px;
}

.quiz-cta-card {
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 14%, transparent), color-mix(in srgb, var(--accent) 4%, transparent));
  border: 1px solid var(--accent); border-radius: 8px;
  padding: 20px 24px; margin: 24px 0; display: flex; align-items: center; gap: 16px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.quiz-cta-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px -8px var(--accent); }
.quiz-cta-card .icon { width: 32px; height: 32px; color: var(--accent); }
.quiz-cta-card .title { font-size: 16px; font-weight: 700; color: var(--text-0); margin: 0; }
.quiz-cta-card .desc { font-size: 12px; color: var(--text-2); margin: 4px 0 0 0; }
.quiz-cta-card .arrow { color: var(--accent); margin-left: auto; }

/* === ロードマップ画面 === */
.hero {
  margin-bottom: 48px;
}
.hero h1 {
  font-family: 'Archivo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  line-height: 1.2;
}
.hero h1 .accent { color: var(--accent); }
.hero .lead {
  font-size: 16px;
  color: var(--text-1);
  max-width: 720px;
  line-height: 1.7;
}
.hero .lead strong { color: var(--text-0); }
.hero .meta {
  margin-top: 20px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 12px;
}
.hero .meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  font-family: 'JetBrains Mono', monospace;
}
.hero .meta-pill .label {
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-size: 12px;
}
.hero .meta-pill .value { color: var(--ylw); }

.section-label {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-1);
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::before {
  content: ''; width: 10px; height: 10px; background: var(--accent);
}

/* === チャプターグリッド === */
.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.chapter-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 20px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 160px;
}
.chapter-card:hover {
  background: var(--bg-2);
  border-color: var(--line-hi);
  transform: translateY(-1px);
}
.chapter-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 3px; height: 100%;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}
.chapter-card:hover::before { opacity: 1; }
.ch-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.1em;
}
.ch-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 17px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--text-0);
}
.ch-summary {
  font-size: 12px;
  color: var(--text-1);
  line-height: 1.55;
  flex: 1;
}
.ch-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
.ch-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 2px 8px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--text-2);
  letter-spacing: 0.05em;
}
.ch-tag.has-sim {
  background: rgba(0, 212, 212, 0.08);
  border-color: var(--cyan);
  color: var(--cyan);
}
.ch-read-time {
  font-size: 12px;
  color: var(--text-2);
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
}
.chapter-card.done .ch-num {
  color: var(--grn);
}
.chapter-card.done .ch-num::before {
  content: '✓ ';
  color: var(--grn);
}

/* === 章詳細画面 === */
.chapter-detail {
  max-width: 760px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-1);
  text-decoration: none;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  padding: 6px 0;
  margin-bottom: 24px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.back-link:hover { color: var(--accent); }

.ch-detail-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.ch-detail-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.2em;
  margin-bottom: 8px;
}
.ch-detail-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 32px;
  font-weight: 900;
  line-height: 1.25;
  color: var(--text-0);
  margin-bottom: 12px;
}
.ch-detail-lead {
  font-size: 15px;
  color: var(--text-1);
  line-height: 1.75;
  max-width: 640px;
}

.ch-body h3 {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-top: 32px;
  margin-bottom: 12px;
  color: var(--text-0);
  padding-left: 12px;
  border-left: 3px solid var(--accent);
}
.ch-body p {
  margin-bottom: 14px;
  line-height: 1.8;
  color: var(--text-0);
  font-size: 14px;
}
.ch-body p strong {
  color: var(--ylw);
  font-weight: 700;
}
.ch-body ul {
  margin: 12px 0 16px 20px;
  color: var(--text-0);
}
.ch-body li {
  margin-bottom: 6px;
  line-height: 1.7;
}
.ch-body li strong { color: var(--ylw); }

.ch-body .callout {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cyan);
  padding: 16px 20px;
  margin: 20px 0;
  font-size: 13px;
  line-height: 1.7;
}
.ch-body .callout-title {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 6px;
}
.ch-body .callout.warn {
  border-left-color: var(--ylw);
}
.ch-body .callout.warn .callout-title {
  color: var(--ylw);
}

/* 用語集 */
.terms {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 20px;
  margin: 24px 0;
}
.terms h4 {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}
.term-item {
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 16px;
}
.term-item:last-child { border-bottom: none; }
.term-item[id] { scroll-margin-top: 96px; }
.term-item-highlight {
  background: color-mix(in srgb, var(--accent) 18%, transparent);
  border-radius: 4px;
  transition: background-color 1.2s ease-out;
}
.term-name {
  font-weight: 700;
  color: var(--text-0);
  font-size: 13px;
}
.term-name .en {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
  font-weight: 400;
  margin-top: 2px;
}
.term-def {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
}

/* シミュレーターへのリンク */
.sim-link {
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--cyan);
  padding: 20px;
  margin: 24px 0;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  color: var(--text-0);
}
.sim-link:hover {
  background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
  transform: translateY(-1px);
}
.sim-link-icon {
  width: 48px; height: 48px;
  border: 1px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--cyan);
  font-size: 20px;
  flex-shrink: 0;
}
.sim-link-body { flex: 1; }
.sim-link-label {
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-family: 'Archivo', sans-serif;
  font-weight: 800;
  margin-bottom: 4px;
}
.sim-link-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-0);
  margin-bottom: 2px;
}
.sim-link-desc {
  font-size: 12px;
  color: var(--text-2);
}
.sim-link-arrow {
  color: var(--cyan);
  font-size: 20px;
}
.sim-link.pending {
  border-color: var(--line);
  opacity: 0.55;
  cursor: not-allowed;
}
.sim-link.pending:hover {
  transform: none;
}
.sim-link.pending .sim-link-icon {
  border-color: var(--line);
  color: var(--text-2);
}
.sim-link.pending .sim-link-label {
  color: var(--text-2);
}
.sim-link.pending .sim-link-arrow {
  color: var(--text-2);
}

/* さらに学ぶには */
.further {
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 20px;
  margin: 24px 0;
}
.further h4 {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grn);
  margin-bottom: 12px;
}
.further ul {
  margin: 0 0 0 18px;
}
.further li {
  font-size: 12px;
  color: var(--text-1);
  margin-bottom: 6px;
  line-height: 1.6;
}
.further li strong { color: var(--text-0); }

/* 章ナビ */
.ch-nav {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
.ch-nav button {
  flex: 1;
  background: var(--bg-1);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 14px 18px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.ch-nav button:hover:not(:disabled) {
  background: var(--bg-2);
  color: var(--text-0);
  border-color: var(--line-hi);
}
.ch-nav button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.ch-nav button.next { text-align: right; }
.ch-nav .nav-label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.ch-nav .nav-title {
  font-weight: 700;
  color: var(--text-0);
  font-size: 13px;
}

/* マーク完了ボタン */
.mark-done {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 10px 18px;
  font-family: inherit;
  font-size: 12px;
  line-height: 1.4;        /* export-btn と高さ揃え */
  min-height: 40px;
  cursor: pointer;
}
/* ch-actions 内では mark-done の margin-top をリセット (export-btn と並ぶため) */
.ch-actions .mark-done { margin-top: 0; }
.mark-done:hover {
  background: var(--bg-3);
  color: var(--text-0);
}
.mark-done.done {
  background: rgba(42, 222, 122, 0.1);
  border-color: var(--grn);
  color: var(--grn);
}
.mark-done.done::before { content: '✓ '; }

/* 全体的な免責事項 */
.disclaimer {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-left: 3px solid var(--ylw);
  padding: 16px 20px;
  margin: 32px 0 0;
  font-size: 12px;
  color: var(--text-1);
  line-height: 1.7;
}
.disclaimer strong {
  color: var(--ylw);
  display: block;
  margin-bottom: 4px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* 進捗バー */
.progress {
  margin-bottom: 32px;
  padding: 16px 20px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 16px;
}
.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-1);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg-3);
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s;
}
.progress-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}

/* シミュレーター画面のコンテナ */
#sim-container {
  width: 100vw;
  height: calc(100vh - 56px);
  position: relative;
}
#sim-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* レスポンシブ */
@media (max-width: 720px) {
  .hero h1 { font-size: 26px; }
  .chapter-grid { grid-template-columns: 1fr; }
  .term-item { grid-template-columns: 1fr; gap: 4px; }
  .ch-nav { flex-direction: column; }
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-1); }
::-webkit-scrollbar-thumb { background: var(--line); }
::-webkit-scrollbar-thumb:hover { background: var(--line-hi); }

/* === 図（SVG）関連 === */
figure.fig {
  margin: 24px 0;
  padding: 20px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 2px;
}
figure.fig svg {
  display: block;
  width: 100%;
  height: auto;
  max-width: 720px;
  margin: 0 auto;
}
figure.fig figcaption {
  font-size: 12px;
  color: var(--text-2);
  text-align: center;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  line-height: 1.6;
}
figure.fig figcaption strong {
  color: var(--text-1);
}
/* SVG内の共通スタイル用クラス */
.svg-bg { fill: var(--bg-2); }
.svg-line { stroke: var(--line); fill: none; }
.svg-text { fill: var(--text-1); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; }
.svg-text-sm { fill: var(--text-2); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.svg-text-hi { fill: var(--text-0); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; }
.svg-accent { fill: var(--accent); }
.svg-cyan { fill: var(--cyan); }
.svg-ylw { fill: var(--ylw); }

/* 対話型ビジュアライザー */
/* === 対話型ビジュアライザー (slider + 計算値 + SVG bar) === */
.viz-mrr {
  background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px;
  padding: 18px; margin: 16px 0;
}
.viz-mrr h4 { margin: 0 0 12px 0; font-size: 13px; color: var(--text-1); }
.viz-mrr .sliders { display: grid; grid-template-columns: 1fr; gap: 14px; }
.viz-mrr .row { display: grid; grid-template-columns: 80px 1fr 110px; gap: 10px; align-items: center; }
.viz-mrr .row label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-1); }
.viz-mrr .row input[type="range"] { width: 100%; accent-color: var(--accent); }
.viz-mrr .row .value {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  color: var(--accent); text-align: right; font-weight: 700;
}
.viz-mrr .results {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line);
}
.viz-mrr .result-card {
  background: var(--bg-1); padding: 10px; border-radius: 4px;
  text-align: center;
}
.viz-mrr .result-card .label { font-size: 10px; color: var(--text-2); font-family: 'JetBrains Mono', monospace; }
.viz-mrr .result-card .num {
  font-family: 'JetBrains Mono', monospace; font-size: 18px; color: var(--accent);
  font-weight: 700; margin: 4px 0 0 0;
}
.viz-mrr .result-card .unit { font-size: 10px; color: var(--text-2); margin-left: 2px; }
.viz-mrr .bar-svg { width: 100%; height: 110px; margin-top: 12px; }

.interactive-container {
  margin: 24px 0;
  background: var(--bg-1);
  border: 1px solid var(--accent-dim);
  border-left: 3px solid var(--accent);
  padding: 20px;
  border-radius: 2px;
}
.interactive-title {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.interactive-title::before {
  content: '▶';
  font-size: 12px;
}
.interactive-controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.interactive-controls .ic-ctrl {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.interactive-controls label {
  font-size: 12px;
  color: var(--text-1);
  display: flex;
  justify-content: space-between;
}
.interactive-controls label .val {
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
}
.interactive-controls input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  outline: none;
  cursor: pointer;
}
.interactive-controls input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.interactive-controls input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.interactive-hint {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 12px;
  line-height: 1.6;
}
@media (max-width: 720px) {
  .interactive-controls { grid-template-columns: 1fr; }
}

/* =============================================================================
   Chat AI Widget (Phase 1 MVP, vanilla JS)
   ============================================================================= */
.chat-widget { position: fixed; right: 16px; bottom: 16px; z-index: 9999; font-family: inherit; }

/* === サイドバーモード (画面幅 1200+ で opt-in) ===
   注: 未 open 時は default (.chat-widget の right:16px / bottom:16px) を維持。
   以前 .mode-sidebar 自体に top:56px を付与していたため、閉じている FAB が
   右上に張り付くバグが発生していた。 */
.chat-widget.mode-sidebar.open { right: 0; bottom: 0; top: var(--topbar-height); width: 380px; }
.chat-widget.mode-sidebar.open .chat-panel {
  width: 100%; height: 100%; border-radius: 0;
  border-top: 1px solid var(--line-hi); border-right: 0; border-bottom: 0;
  box-shadow: -8px 0 24px rgba(0,0,0,0.30);
}
@media (max-width: 1200px) {
  /* 狭い画面ではサイドバー開いても浮き FAB + パネル形態に降格 */
  .chat-widget.mode-sidebar.open { right: 16px; bottom: 16px; top: auto; width: auto; }
  .chat-widget.mode-sidebar.open .chat-panel {
    width: min(420px, calc(100vw - 32px));
    height: min(600px, calc(100vh - 100px));
    border-radius: 12px; border: 1px solid var(--line-hi);
    box-shadow: 0 16px 48px rgba(0,0,0,0.40);
  }
}
body.chat-sidebar-open { padding-right: 380px; transition: padding-right 0.2s ease; }
@media (max-width: 1200px) { body.chat-sidebar-open { padding-right: 0; } }

.chat-mode-toggle {
  background: transparent; border: 0; cursor: pointer; color: var(--text-1);
  font-size: 14px; padding: 4px 8px; border-radius: 4px;
}
.chat-mode-toggle:hover { background: var(--bg-3); color: var(--text-0); }

.chat-shortcut-hint {
  font-size: 10px; color: var(--text-2); font-family: 'JetBrains Mono', monospace;
  margin-left: 8px;
}

.chat-fab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 18px; border-radius: 28px; border: 0; cursor: pointer;
  background: var(--accent); color: var(--bg-1);
  font-weight: 700; font-size: 13px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.30);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.chat-fab:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
.chat-fab .icon { font-size: 16px; }
.chat-widget.open .chat-fab { display: none; }

.chat-panel {
  width: min(420px, calc(100vw - 32px));
  height: min(600px, calc(100vh - 100px));
  background: var(--bg-1);
  border: 1px solid var(--line-hi);
  border-radius: 12px;
  display: flex; flex-direction: column;
  box-shadow: 0 16px 48px rgba(0,0,0,0.40);
  overflow: hidden;
}
.chat-panel[hidden] { display: none; }
.chat-panel header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-2);
}
.chat-panel header .title { font-weight: 700; font-size: 13px; color: var(--text-0); }
.chat-panel header .tier-pill {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-3); color: var(--text-2); margin-left: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.chat-panel header .tier-pill.invited { background: var(--accent); color: var(--bg-1); }
.chat-panel header .tier-pill.byok { background: var(--cyn, var(--accent)); color: var(--bg-1); }
.chat-panel header .actions { display: flex; gap: 4px; }
.chat-panel header button {
  background: transparent; border: 0; cursor: pointer; color: var(--text-1);
  font-size: 14px; padding: 4px 8px; border-radius: 4px;
}
.chat-panel header button:hover { background: var(--bg-3); color: var(--text-0); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-msg { padding: 10px 12px; border-radius: 8px; max-width: 92%; word-wrap: break-word; white-space: pre-wrap; line-height: 1.6; }
.chat-msg .role { display: block; font-size: 10px; opacity: 0.6; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
.chat-msg-user { align-self: flex-end; background: var(--accent); color: var(--bg-1); }
.chat-msg-user .role { color: var(--bg-1); opacity: 0.7; }
.chat-msg-assistant { align-self: flex-start; background: var(--bg-2); color: var(--text-0); border: 1px solid var(--line); }
.chat-msg-assistant.streaming .content::after {
  content: '▋'; animation: chat-blink 1s infinite; margin-left: 2px; opacity: 0.7;
}
@keyframes chat-blink { 0%, 100% { opacity: 0.7; } 50% { opacity: 0.1; } }
.chat-msg-system { align-self: stretch; background: var(--bg-3); color: var(--text-2); font-size: 12px; text-align: center; border-radius: 4px; }

.chat-empty {
  padding: 16px 12px; color: var(--text-2); font-size: 12px; text-align: center;
}
.chat-empty .suggestion {
  display: block; width: 100%; margin: 6px 0; padding: 8px 10px;
  background: var(--bg-2); color: var(--text-1);
  border: 1px solid var(--line); border-radius: 6px;
  cursor: pointer; font-size: 12px; text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.chat-empty .suggestion:hover { border-color: var(--accent); background: var(--bg-3); color: var(--text-0); }

.chat-form { padding: 10px; border-top: 1px solid var(--line); background: var(--bg-2); }
.chat-form .row { display: flex; gap: 6px; align-items: flex-end; }
.chat-form textarea {
  flex: 1; min-height: 38px; max-height: 140px;
  padding: 8px 10px; resize: none;
  background: var(--bg-1); border: 1px solid var(--line); color: var(--text-0);
  border-radius: 6px; font-family: inherit; font-size: 13px; line-height: 1.4;
}
.chat-form textarea:focus { outline: none; border-color: var(--accent); }
.chat-form button {
  padding: 8px 14px; background: var(--accent); color: var(--bg-1);
  border: 0; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px;
}
.chat-form button:disabled { opacity: 0.4; cursor: not-allowed; }
.chat-form .meta {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 6px; font-size: 10px; color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
}
.chat-form .meta select {
  background: var(--bg-1); border: 1px solid var(--line); color: var(--text-1);
  font-size: 10px; padding: 2px 4px; border-radius: 3px; font-family: inherit;
}
.chat-form .meta select:disabled { opacity: 0.4; }

.chat-settings {
  padding: 14px; border-top: 1px solid var(--line); background: var(--bg-2);
  display: flex; flex-direction: column; gap: 10px;
}
.chat-settings[hidden] { display: none; }
.chat-settings label { display: block; font-size: 11px; color: var(--text-1); margin-bottom: 4px; font-weight: 700; }
.chat-settings input {
  width: 100%; padding: 6px 8px; background: var(--bg-1);
  border: 1px solid var(--line); color: var(--text-0); border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
}
.chat-settings .hint { font-size: 10px; color: var(--text-2); margin-top: 2px; }
.chat-settings .actions { display: flex; gap: 6px; justify-content: flex-end; }

.chat-error { padding: 10px 12px; background: color-mix(in srgb, var(--ylw, #f59e0b) 18%, transparent); border-left: 3px solid var(--ylw, #f59e0b); border-radius: 4px; font-size: 12px; color: var(--text-0); }
.chat-fallback { border-left: 2px dashed var(--text-2); padding-left: 8px; opacity: 0.95; }

          <h4 style="margin-top:16px;">1. びびり振動制御（Chatter Suppression）</h4>
          <p>自励振動は加工精度と工具寿命の宿敵。1958 年の Tlusty の再生型びびり理論を起点に、<strong>Stability Lobe Diagram（SLD）</strong>で安定領域を予測し、主軸回転数や切込みを選ぶ手法が発達しました。</p>
          <ul>
            <li>接続章: 第10章（航空機部品 — びびり振動）、第A6章（Johnson-Cook）</li>

          <h4 style="margin-top:16px;">2. 工具寿命予測と機械学習</h4>
          <p>Taylor 式（1907 年）は 100 年以上使われ続けていますが、実加工では工具材種・被削材ロット・冷却条件の組み合わせが膨大で、単純な経験式では予測精度が頭打ち。<strong>振動・音響・主軸電流</strong>のセンサデータを<strong>機械学習</strong>で処理し、リアルタイム工具摩耗推定するアプローチが 2010 年代以降急成長。</p>

            <li><strong>高圧クーラント（High-Pressure Cooling）</strong>: 70 bar 以上の高圧で切屑を破断</li>
            <li>接続章: 第7章（冷却液）、第8章（工具摩耗）、第A2章（熱伝導）、第A6章（切屑形態）</li>
          </ul>

          </ul>

const QUIZ_KEY = 'cfd-quiz';
const QUIZ_VERSION = 1;
const quizState = {
  index: 0,
  answers: {},      // { qid: { picked: 2 | 'text', correct: bool, hintsUsed: 0..1, ts } }
  hintRevealed: false,
  finished: false,
};
function loadQuiz() {
  try {
    const raw = localStorage.getItem(QUIZ_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj.version !== QUIZ_VERSION) return;
    quizState.answers = obj.answers || {};
    quizState.index = obj.index || 0;
    quizState.finished = !!obj.finished;
  } catch {}
}
function saveQuiz() {
  try {
    localStorage.setItem(QUIZ_KEY, JSON.stringify({
      version: QUIZ_VERSION,
      answers: quizState.answers,
      index: quizState.index,
      finished: quizState.finished,
    }));
  } catch {}
}
function resetQuiz() {
  quizState.index = 0;
  quizState.answers = {};
  quizState.hintRevealed = false;
  quizState.finished = false;
  try { localStorage.removeItem(QUIZ_KEY); } catch {}
}
loadQuiz();

// 多感覚フィードバック (UX Designer 案: WebAudio sine + vibrate)
let _audioCtx = null;
function getAudioCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch { _audioCtx = null; }
  return _audioCtx;
}
function playTone(freq, durMs, gain = 0.12) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // ユーザー操作後に resume が必要な場合 (autoplay policy)
  if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.01);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime + durMs / 1000);
  osc.connect(g).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + durMs / 1000 + 0.02);
}
function feedbackCorrect() {
  playTone(880, 100); setTimeout(() => playTone(1320, 80), 80);
  if (navigator.vibrate) navigator.vibrate(15);
}
function feedbackWrong() {
  playTone(320, 140, 0.08);
  if (navigator.vibrate) navigator.vibrate([20, 60, 20]);
}

// XSS-safe HTML エスケープ
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

  } catch {

function progressSave() {

  document.dispatchEvent(new CustomEvent('cfd:progress-updated', { detail: { id, state: progressState } }));
}
function isChapterComplete(id) {
  return Boolean(progressState.chapters[String(id)]);
}
function getCompletedChapters() {

}

// =============================================================================
// searchIndex — クライアント側 全章+用語横断検索 (Vanilla 実装、依存ゼロ)
// peer dev-album の Fuse.js パターンを Vanilla で軽量化。tokenize + score で十分。
// =============================================================================
const _searchIndex = (() => {
  const items = [];
  for (const ch of CHAPTERS) {
    items.push({
      type: 'chapter',
      id: String(ch.id),
      url: `#/chapter/${ch.id}`,
      title: ch.title,
      label: `第${ch.num}章 ${ch.title}`,
      body: (ch.lead || '') + ' ' + (ch.summary || ''),
    });
    for (const s of (ch.sections || [])) {
      items.push({
        type: 'section',
        id: `${ch.id}::${s.heading}`,
        url: `#/chapter/${ch.id}`,
        title: s.heading,
        label: `${s.heading} (第${ch.num}章)`,
        body: stripTagsForSearch(s.html || ''),
      });
    }
    for (const t of (ch.terms || [])) {
      items.push({
        type: 'term',
        id: `${ch.id}::${t.name}`,
        url: t.anchor ? `#/chapter/${ch.id}/${t.anchor}` : `#/chapter/${ch.id}`,
        title: t.name,
        label: `${t.name} (${t.en || ''})`,
        body: t.def || '',
        anchor: t.anchor || null,
      });
    }
  }
  return items;
})();
function stripTagsForSearch(html) {
  return String(html).replace(/<[^>]+>/g, ' ').replace(/&[a-z]+;/gi, ' ').replace(/\s+/g, ' ').trim();
}
function searchAll(query) {
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const tokens = q.split(/\s+/).filter(Boolean);
  const scored = [];
  for (const item of _searchIndex) {
    const hay = (item.title + ' ' + item.label + ' ' + item.body).toLowerCase();
    let score = 0;
    for (const tok of tokens) {
      if (item.title.toLowerCase().includes(tok)) score += 10;
      if (hay.includes(tok)) score += 1;
    }
    // term type に bias (用語直接ヒットは強い)
    if (item.type === 'term' && score > 0) score += 3;
    if (score > 0) scored.push({ item, score });
  }
  scored.sort((a, b) => b.score - a.score);
  return scored.slice(0, 30).map(x => x.item);
}

// =============================================================================
// レンダリング + ハッシュルーティング
// =============================================================================
//
// URL 規約 (Matlens などからの deep link 用に凍結):
//   <base>/                    — ホーム (章一覧)
//   <base>/#/chapter/<id>      — 章詳細 (id は 'a1', 'a2', ... または 1..10)
//   <base>/#/chapter/<id>#<a>  — 章内 anchor (将来の term anchor 用、現状は未実装)
//   <base>/#/about             — このアプリについて
//   <base>/#/sim               — CFDシミュレーター
//
// 外部からの参照 URL が壊れないよう、章の id は原則変更しない。
// =============================================================================

const mainEl = document.getElementById('app-main');

function hashFromState() {
  if (state.view === 'chapter' && state.chapterId != null) {
    const base = `#/chapter/${state.chapterId}`;
    return state.chapterAnchor ? `${base}/${state.chapterAnchor}` : base;
  }
  if (state.view === 'about') return '#/about';
  if (state.view === 'sim') return '#/sim';
  if (state.view === 'quiz') return '#/quiz';
  return '';
}

function stateFromHash() {
  const h = (location.hash || '').replace(/^#/, '');
  if (!h || h === '/') return { view: 'home', chapterId: null, chapterAnchor: null };
  const m = h.match(/^\/chapter\/([^/#?]+)(?:\/([^/#?]+))?/);
  if (m) {
    const raw = decodeURIComponent(m[1]);
    const id = /^\d+$/.test(raw) ? parseInt(raw, 10) : raw;
    const anchor = m[2] ? decodeURIComponent(m[2]) : null;
    if (CHAPTERS.some(c => String(c.id) === String(id))) {
      return { view: 'chapter', chapterId: id, chapterAnchor: anchor };
    }
    return { view: 'home', chapterId: null, chapterAnchor: null };
  }
  if (h === '/about') return { view: 'about', chapterId: null, chapterAnchor: null };
  if (h === '/sim') return { view: 'sim', chapterId: null, chapterAnchor: null };
  if (h === '/quiz') return { view: 'quiz', chapterId: null, chapterAnchor: null };
  return { view: 'home', chapterId: null, chapterAnchor: null };
}

function syncHashToState() {
  const target = hashFromState();
  // 再帰 hashchange 回避のため pushState ではなく replaceState、差分ある時だけ
  if (target && location.hash !== target) {
    history.replaceState(null, '', target);
  } else if (!target && location.hash) {
    history.replaceState(null, '', location.pathname + location.search);
  }
}

let _suppressHashChange = false;
window.addEventListener('hashchange', () => {
  if (_suppressHashChange) return;
  const next = stateFromHash();
  state.view = next.view;
  state.chapterId = next.chapterId;
  state.chapterAnchor = next.chapterAnchor;
  render();
});

function render() {
  // ページ切替時は音声を停止
  if (typeof stopSpeech === 'function') stopSpeech();

  mainEl.classList.toggle('wide', state.view === 'sim');

  document.querySelectorAll('.nav button[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view || (state.view === 'chapter' && b.dataset.view === 'home'));
  });

  if (state.view === 'home') renderHome();
  else if (state.view === 'chapter') renderChapter();
  else if (state.view === 'about') renderAbout();
  else if (state.view === 'sim') renderSim();
  else if (state.view === 'quiz') renderQuiz();

  _suppressHashChange = true;
  syncHashToState();
  // replaceState は hashchange を発火しないので suppress 解除は同期的でOK
  _suppressHashChange = false;

  // 章アンカー (#/chapter/<id>/<anchor>) があればその要素までスクロール。
  // なければ先頭へ。
  if (state.view === 'chapter' && state.chapterAnchor) {
    const el = document.getElementById(`term-${state.chapterAnchor}`);
    if (el) {
      el.scrollIntoView({ behavior: 'auto', block: 'start' });
      el.classList.add('term-item-highlight');
      setTimeout(() => el.classList.remove('term-item-highlight'), 2400);
      return;
    }
  }
  window.scrollTo(0, 0);
}

function renderSim() {
  mainEl.innerHTML = `

      </div>
    </div>
    <div id="sim-container">
      <iframe id="sim-iframe" title="溝切削シミュレーター"></iframe>
    </div>
  `;

  // テンプレートからシミュレーターHTMLを取り出し、Blob URLとして iframe に渡す
  // Blob方式は srcdoc より確実に独立して動作し、CDNからのimportmap読み込みも安定する
  const tpl = document.getElementById('sim-template');
  const iframe = document.getElementById('sim-iframe');
  if (tpl && iframe) {
    // 前回のBlob URLを解放（メモリリーク防止）
    if (state.lastSimBlobUrl) {
      URL.revokeObjectURL(state.lastSimBlobUrl);
    }
    // textContentだとエンティティがデコードされない場合があるので先頭の改行を削除し、確実にHTML文字列として取得
    let simHtml = tpl.textContent;
    // 先頭の空白・改行を削除して <!DOCTYPE html> を先頭に
    simHtml = simHtml.replace(/^\s+/, '');
    // テンプレ中の閉じ script タグは外側 script の早期終了を防ぐため \ でエスケープしてある。iframe に渡す前に戻す (戻さないと iframe 内の script が閉じず真っ黒になる)
    simHtml = simHtml.replace(/<\\\/script/g, '</script');
    const blob = new Blob([simHtml], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    state.lastSimBlobUrl = url;
    iframe.src = url;
  }

  mainEl.querySelector('[data-back]').addEventListener('click', () => {
    state.view = 'chapter';
    state.chapterId = 7;
    render();
  });
}

function renderQuiz() {
  if (quizState.finished) return renderQuizReview();
  const total = QUIZ_BANK.length;
  const idx = Math.max(0, Math.min(quizState.index, total - 1));
  quizState.index = idx;
  const q = QUIZ_BANK[idx];
  const ans = quizState.answers[q.id];
  const score = Object.values(quizState.answers).filter(a => a.correct).length;
  const answeredCount = Object.keys(quizState.answers).length;
  const progress = (answeredCount / total) * 100;

  const chapterRefStr = String(q.chapterRef);
  const chapterMeta = CHAPTERS.find(c => String(c.id) === chapterRefStr);
  const chapterLabel = chapterMeta ? `第${chapterMeta.num}章 ${chapterMeta.title}` : `第${q.chapterRef}章`;

  let inputHtml = '';
  if (q.type === 'choice') {
    inputHtml = `
      <div class="quiz-choices" role="radiogroup" aria-label="選択肢">
        ${q.choices.map((c, i) => {
          let cls = 'quiz-choice';
          let disabled = '';
          if (ans) {
            disabled = 'disabled';
            if (i === q.answer) cls += ' show-correct';
            if (i === ans.picked && !ans.correct) cls += ' wrong';
          }
          return `<button class="${cls}" data-pick="${i}" ${disabled}
                  aria-label="選択肢 ${i + 1}: ${escapeHtml(c)}">
                    <span class="key">${i + 1}</span><span>${escapeHtml(c)}</span>
                  </button>`;
        }).join('')}
      </div>
    `;
  } else {
    // fill
    const userVal = ans ? escapeHtml(String(ans.picked)) : '';
    inputHtml = `
      <div class="quiz-blank">${escapeHtml(q.blank)}</div>
      <input type="text" class="quiz-blank-input" id="quiz-fill-input"
             placeholder="答えを入力 (Enter で確定)"
             value="${userVal}"
             ${ans ? 'disabled' : ''}
             autocomplete="off" spellcheck="false"
             aria-label="穴埋め入力">
    `;
  }

  const showHint = quizState.hintRevealed || (ans && ans.hintsUsed);
  const hintHtml = q.hint ? `
    <div class="quiz-hint-area ${showHint ? 'show' : ''}" id="quiz-hint">
      <strong>ヒント:</strong> ${escapeHtml(q.hint)}
    </div>
  ` : '';

  let feedbackHtml = '';
  if (ans) {
    feedbackHtml = `
      <div class="quiz-feedback show ${ans.correct ? 'ok' : 'miss'}" role="status" aria-live="polite">
        <strong>${ans.correct ? '正解' : '不正解'}</strong>
        ${ans.correct ? '' : (q.type === 'fill' ? `（正答: <strong>${escapeHtml(q.answer)}</strong>）` : '')}
        <div style="margin-top:6px;">${escapeHtml(q.explanation)}</div>
        ${q.anchor ? `<div style="margin-top:8px; font-size:11px;"><a href="#/chapter/${chapterRefStr}/${q.anchor}" style="color:var(--accent);">→ 該当章で確認</a></div>` : ''}
      </div>
    `;
  }

  mainEl.innerHTML = `
    <div class="quiz-progress" aria-hidden="true">
      <div class="quiz-progress-bar" style="transform: scaleX(${(progress / 100).toFixed(3)})"></div>
    </div>
    <div class="quiz-shell">
      <div class="quiz-meta">
        <span>問 ${idx + 1} / ${total}　<span style="color:var(--text-2);">[${q.difficulty}]</span></span>
        <span>正解 <span class="score">${score}</span> / 解答 ${answeredCount}</span>
      </div>
      <div class="quiz-chapter-tag">${escapeHtml(chapterLabel)}</div>
      <h2 class="quiz-question">${escapeHtml(q.question)}</h2>
      ${inputHtml}
      ${q.type === 'fill' && !ans ? `
        <div style="margin-top:12px; display:flex; gap:8px;">
          <button class="quiz-btn primary" id="quiz-submit-fill">解答する (Enter)</button>
        </div>
      ` : ''}
      ${hintHtml}
      ${feedbackHtml}
      <div class="quiz-nav">
        <button class="quiz-btn" id="quiz-prev" ${idx === 0 ? 'disabled' : ''}>← 前へ</button>
        ${q.hint && !ans ? `<button class="quiz-btn" id="quiz-hint-btn" ${showHint ? 'disabled' : ''}>ヒント</button>` : ''}
        <div class="quiz-btn-spacer"></div>
        <button class="quiz-btn ${ans ? 'primary' : ''}" id="quiz-next">
          ${idx === total - 1 ? (ans ? '採点する →' : 'スキップして次へ') : (ans ? '次へ →' : 'スキップ →')}
        </button>
      </div>
    </div>
  `;

  // Wire up events
  if (q.type === 'choice') {
    mainEl.querySelectorAll('[data-pick]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (ans) return;
        const picked = parseInt(btn.dataset.pick, 10);
        const correct = picked === q.answer;
        quizState.answers[q.id] = {
          picked, correct, hintsUsed: quizState.hintRevealed ? 1 : 0, ts: Date.now(),
        };
        quizState.hintRevealed = false;
        saveQuiz();
        if (correct) feedbackCorrect(); else feedbackWrong();
        render();
      });
    });
  } else {
    const input = mainEl.querySelector('#quiz-fill-input');
    const submit = () => {
      if (ans) return;
      const val = (input.value || '').trim();
      if (!val) return;
      const correct = normalizeAnswer(val) === normalizeAnswer(q.answer);
      quizState.answers[q.id] = {
        picked: val, correct, hintsUsed: quizState.hintRevealed ? 1 : 0, ts: Date.now(),
      };
      quizState.hintRevealed = false;
      saveQuiz();
      if (correct) feedbackCorrect(); else feedbackWrong();
      render();
    };
    if (input) {
      if (!ans) input.focus();
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); submit(); }
      });
    }
    const submitBtn = mainEl.querySelector('#quiz-submit-fill');
    if (submitBtn) submitBtn.addEventListener('click', submit);
  }

  // Hint reveal
  const hintBtn = mainEl.querySelector('#quiz-hint-btn');
  if (hintBtn) {
    hintBtn.addEventListener('click', () => {
      quizState.hintRevealed = true;
      const hintEl = mainEl.querySelector('#quiz-hint');
      if (hintEl) hintEl.classList.add('show');
      hintBtn.disabled = true;
    });
  }

  // Prev / Next
  mainEl.querySelector('#quiz-prev').addEventListener('click', () => {
    if (idx > 0) { quizState.index = idx - 1; quizState.hintRevealed = false; saveQuiz(); render(); }
  });
  mainEl.querySelector('#quiz-next').addEventListener('click', () => {
    if (idx === total - 1) {
      quizState.finished = true;
      saveQuiz();
      render();
    } else {
      quizState.index = idx + 1;
      quizState.hintRevealed = false;
      saveQuiz();
      render();
    }
  });

  // 数字キー (1-4) ショートカット (choice のみ、未解答時)
  if (q.type === 'choice' && !ans) {
    const keyHandler = (e) => {
      if (e.isComposing) return;
      const target = e.target;
      if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) return;
      if (e.key >= '1' && e.key <= '4') {
        const i = parseInt(e.key, 10) - 1;
        if (i < q.choices.length) {
          const btn = mainEl.querySelector(`[data-pick="${i}"]`);
          if (btn && !btn.disabled) btn.click();
        }
      } else if (e.key === 'n' || e.key === 'N') {
        const next = mainEl.querySelector('#quiz-next');
        if (next) next.click();
      }
    };
    document.addEventListener('keydown', keyHandler);
    // クリーンアップ: 次の render 時に重複しないよう mainEl に attach
    if (mainEl._quizKeyHandler) document.removeEventListener('keydown', mainEl._quizKeyHandler);
    mainEl._quizKeyHandler = keyHandler;
  }
}

function normalizeAnswer(s) {
  return String(s).trim().toLowerCase()
    .replace(/[\s　]+/g, '')
    .replace(/[（）]/g, '');
}

function renderQuizReview() {
  const total = QUIZ_BANK.length;
  const answered = Object.keys(quizState.answers).length;
  const correct = Object.values(quizState.answers).filter(a => a.correct).length;
  const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;

  mainEl.innerHTML = `
    <div class="quiz-review">
      <h2>確認テスト 結果</h2>
      <div class="quiz-review-summary">
        <div class="quiz-review-card score">
          <div class="label">正解率</div>
          <div class="num">${accuracy}<span style="font-size:14px;">%</span></div>
        </div>
        <div class="quiz-review-card">
          <div class="label">正解数</div>
          <div class="num">${correct}<span style="font-size:14px;">/${total}</span></div>
        </div>
        <div class="quiz-review-card">
          <div class="label">解答数</div>
          <div class="num">${answered}<span style="font-size:14px;">/${total}</span></div>
        </div>
      </div>
      <div class="quiz-review-list">
        ${QUIZ_BANK.map((q, i) => {
          const a = quizState.answers[q.id];
          const cls = !a ? 'skipped' : (a.correct ? 'ok' : 'miss');
          const iconId = !a ? 'i-close' : (a.correct ? 'i-check' : 'i-warning');
          return `<div class="quiz-review-item ${cls}">
            <svg class="icon"><use href="#${iconId}"/></svg>
            <span class="q">${i + 1}. ${escapeHtml(q.question.slice(0, 60))}${q.question.length > 60 ? '…' : ''}</span>
            <button data-retry="${i}">${a ? 'やり直す' : '解く'}</button>
          </div>`;
        }).join('')}
      </div>
      <div class="quiz-review-actions">
        <button class="quiz-btn" id="quiz-restart">最初から再受験</button>
        <button class="quiz-btn primary" id="quiz-back-home">ホームへ</button>
      </div>
    </div>
  `;

  mainEl.querySelectorAll('[data-retry]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.retry, 10);
      const q = QUIZ_BANK[i];
      if (q) delete quizState.answers[q.id];
      quizState.index = i;
      quizState.finished = false;
      quizState.hintRevealed = false;
      saveQuiz();
      render();
    });
  });
  mainEl.querySelector('#quiz-restart').addEventListener('click', () => {
    if (!confirm(prefs.lang === 'en' ? 'Reset all quiz progress?' : '全クイズ進捗をリセットして最初から始めますか？')) return;
    resetQuiz();
    render();
  });
  mainEl.querySelector('#quiz-back-home').addEventListener('click', () => {
    state.view = 'home'; render();
  });
}

// テーマ切り替え
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  try { localStorage.setItem('cfd-theme', theme); } catch {}
}
function initTheme() {
  let theme = 'dark';
  try {
    const saved = localStorage.getItem('cfd-theme');
    if (saved === 'light' || saved === 'dark') theme = saved;
  } catch {}
  applyTheme(theme);
}
initTheme();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  applyTheme(current === 'light' ? 'dark' : 'light');
});

// 既定の共有 TTS プロキシ (machining-tts Worker)。BYOK や別 Worker 利用時は [設定] で上書き
const DEFAULT_TTS_PROXY_URL = 'https://machining-tts.ito-atsu-mail.workers.dev';

const apiConfig = {
  grokKey: '',
  grokProxyUrl: DEFAULT_TTS_PROXY_URL,
  grokProxySecret: '',   // プロキシに設定した合言葉（任意）
  lastRateLimit: null,   // 直近レスポンスの {limit, remaining, resetAt} | null
};

// レート制限ヘッダ抽出 (Shared モード時のみ値が埋まる)
function extractRateLimit(res) {
  const limit = res.headers.get('X-RateLimit-Limit');
  if (!limit) return null;
  return {
    limit: parseInt(limit) || 0,
    remaining: parseInt(res.headers.get('X-RateLimit-Remaining')) || 0,
    resetAt: parseInt(res.headers.get('X-RateLimit-Reset')) || 0,
    mode: res.headers.get('X-Proxy-Mode') || 'shared',
  };
}

// Grok プロキシエラーの整形
function buildGrokError(res) {
  let msg = `Grok TTS エラー: ${res.status}`;
  if (res.status === 429) {
    msg = '共有プロキシの1日あたり上限に達しました。翌日0:00 UTC以降に再試行するか、[設定]で自分の xAI API キーを登録してください（BYOKなら無制限）。';
  } else if (res.status === 401) {
    msg += '（API キーが無効、またはプロキシ合言葉が違う可能性）';
  } else if (res.status === 503) {
    msg += '（プロキシ側に共有 API キーが未設定です。[設定]で自分の xAI キーを登録してください）';
  }
  return new Error(msg);
}

function loadApiConfig() {
  try {
    const saved = localStorage.getItem('cfd-api');
    if (saved) {
      const obj = JSON.parse(saved);
      if (typeof obj.grokKey === 'string') apiConfig.grokKey = obj.grokKey;
      // Access で塞がれた旧 grok-tts-proxy を保存していた既存ユーザは新 Worker に自動マイグレーション
      if (typeof obj.grokProxyUrl === 'string' && obj.grokProxyUrl.trim()) {
        apiConfig.grokProxyUrl = /grok-tts-proxy/.test(obj.grokProxyUrl) ? DEFAULT_TTS_PROXY_URL : obj.grokProxyUrl;
      }
      if (typeof obj.grokProxySecret === 'string') apiConfig.grokProxySecret = obj.grokProxySecret;
    }
  } catch {}
}
function saveApiConfig() {
  try {
    localStorage.setItem('cfd-api', JSON.stringify(apiConfig));
  } catch {}
}
loadApiConfig();
