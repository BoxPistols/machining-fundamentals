<style>
:root {
  /* ダークテーマ（デフォルト） */
  --bg-0: #0a0d10;
  --bg-1: #11151a;
  --bg-2: #1a2026;
  --bg-3: #242c34;
  --line: #2f3942;
  --line-hi: #3d4852;
  --text-0: #e8ecef;
  --text-1: #9aa5ad;
  --text-2: #5f6b74;
  --accent: #ff6b1a;
  --accent-dim: #8a3a0e;
  --cyan: #00a8a8;
  --ylw: #d4a000;
  --grn: #2ade7a;
  --red: #ff3b3b;
  /* ダークでは cyan/ylw はそのまま明るく保つ */
  --cyan: #00d4d4;
  --ylw: #ffc940;
}

/* ライトテーマ */
[data-theme="light"] {
  --bg-0: #f8f9fa;
  --bg-1: #ffffff;
  --bg-2: #f0f2f5;
  --bg-3: #e2e6ea;
  --line: #d4d9de;
  --line-hi: #c0c6cc;
  --text-0: #1a1f24;
  --text-1: #4a5560;
  --text-2: #7a8590;
  --accent: #e05a0c;
  --accent-dim: #ffd4b8;
  --cyan: #0099a0;
  --ylw: #b88a00;
  --grn: #1a9f5a;
  --red: #d42626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg-0);
  color: var(--text-0);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
code, .mono { font-family: 'JetBrains Mono', monospace; }

/* === ヘッダー === */
.topbar {
  height: 56px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar::before {
  content: ''; position: absolute; left: 0; top: 0;
  width: 3px; height: 100%; background: var(--accent);
}
.brand {
  font-family: 'Archivo', sans-serif;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 0.05em;
}
.brand .sub {
  color: var(--text-2);
  font-weight: 400;
  font-size: 12px;
  margin-left: 12px;
}
.nav {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.nav button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-1);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.12s;
  letter-spacing: 0.05em;
}
.nav button:hover {
  background: var(--bg-2);
  color: var(--text-0);
}
.nav button.active {
  background: var(--accent-dim);
  color: var(--text-0);
  border-color: var(--accent);
}
[data-theme="light"] .nav button.active {
  color: var(--accent);
  background: var(--accent-dim);
}

/* テーマトグル */
.theme-toggle {
  margin-left: 8px;
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.theme-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}
.theme-icon-dark, .theme-icon-light { display: none; }
:root .theme-icon-light { display: inline; }
[data-theme="light"] .theme-icon-dark { display: inline; }
[data-theme="light"] .theme-icon-light { display: none; }

/* === 音声モード === */
.voice-toggle {
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.voice-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}
.voice-icon-off, .voice-icon-on { display: none; }
.voice-icon-off { display: inline; }
body.voice-enabled .voice-icon-off { display: none; }
body.voice-enabled .voice-icon-on { display: inline; }
body.voice-enabled .voice-toggle {
  background: var(--accent-dim) !important;
  border-color: var(--accent) !important;
}

/* 読み上げコントロールパネル */
.voice-panel {
  background: var(--bg-1);
  border: 1px solid var(--accent);
  padding: 16px 20px;
  margin-bottom: 24px;
  display: none;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
body.voice-enabled .voice-panel {
  display: flex;
}
.voice-panel-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
.voice-panel-section + .voice-panel-section {
  padding-left: 16px;
  border-left: 1px solid var(--line);
}
.voice-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  min-width: 36px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.voice-btn:hover {
  background: var(--bg-3);
  border-color: var(--line-hi);
}
.voice-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.voice-btn.primary:hover {
  background: var(--accent);
  opacity: 0.9;
}
.voice-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.voice-mode-toggle {
  display: flex;
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 2px;
}
.voice-mode-toggle button {
  background: transparent;
  border: none;
  color: var(--text-1);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.voice-mode-toggle button.active {
  background: var(--accent);
  color: #fff;
}
.voice-panel label {
  font-size: 12px;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
}
.voice-panel input[type=range] {
  width: 100px;
  height: 4px;
  -webkit-appearance: none;
  background: var(--bg-3);
  border: 1px solid var(--line);
  outline: none;
  cursor: pointer;
}
.voice-panel input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.voice-panel input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg-0);
}
.voice-panel select {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 6px 10px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  max-width: 200px;
}
.voice-status {
  font-size: 12px;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}
.voice-status.playing {
  color: var(--accent);
}
.voice-status.playing::before {
  content: '● ';
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* 現在読み上げ中のセクション */
.ch-body h3[data-voice-current="true"],
.ch-body [data-voice-section][data-voice-current="true"] {
  background: var(--accent-dim);
  border-left-width: 6px !important;
  transition: all 0.2s;
}
body.voice-enabled .ch-body h3 {
  scroll-margin-top: 80px;
  transition: all 0.2s;
}

/* 要約モード表示の案内 */
.voice-summary-note {
  background: var(--bg-1);
  border: 1px solid var(--cyan);
  border-left: 3px solid var(--cyan);
  padding: 14px 18px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
  display: none;
}
body.voice-enabled.voice-mode-summary .voice-summary-note {
  display: block;
}
.voice-summary-note strong {
  color: var(--cyan);
  display: block;
  margin-bottom: 6px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

@media (max-width: 720px) {
  .voice-panel-section + .voice-panel-section {
    padding-left: 0;
    border-left: none;
  }
}

/* === テキスト書き出しダイアログ === */
.dialog-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  animation: dialogFadeIn 0.15s ease-out;
}
[data-theme="light"] .dialog-backdrop {
  background: rgba(0, 0, 0, 0.4);
}

/* 設定ボタン */
.settings-toggle {
  width: 36px;
  padding: 6px 8px !important;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px !important;
  background: var(--bg-2) !important;
  border: 1px solid var(--line) !important;
}
.settings-toggle:hover {
  background: var(--bg-3) !important;
  border-color: var(--line-hi) !important;
}

/* 設定モーダル内のフォーム */
.settings-section {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.settings-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.settings-section h3 {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.settings-section p.desc {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.7;
  margin-bottom: 14px;
}
.settings-section p.desc strong { color: var(--ylw); }
.settings-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.settings-field label {
  font-size: 12px;
  color: var(--text-1);
  font-weight: 600;
}
.settings-field input[type="password"],
.settings-field input[type="text"] {
  background: var(--bg-0);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
}
.settings-field input:focus {
  border-color: var(--accent);
}
.settings-field .field-hint {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
}
.settings-field .field-hint a {
  color: var(--cyan);
  text-decoration: none;
}
.settings-field .field-hint a:hover {
  text-decoration: underline;
}
.settings-field-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 8px;
  display: inline-block;
  margin-left: 8px;
}
.settings-field-status.ok {
  color: var(--grn);
  background: rgba(42, 222, 122, 0.1);
}
.settings-field-status.ng {
  color: var(--red);
  background: rgba(255, 59, 59, 0.1);
}
.settings-warning {
  background: var(--bg-2);
  border: 1px solid var(--ylw);
  border-left: 3px solid var(--ylw);
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-1);
}
.settings-warning strong {
  color: var(--ylw);
  display: block;
  margin-bottom: 6px;
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.settings-cache-info {
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 13px;
  color: var(--text-1);
  margin-top: 12px;
}
.settings-cache-info .cache-stats {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  font-weight: 600;
}

/* プロバイダー選択用（音声パネル内） */
.voice-panel select.provider-select {
  min-width: 140px;
}
.voice-provider-note {
  font-size: 11px;
  color: var(--text-2);
  margin-left: 4px;
  font-family: 'JetBrains Mono', monospace;
}
.voice-provider-note.configured {
  color: var(--grn);
}
.voice-provider-note.missing {
  color: var(--red);
}
@keyframes dialogFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.dialog {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 2px;
  width: 100%;
  max-width: 780px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  animation: dialogScaleIn 0.18s ease-out;
}
@keyframes dialogScaleIn {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.dialog-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.dialog-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-0);
  display: flex;
  align-items: center;
  gap: 10px;
}
.dialog-title::before {
  content: '📝';
  font-size: 16px;
}
.dialog-close {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-1);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 12px;
  cursor: pointer;
  line-height: 1;
}
.dialog-close:hover {
  background: var(--bg-2);
  color: var(--text-0);
}
.dialog-toolbar {
  padding: 14px 24px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.dialog-toolbar-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.dialog-toolbar .export-mode-toggle {
  display: flex;
  background: var(--bg-1);
  border: 1px solid var(--line);
  padding: 2px;
}
.dialog-toolbar .export-mode-toggle button {
  background: transparent;
  border: none;
  color: var(--text-1);
  padding: 6px 14px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
}
.dialog-toolbar .export-mode-toggle button.active {
  background: var(--accent);
  color: #fff;
}
.dialog-toolbar label {
  font-size: 12px;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
.dialog-toolbar input[type="checkbox"] {
  accent-color: var(--accent);
  cursor: pointer;
}
.dialog-stats {
  font-size: 12px;
  color: var(--text-2);
  font-family: 'JetBrains Mono', monospace;
}
.dialog-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  min-height: 200px;
}
.dialog-textarea {
  width: 100%;
  min-height: 360px;
  background: var(--bg-0);
  border: 1px solid var(--line);
  color: var(--text-0);
  font-family: 'Noto Sans JP', 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.9;
  padding: 16px;
  resize: vertical;
  outline: none;
  letter-spacing: 0.02em;
}
.dialog-textarea:focus {
  border-color: var(--accent);
}
.dialog-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--bg-2);
  flex-wrap: wrap;
}
.dialog-hint {
  font-size: 12px;
  color: var(--text-2);
  flex: 1;
  min-width: 200px;
}
.dialog-actions {
  display: flex;
  gap: 8px;
}
.dialog-btn {
  background: var(--bg-1);
  border: 1px solid var(--line);
  color: var(--text-0);
  padding: 10px 16px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.dialog-btn:hover {
  background: var(--bg-3);
  border-color: var(--line-hi);
}
.dialog-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.dialog-btn.primary:hover {
  opacity: 0.9;
}
.dialog-btn.copied {
  background: var(--grn) !important;
  border-color: var(--grn) !important;
  color: var(--bg-0) !important;
}

/* テキスト書き出しボタン（章ページとロードマップ） */
.export-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text-1);
  padding: 10px 18px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  margin-left: 10px;
}
.export-btn:hover {
  background: var(--bg-3);
  color: var(--text-0);
  border-color: var(--line-hi);
}
.export-btn.header-style {
  margin-left: 0;
  padding: 8px 14px;
}

/* 章ページ下部のボタン群 */
.ch-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 24px;
}

@media (max-width: 720px) {
  .dialog-toolbar { gap: 8px; }
  .dialog-footer { flex-direction: column; align-items: stretch; }
  .dialog-actions { justify-content: stretch; }
  .dialog-btn { flex: 1; justify-content: center; }
}

/* === メインレイアウト === */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.main.wide {
  max-width: none;
  padding: 0;
}

/* === ロードマップ画面 === */
.hero {
  margin-bottom: 48px;
}
.hero h1 {
  font-family: 'Archivo', sans-serif;
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -0.01em;
  margin-bottom: 12px;
  line-height: 1.2;
}
.hero h1 .accent { color: var(--accent); }
.hero .lead {
  font-size: 16px;
  color: var(--text-1);
  max-width: 720px;
  line-height: 1.7;
}
.hero .lead strong { color: var(--text-0); }
.hero .meta {
  margin-top: 20px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;

const state = {
  view: 'home',      // 'home' | 'chapter' | 'about' | 'sim'
  chapterId: null,
  doneChapters: loadDone(),
};

function loadDone() {
  try {
    const s = sessionStorage.getItem('cfd-done');
    return s ? JSON.parse(s) : [];
  } catch { return []; }
}
function saveDone() {
  try {
    sessionStorage.setItem('cfd-done', JSON.stringify(state.doneChapters));
  } catch {}
}

// =============================================================================

const mainEl = document.getElementById('app-main');

function render() {
  // ページ切替時は音声を停止
  if (typeof stopSpeech === 'function') stopSpeech();

  mainEl.classList.toggle('wide', state.view === 'sim');

  document.querySelectorAll('.nav button[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view || (state.view === 'chapter' && b.dataset.view === 'home'));
  });

  if (state.view === 'home') renderHome();
  else if (state.view === 'chapter') renderChapter();
  else if (state.view === 'about') renderAbout();
  else if (state.view === 'sim') renderSim();

  window.scrollTo(0, 0);
}

const apiConfig = {
  grokKey: '',
  grokProxyUrl: '',      // 例: https://grok-tts-proxy.username.workers.dev

};

// レート制限ヘッダ抽出 (Shared モード時のみ値が埋まる)
function extractRateLimit(res) {
  const limit = res.headers.get('X-RateLimit-Limit');
  if (!limit) return null;
  return {
    limit: parseInt(limit) || 0,
    remaining: parseInt(res.headers.get('X-RateLimit-Remaining')) || 0,
    resetAt: parseInt(res.headers.get('X-RateLimit-Reset')) || 0,
    mode: res.headers.get('X-Proxy-Mode') || 'shared',
  };
}

// Grok プロキシエラーの整形
function buildGrokError(res) {
  let msg = `Grok TTS エラー: ${res.status}`;
  if (res.status === 429) {
    msg = '共有プロキシの1日あたり上限に達しました。翌日0:00 UTC以降に再試行するか、⚙設定で自分の xAI API キーを登録してください（BYOKなら無制限）。';
  } else if (res.status === 401) {
    msg += '（API キーが無効、またはプロキシ合言葉が違う可能性）';
  } else if (res.status === 503) {
    msg += '（プロキシ側に共有 API キーが未設定です。⚙設定で自分の xAI キーを登録してください）';
  }
  return new Error(msg);
}

}

}

// =============================================================================
// IndexedDB 音声キャッシュ
// =============================================================================
// キー形式: provider + ':' + voice_id + ':' + rate + ':' + hash(text)
// 値: { blob: Blob, createdAt: number, size: number }

const cacheDB = {
  db: null,
  DB_NAME: 'cfd-tts-cache',
  STORE: 'audio',
  VERSION: 1,
};

async function openCacheDB() {
  if (cacheDB.db) return cacheDB.db;
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(cacheDB.DB_NAME, cacheDB.VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(cacheDB.STORE)) {
        const store = db.createObjectStore(cacheDB.STORE, { keyPath: 'key' });
        store.createIndex('createdAt', 'createdAt');
      }
    };
    req.onsuccess = (e) => {
      cacheDB.db = e.target.result;
      resolve(cacheDB.db);
    };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function cacheGet(key) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readonly');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.get(key);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function cachePut(key, blob) {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readwrite');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.put({ key, blob, createdAt: Date.now(), size: blob.size });
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function cacheStats() {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readonly');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.getAll();
      req.onsuccess = () => {
        const all = req.result || [];
        const total = all.reduce((a, b) => a + (b.size || 0), 0);
        resolve({ count: all.length, bytes: total });
      };
      req.onerror = () => resolve({ count: 0, bytes: 0 });
    });
  } catch { return { count: 0, bytes: 0 }; }
}

async function cacheClear() {
  try {
    const db = await openCacheDB();
    return new Promise((resolve) => {
      const tx = db.transaction(cacheDB.STORE, 'readwrite');
      const store = tx.objectStore(cacheDB.STORE);
      const req = store.clear();
      req.onsuccess = () => resolve(true);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

// 簡易ハッシュ（キャッシュキー用）
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return h.toString(36);
}

// =============================================================================
// TTSプロバイダー抽象化
// =============================================================================

// 各プロバイダーは以下のインターフェースを実装:
//   id: 識別子
//   label: 表示名
//   requiresApiKey: bool
//   isConfigured(): bool
//   getVoices(): [{id, label, lang}]
//   synthesize(text, opts): Promise<Blob>  // opts: {voiceId, rate, lang}
//   （Web Speech API のみ）speak(text, opts, utterHandlers): SpeechSynthesisUtterance

const providers = {
  // ----- ブラウザ内蔵（Web Speech API） -----
  browser: {
    id: 'browser',
    label: 'ブラウザ内蔵（無料）',
    requiresApiKey: false,
    isConfigured: () => 'speechSynthesis' in window,
    getVoices() {
      if (!('speechSynthesis' in window)) return [];
      return window.speechSynthesis.getVoices()
        .filter(v => v.lang && (v.lang.startsWith('ja') || v.lang.startsWith('en')))
        .sort((a, b) => {
          const aJa = a.lang.startsWith('ja') ? 0 : 1;
          const bJa = b.lang.startsWith('ja') ? 0 : 1;
          return aJa - bJa;
        })
        .map(v => ({ id: v.voiceURI, label: `${v.name} (${v.lang})`, lang: v.lang, _raw: v }));
    },
    // browserプロバイダーはsynthesize不要（Web Speech APIで直接speakする）
    synthesize: null,
  },

  // ----- xAI Grok TTS -----
  // 2モード: BYOK (自分の xAI キー) / Shared (プロキシ側の共有キー、1日N回制限)
  grok: {
    id: 'grok',
    label: 'xAI Grok TTS（$4.20/1M文字）',
    requiresApiKey: false, // プロキシが共有キーを持っていれば鍵なしでも動く
    isConfigured: () => !!apiConfig.grokProxyUrl,
    getVoices() {
      return [
        { id: 'ara', label: 'Ara（温かく親しみやすい）', lang: 'ja' },
        { id: 'eve', label: 'Eve（エネルギッシュ）', lang: 'ja' },
        { id: 'leo', label: 'Leo（権威的・力強い）', lang: 'ja' },
        { id: 'rex', label: 'Rex（自信・プロフェッショナル）', lang: 'ja' },
        { id: 'sal', label: 'Sal（滑らか・汎用）', lang: 'ja' },
      ];
    },
    async synthesize(text, opts) {
      if (!apiConfig.grokProxyUrl) {
        throw new Error('Grok プロキシ URL が未設定です。⚙設定から登録してください。');
      }
      const voiceId = opts.voiceId || 'ara';
      const proxyUrl = apiConfig.grokProxyUrl.replace(/\/+$/, '');
      const endpoint = `${proxyUrl}/v1/tts`;
      const headers = { 'Content-Type': 'application/json' };
      // BYOK: キーがあれば送る (→ Worker 側で無制限モードになる)
      if (apiConfig.grokKey) {
        headers['Authorization'] = `Bearer ${apiConfig.grokKey}`;
      }
      if (apiConfig.grokProxySecret) {
        headers['X-Proxy-Secret'] = apiConfig.grokProxySecret;
      }
      const res = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          text,
          voice_id: voiceId,
          language: opts.lang || 'ja',
          output_format: { codec: 'mp3', sample_rate: 24000, bit_rate: 128000 },
        }),
      });
      // レート制限ヘッダ取得 (Shared モードのみ付与される)
      apiConfig.lastRateLimit = extractRateLimit(res);
      if (!res.ok) {
        throw buildGrokError(res);
      }
      return await res.blob();
    },
  },
};

function getActiveProvider() {
  return providers[voice.provider] || providers.browser;

// テキスト正規化：HTMLタグ除去、記号整形、読み上げに不要な文字を削除
function normalizeForSpeech(text) {
  if (!text) return '';
  // HTMLタグ除去
  let t = text.replace(/<[^>]+>/g, ' ');
  // HTMLエンティティ
  t = t.replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&')
       .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
       .replace(/&quot;/g, '"').replace(/&#39;/g, "'");
  // 読み上げに邪魔な記号（複数連続スペース・改行）
  t = t.replace(/\s+/g, ' ').trim();
  // 一部の記号を読みやすく置換
  t = t.replace(/・/g, '、');
  t = t.replace(/＝|=/g, 'イコール');
  t = t.replace(/→/g, '、');
  t = t.replace(/〜|～/g, 'から');
  t = t.replace(/★/g, '');
  // 長すぎる文字列は区切る
  return t;
}

// 章のテキストをキュー化（セクション単位）
function buildQueue(ch) {
  const q = [];
  if (voice.mode === 'summary') {
    // 要約モード：voiceSummary 1本
    if (ch.voiceSummary) {
      q.push({
        text: normalizeForSpeech(ch.voiceSummary),
        sectionIdx: -1,  // 全体
      });
    }
  } else {
    // 全文モード：導入＋各セクション
    q.push({ text: normalizeForSpeech(ch.title + '。' + ch.lead), sectionIdx: -1 });
    ch.sections.forEach((s, i) => {
      const heading = normalizeForSpeech(s.heading);
      const body = normalizeForSpeech(s.html);
      // 長すぎる場合は文単位で分割（Chrome対策）
      const combined = heading + '。' + body;
      const chunks = splitLongText(combined, 180);
      chunks.forEach((chunk, j) => {
        q.push({
          text: chunk,
          sectionIdx: i,
          isFirstOfSection: j === 0,
        });
      });
    });
  }
  return q;
}

function splitLongText(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const result = [];
  const sentences = text.split(/(?<=[。！？])/);
  let buffer = '';
  for (const s of sentences) {
    if ((buffer + s).length <= maxLen) {
      buffer += s;
    } else {
      if (buffer) result.push(buffer);
      buffer = s;
    }
  }
  if (buffer) result.push(buffer);
  return result.length > 0 ? result : [text];
}

function stopSpeech() {
  // 中断フラグを立てて、onend/onerrorで次に進まないようにする
  if (voice.markInterrupted) voice.markInterrupted();

  // Web Speech API の停止
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  // HTML5 Audio の停止
  if (voice.currentAudio) {
    try {
      voice.currentAudio.pause();
      voice.currentAudio.src = '';
    } catch {}
    voice.currentAudio = null;
  }
  // synthesize中のfetchを中断
  if (voice.currentSynthAbort) {
    try { voice.currentSynthAbort.abort(); } catch {}
    voice.currentSynthAbort = null;
  }

  voice.queue = [];
  voice.currentIdx = -1;
  voice.playing = false;
  voice.currentUtterance = null;
  voice.markInterrupted = null;
  updateVoiceUI();
  // ハイライト解除
  document.querySelectorAll('[data-voice-current]').forEach(el => {
    el.removeAttribute('data-voice-current');
  });
}

function playQueue() {
  if (voice.queue.length === 0) return;
  voice.currentIdx++;
  speakCurrent();
}

// セクションハイライトとスクロール
function updateHighlight(item) {
  document.querySelectorAll('[data-voice-current]').forEach(el => {
    el.removeAttribute('data-voice-current');
  });
  if (item.sectionIdx >= 0) {
    const h3 = document.querySelector(`h3[data-voice-section="${item.sectionIdx}"]`);
    if (h3) {
      h3.setAttribute('data-voice-current', 'true');
      if (item.isFirstOfSection) {
        h3.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }
}

// 現在の voice.currentIdx のキュー項目を再生
// プロバイダーに応じて Web Speech API or HTML5 Audio を使用
function speakCurrent() {
  if (voice.currentIdx < 0 || voice.currentIdx >= voice.queue.length) {
    // 終了処理
    voice.playing = false;
    voice.currentIdx = -1;
    voice.currentUtterance = null;
    voice.currentAudio = null;
    updateVoiceUI();
    document.querySelectorAll('[data-voice-current]').forEach(el => {
      el.removeAttribute('data-voice-current');
    });
    return;
  }
  const item = voice.queue[voice.currentIdx];
  const provider = getActiveProvider();

  // 中断フラグ
  let interrupted = false;
  voice.markInterrupted = () => { interrupted = true; };

  if (provider.id === 'browser') {
    // ---- Web Speech API ----
    if (!('speechSynthesis' in window)) {
      alert('お使いのブラウザは Web Speech API に対応していません');
      stopSpeech();
      return;
    }
    const utter = new SpeechSynthesisUtterance(item.text);
    utter.lang = 'ja-JP';
    utter.rate = voice.rate;
    // 音声選択
    const voiceURI = voice.selectedVoiceByProvider.browser || voice.selectedVoiceURI;
    if (voiceURI) {
      const v = voice.availableVoices.find(x => x.voiceURI === voiceURI);
      if (v) utter.voice = v;
    }
    utter.onstart = () => {
      voice.playing = true;
      updateVoiceUI();
      updateHighlight(item);
    };
    utter.onend = () => {
      if (interrupted) return;
      if (voice.playing) playQueue();
    };
    utter.onerror = (e) => {
      if (interrupted) return;
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      console.warn('Speech error:', e);
      if (voice.playing) playQueue();
    };
    voice.currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  } else {
    // ---- API型プロバイダー（Grok等）：synthesize → Audio再生 ----
    playSynthesized(item, provider, interrupted);
  }
}

async function playSynthesized(item, provider, interruptedFlagClosure) {
  // キャッシュキー（rateは含めない：ブラウザ側でplaybackRateで制御するため、同一音声で速度変更可能）
  const voiceId = voice.selectedVoiceByProvider[provider.id] || provider.getVoices()[0]?.id;
  const cacheKey = `${provider.id}:${voiceId}:${simpleHash(item.text)}`;

  // ステータス表示：生成中
  const status = document.getElementById('vc-status');
  if (status) status.textContent = '音声生成中...';

  let blob = null;

  // キャッシュ確認
  try {
    blob = await cacheGet(cacheKey);
  } catch {}

  // 中断チェック
  if (voice.markInterrupted && !voice.playing) return;

  if (!blob) {
    // 新規生成
    try {
      voice.currentSynthAbort = new AbortController();
      blob = await provider.synthesize(item.text, {
        voiceId,
        rate: voice.rate,
        lang: 'ja',
      });
      voice.currentSynthAbort = null;
      // キャッシュに保存
      cachePut(cacheKey, blob);
    } catch (e) {
      voice.currentSynthAbort = null;
      if (e.name === 'AbortError') return;
      console.error('TTS synthesize error:', e);
      alert(`音声生成に失敗しました：${e.message}`);
      stopSpeech();
      return;
    }
  }

  // 中断チェック（生成中に停止された場合）
  if (!voice.playing) return;

  // Audio で再生
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  audio.playbackRate = voice.rate;
  voice.currentAudio = audio;

  audio.addEventListener('play', () => {
    voice.playing = true;
    updateVoiceUI();
    updateHighlight(item);
  });
  audio.addEventListener('ended', () => {
    URL.revokeObjectURL(url);
    voice.currentAudio = null;
    if (!voice.playing) return;
    playQueue();
  });
  audio.addEventListener('error', (e) => {
    URL.revokeObjectURL(url);
    voice.currentAudio = null;
    if (!voice.playing) return;
    console.warn('Audio playback error:', e);
    playQueue();
  });

  try {
    await audio.play();
  } catch (e) {
    URL.revokeObjectURL(url);
    if (e.name === 'AbortError') return;
    console.warn('Audio play failed:', e);
  }
}

// 再生中のパラメータ変更：現在のセクションを打ち切って新しい設定で再開
function restartCurrentIfPlaying() {
  if (!voice.playing || voice.currentIdx < 0) return;
  const provider = getActiveProvider();
  // 速度変更のみの場合、HTML5 Audioなら playbackRate をその場で変えるだけで済む
  if (provider.id !== 'browser' && voice.currentAudio) {
    voice.currentAudio.playbackRate = voice.rate;
    return;
  }
  // それ以外（音声変更、プロバイダー変更、Web Speech API の速度変更）
  // は完全再生成
  if (voice.markInterrupted) voice.markInterrupted();
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  if (voice.currentAudio) {
    try { voice.currentAudio.pause(); } catch {}
    voice.currentAudio = null;
  }
  if (voice.currentSynthAbort) {
    try { voice.currentSynthAbort.abort(); } catch {}
    voice.currentSynthAbort = null;
  }
  setTimeout(() => {
    if (voice.playing) {
      speakCurrent();
    }
  }, 100);
}

function updateVoiceUI() {
  const status = document.getElementById('vc-status');
  const playBtn = document.getElementById('vc-play');
  const pauseBtn = document.getElementById('vc-pause');
  const stopBtn = document.getElementById('vc-stop');
  if (!status || !playBtn) return;
  if (voice.playing) {
    status.textContent = `再生中 ${voice.currentIdx + 1} / ${voice.queue.length}`;
    status.classList.add('playing');
    playBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
  } else if (voice.queue.length > 0 && voice.currentIdx >= 0) {
    status.textContent = '一時停止中';
    status.classList.remove('playing');
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = false;
  } else {
    status.textContent = '待機中';
    status.classList.remove('playing');
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
  }
}

function populateProviderSelect() {
  const sel = document.getElementById('vc-provider');
  if (!sel) return;
  sel.innerHTML = '';
  Object.values(providers).forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    let label = p.label;
    if (p.requiresApiKey && !p.isConfigured()) {
      label += ' ⚠ 未設定';
    }
    opt.textContent = label;
    if (voice.provider === p.id) opt.selected = true;
    sel.appendChild(opt);
  });
}

function populateVoiceSelect() {
  const sel = document.getElementById('vc-voice');
  if (!sel) return;
  sel.innerHTML = '';

  const provider = getActiveProvider();
  // Web Speech APIの場合は、voiceschangedイベント後でないと取れないことがある
  const voices = provider.getVoices();

  if (voices.length === 0) {
    const opt = document.createElement('option');
    opt.textContent = '（読み込み中）';
    sel.appendChild(opt);
    // Web Speech APIなら再試行
    if (provider.id === 'browser') {
      setTimeout(() => {
        loadVoices();
        if (provider.getVoices().length > 0) populateVoiceSelect();
      }, 300);
    }
    return;
  }

  // 現在のプロバイダー用の選択済み音声
  const currentSelected = voice.selectedVoiceByProvider[provider.id] ||
    (provider.id === 'browser' ? voice.selectedVoiceURI : null) ||
    voices[0].id;

  voices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.id;
    opt.textContent = v.label;
    if (currentSelected === v.id) opt.selected = true;
    sel.appendChild(opt);
  });

  // availableVoices（browser用）を更新
  if (provider.id === 'browser') {
    voice.availableVoices = voices.map(x => x._raw);
    if (!voice.selectedVoiceURI) {
      voice.selectedVoiceURI = voices[0].id;
    }
  }
  // selectedVoiceByProvider も初期化
  if (!voice.selectedVoiceByProvider[provider.id]) {
    voice.selectedVoiceByProvider[provider.id] = voices[0].id;
    saveVoicePrefs();
  }
}

function initVoicePanel(ch) {
  // 章切り替え時は必ず停止
  stopSpeech();

  const panel = document.getElementById('voice-panel');
  if (!panel) return;

  populateVoiceSelect();

  // 速度スライダー初期値
  const rateInput = document.getElementById('vc-rate');
  const rateVal = document.getElementById('vc-rate-val');
  rateInput.value = voice.rate;
  rateVal.textContent = voice.rate.toFixed(1) + 'x';

  // 速度変更：ドラッグ中は表示更新のみ、離したときに再生に反映
  let rateDebounce = null;
  rateInput.addEventListener('input', (e) => {
    voice.rate = parseFloat(e.target.value);
    rateVal.textContent = voice.rate.toFixed(1) + 'x';
    saveVoicePrefs();
    // 再生中なら、少し遅延させて現在のセクションから新しい速度で再開
    // （HTML5 Audio の場合は restartCurrentIfPlaying 内で playbackRate を即反映）
    if (voice.playing) {
      if (rateDebounce) clearTimeout(rateDebounce);
      rateDebounce = setTimeout(() => {
        restartCurrentIfPlaying();
      }, 300);
    }
  });
  // ドラッグ終了時は即座に反映（確定タイミング）
  rateInput.addEventListener('change', () => {
    if (voice.playing) {
      if (rateDebounce) clearTimeout(rateDebounce);
      restartCurrentIfPlaying();
    }
  });

  // モード切替（全文/要約）
  document.querySelectorAll('.voice-mode-toggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === voice.mode);
    btn.addEventListener('click', () => {
      stopSpeech();
      voice.mode = btn.dataset.mode;
      document.querySelectorAll('.voice-mode-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === voice.mode);
      });
      document.body.classList.toggle('voice-mode-summary', voice.enabled && voice.mode === 'summary');
      saveVoicePrefs();
    });
  });

  // プロバイダー選択
  populateProviderSelect();
  document.getElementById('vc-provider').addEventListener('change', (e) => {
    const newProvider = e.target.value;
    // APIキー未設定のプロバイダーに切り替えようとしたら確認
    const p = providers[newProvider];
    if (p && p.requiresApiKey && !p.isConfigured()) {
      if (!confirm(`${p.label} は API キーが未設定です。設定画面を開きますか？`)) {
        // キャンセル → 選択を戻す
        e.target.value = voice.provider;
        return;
      }
      // 選択は維持したまま設定モーダルを開く
      voice.provider = newProvider;
      saveVoicePrefs();
      stopSpeech();
      populateVoiceSelect();
      openSettingsDialog();
      return;
    }
    voice.provider = newProvider;
    saveVoicePrefs();
    stopSpeech();
    populateVoiceSelect();
  });

  // 音声選択：再生中でも即時に切り替え可能
  document.getElementById('vc-voice').addEventListener('change', (e) => {
    const provider = getActiveProvider();
    voice.selectedVoiceByProvider[provider.id] = e.target.value;
    if (provider.id === 'browser') {
      voice.selectedVoiceURI = e.target.value;
    }
    saveVoicePrefs();
    // 再生中なら現在のセクションから新しい音声で再開
    if (voice.playing) {
      restartCurrentIfPlaying();
    }
  });

  // 再生
  document.getElementById('vc-play').addEventListener('click', () => {
    const provider = getActiveProvider();
    // ブラウザ内蔵の一時停止からの再開
    if (provider.id === 'browser' && voice.currentIdx >= 0 &&
        'speechSynthesis' in window && window.speechSynthesis.paused) {
      const utter = voice.currentUtterance;
      const paramsChanged = utter && (
        Math.abs(utter.rate - voice.rate) > 0.01 ||
        (voice.selectedVoiceURI && utter.voice && utter.voice.voiceURI !== voice.selectedVoiceURI)
      );
      if (paramsChanged) {
        voice.playing = true;
        if (voice.markInterrupted) voice.markInterrupted();
        window.speechSynthesis.cancel();
        setTimeout(() => {
          if (voice.playing) speakCurrent();
        }, 100);
      } else {
        window.speechSynthesis.resume();
        voice.playing = true;
        updateVoiceUI();
      }
      return;
    }
    // HTML5 Audio（Grok等）の一時停止からの再開
    if (provider.id !== 'browser' && voice.currentAudio && voice.currentAudio.paused &&
        voice.currentIdx >= 0) {
      voice.playing = true;
      voice.currentAudio.play().catch(e => console.warn('Resume failed:', e));
      updateVoiceUI();
      return;
    }
    // 新規再生
    stopSpeech();
    voice.queue = buildQueue(ch);
    if (voice.queue.length === 0) {
      alert('読み上げる内容がありません');
      return;
    }
    voice.currentIdx = -1;
    voice.playing = true;
    playQueue();
  });

  // 一時停止
  document.getElementById('vc-pause').addEventListener('click', () => {
    const provider = getActiveProvider();
    if (provider.id === 'browser') {
      if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
        window.speechSynthesis.pause();
        voice.playing = false;
        updateVoiceUI();
      }
    } else {
      // HTML5 Audio
      if (voice.currentAudio && !voice.currentAudio.paused) {
        voice.currentAudio.pause();
        voice.playing = false;
        updateVoiceUI();
      }
    }
  });

  // 停止
  document.getElementById('vc-stop').addEventListener('click', () => {
    stopSpeech();
  });

  updateVoiceUI();
}

// ページ切替・離脱時は必ず停止
window.addEventListener('beforeunload', () => stopSpeech());

// =============================================================================
// テキスト書き出し機能（他の音声読み上げツール向け）
// =============================================================================

const exporter = {
  mode: 'full',          // 'full' | 'summary'
  includeTerms: true,    // 用語集を含めるか
  includeFurther: false, // 参考資料を含めるか
};

// HTMLからテキストを抽出してTTSフレンドリーに整形
function htmlToPlainText(html) {
  if (!html) return '';
  // DOM使ってタグを除去
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  let text = tmp.textContent || tmp.innerText || '';
  // 余分な空白を整理
  text = text.replace(/[ \t]+/g, ' ');
  // 改行の整理：複数改行は一つに
  text = text.replace(/\n{2,}/g, '\n');
  text = text.trim();
  return text;
}

// リスト項目を改行区切りに変換してから抽出
function htmlToPlainTextWithLists(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // li を句点で区切る
  tmp.querySelectorAll('li').forEach(li => {
    // 先頭に付け、末尾に句点を入れる（すでに句点があれば何もしない）
    let t = li.textContent.trim();
    if (t && !/[。．]$/.test(t)) t += '。';
    li.textContent = t + '\n';
  });
  // p/h3/div の末尾にも改行を入れる
  tmp.querySelectorAll('p, h3, div').forEach(el => {
    el.insertAdjacentText('beforeend', '\n');
  });
  let text = tmp.textContent || '';
  // 空白・改行整理
  text = text.replace(/[ \t]+/g, ' ');
  text = text.replace(/\n[ \t]+/g, '\n');
  text = text.replace(/\n{2,}/g, '\n\n');
  text = text.trim();
  return text;
}

// 章1つ分をプレーンテキスト化
function buildChapterText(ch, opts) {
  const mode = opts.mode || 'full';
  const includeTerms = opts.includeTerms !== false;
  const includeFurther = opts.includeFurther === true;
  const parts = [];

  // ヘッダー
  parts.push(`第${parseInt(ch.num, 10)}章　${ch.title}`);
  parts.push('');

  if (mode === 'summary') {
    // 要約モード
    if (ch.voiceSummary) {
      parts.push(ch.voiceSummary);
    } else {
      parts.push(ch.summary || ch.lead || '');
    }
    parts.push('');
  } else {
    // 全文モード
    if (ch.lead) {
      parts.push(ch.lead);
      parts.push('');
    }
    // 各セクション
    ch.sections.forEach(s => {
      parts.push(`■ ${s.heading}`);
      parts.push('');
      const body = htmlToPlainTextWithLists(s.html);
      if (body) parts.push(body);
      parts.push('');
    });
  }

  // 用語集
  if (includeTerms && ch.terms && ch.terms.length > 0 && mode === 'full') {
    parts.push('■ この章で出てきた用語');
    parts.push('');
    ch.terms.forEach(t => {
      parts.push(`${t.name}（${t.en}）：${t.def}`);
    });
    parts.push('');
  }

  // 参考資料
  if (includeFurther && ch.further && ch.further.length > 0 && mode === 'full') {
    parts.push('■ さらに学ぶには');
    parts.push('');
    ch.further.forEach(f => {
      const plain = htmlToPlainText(f);
      parts.push(`・${plain}`);
    });
    parts.push('');
  }

  return parts.join('\n').replace(/\n{3,}/g, '\n\n').trim();
}

// 全10章をまとめる
function buildAllChaptersText(opts) {
  const header = [
    '切削加工入門',
    'Machining Fundamentals — 学習ロードマップ',
    '',
    '金属切削加工の全体像を概観するための教材です。',
    'はじめて学ぶ人を対象に、全10章で構成しています。',
    '',
    '----------------------------------------',
    '',
  ].join('\n');

  const sep = '\n\n----------------------------------------\n\n';
  const chapters = CHAPTERS.map(ch => buildChapterText(ch, opts));
  return header + chapters.join(sep);
}

// ダイアログを開く
function openExportDialog(target) {
  // target: { type: 'chapter', chapter } or { type: 'all' }
  closeExportDialog();

  const backdrop = document.createElement('div');
  backdrop.className = 'dialog-backdrop';
  backdrop.id = 'export-dialog';
  backdrop.innerHTML = `
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="export-dialog-title">
      <div class="dialog-header">
        <div class="dialog-title" id="export-dialog-title">
          ${target.type === 'all' ? '全章まとめてテキスト書き出し' : `第${parseInt(target.chapter.num, 10)}章「${target.chapter.title}」のテキスト書き出し`}
        </div>
        <button class="dialog-close" data-close="true">閉じる ✕</button>
      </div>
      <div class="dialog-toolbar">
        <div class="dialog-toolbar-left">
          <div class="export-mode-toggle" role="group" aria-label="書き出しモード">
            <button data-export-mode="full" class="active">全文</button>
            <button data-export-mode="summary">要約</button>
          </div>
          <label><input type="checkbox" id="exp-include-terms" checked> 用語集を含める</label>
          <label><input type="checkbox" id="exp-include-further"> 参考資料を含める</label>
        </div>
        <div class="dialog-stats" id="exp-stats"></div>
      </div>
      <div class="dialog-body">
        <textarea class="dialog-textarea" id="exp-textarea" spellcheck="false" readonly></textarea>
      </div>
      <div class="dialog-footer">
        <div class="dialog-hint">
          このテキストをコピーして、VOICEVOX、音読さん、macOSのsayコマンド、ElevenLabsなどに貼り付けて使えます。
        </div>
        <div class="dialog-actions">
          <button class="dialog-btn" data-download="true">⬇ .txt保存</button>
          <button class="dialog-btn primary" id="exp-copy">📋 クリップボードにコピー</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  // 初期モードを要約モードにしたい場合は、現在の音声モードと連動させる
  if (voice.mode === 'summary') {
    exporter.mode = 'summary';
    backdrop.querySelectorAll('[data-export-mode]').forEach(b => {
      b.classList.toggle('active', b.dataset.exportMode === 'summary');
    });
  }

  function refreshText() {
    const opts = {
      mode: exporter.mode,
      includeTerms: document.getElementById('exp-include-terms').checked,
      includeFurther: document.getElementById('exp-include-further').checked,
    };
    const text = target.type === 'all'
      ? buildAllChaptersText(opts)
      : buildChapterText(target.chapter, opts);
    const textarea = document.getElementById('exp-textarea');
    textarea.value = text;
    // 統計
    const charCount = text.length;
    const lineCount = text.split('\n').length;
    // 読み上げ時間推定（日本語は300〜400字/分が標準、ここは中間値350字で計算）
    const estMin = Math.max(1, Math.round(charCount / 350));
    document.getElementById('exp-stats').textContent =
      `${charCount.toLocaleString()}文字 / ${lineCount}行 / 読み上げ約${estMin}分`;
  }

  refreshText();

  // モード切替
  backdrop.querySelectorAll('[data-export-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      exporter.mode = btn.dataset.exportMode;
      backdrop.querySelectorAll('[data-export-mode]').forEach(b => {
        b.classList.toggle('active', b.dataset.exportMode === exporter.mode);
      });
      refreshText();
    });
  });

  // チェックボックス
  document.getElementById('exp-include-terms').addEventListener('change', refreshText);
  document.getElementById('exp-include-further').addEventListener('change', refreshText);

  // コピー
  const copyBtn = document.getElementById('exp-copy');
  copyBtn.addEventListener('click', async () => {
    const text = document.getElementById('exp-textarea').value;
    let success = false;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        success = true;
      } else {
        // フォールバック：textareaを選択してexecCommand
        const ta = document.getElementById('exp-textarea');
        ta.removeAttribute('readonly');
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        success = document.execCommand('copy');
        ta.setAttribute('readonly', 'true');
      }
    } catch (e) {
      console.warn('Copy failed:', e);
    }
    if (success) {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓ コピーしました';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '📋 クリップボードにコピー';
      }, 1800);
    } else {
      alert('コピーに失敗しました。テキストを手動で選択してコピーしてください。');
    }
  });

  // .txt ダウンロード
  backdrop.querySelector('[data-download]').addEventListener('click', () => {
    const text = document.getElementById('exp-textarea').value;
    const filename = target.type === 'all'
      ? `machining-fundamentals-all-chapters${exporter.mode === 'summary' ? '-summary' : ''}.txt`
      : `machining-fundamentals-ch${target.chapter.num}-${target.chapter.title.replace(/\s/g, '')}${exporter.mode === 'summary' ? '-summary' : ''}.txt`;
    const blob = new Blob(['\uFEFF' + text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  // 閉じる
  backdrop.querySelector('[data-close]').addEventListener('click', closeExportDialog);
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeExportDialog();
  });

  // ESCキーで閉じる
  const escHandler = (e) => {
    if (e.key === 'Escape') closeExportDialog();
  };
  backdrop._escHandler = escHandler;
  document.addEventListener('keydown', escHandler);
}

function closeExportDialog() {
  const dialog = document.getElementById('export-dialog');
  if (!dialog) return;
  if (dialog._escHandler) {
    document.removeEventListener('keydown', dialog._escHandler);
  }
  dialog.remove();
}

// =============================================================================
// 設定モーダル（APIキー管理、キャッシュ管理）
// =============================================================================

async function openSettingsDialog() {
  closeSettingsDialog();

  const stats = await cacheStats();
  const sizeMB = (stats.bytes / 1024 / 1024).toFixed(2);

  const backdrop = document.createElement('div');
  backdrop.className = 'dialog-backdrop';
  backdrop.id = 'settings-dialog';
  backdrop.innerHTML = `
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="settings-dialog-title">
      <div class="dialog-header">
        <div class="dialog-title" id="settings-dialog-title" style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:16px;">⚙</span>
          <span>設定</span>
        </div>
        <button class="dialog-close" data-close="true">閉じる ✕</button>
      </div>
      <div class="dialog-body">
        <div class="settings-warning">
          <strong>セキュリティに関する注意</strong>
          APIキーはお使いのブラウザ（localStorage）に保存されます。
          このアプリを共用PCや公開ブラウザで開かないでください。
          他のブラウザ拡張機能や悪意あるスクリプトからキーを読み取られる可能性があります。
          <strong style="margin-top:8px;">個人のマシンで自分専用で使う想定</strong>です。
        </div>

        <div class="settings-section">
          <h3>🗣 xAI Grok TTS</h3>
          <p class="desc">
            xAI の高品質な音声合成。日本語対応、5種類の音声（Ara, Eve, Leo, Rex, Sal）。
            プロキシURLは必須、<strong>API キーは任意</strong>です。
          </p>
          <ul class="desc" style="margin:8px 0 0 18px;padding:0;font-size:12px;line-height:1.7;">
            <li><strong>Shared モード</strong>（キー未入力）: プロキシ側の共有キーを使用。<strong>1日あたり上限あり</strong>（デフォルト30回）。</li>
            <li><strong>BYOK モード</strong>（キー入力あり）: 自分の xAI キー（<code>xai-...</code>）で直接利用、<strong>上限なし</strong>。API キーは <a href="https://console.x.ai/" target="_blank" rel="noopener">console.x.ai</a> で取得。</li>
          </ul>
          <p class="desc" style="color: var(--ylw); font-size: 12px; margin-top: 6px;">
            <strong>⚠</strong> xAI API は CORS でブラウザから直接呼べないため Cloudflare Workers プロキシを経由します。プロキシ用コードは <code style="background: var(--bg-3); padding: 2px 6px;">worker-proxy.js</code> を参照。
          </p>

          <div class="settings-field">
            <label for="grok-proxy-url-input">プロキシ URL（必須）</label>
            <input type="text" id="grok-proxy-url-input" placeholder="https://grok-tts-proxy.xxx.workers.dev" value="${apiConfig.grokProxyUrl || ''}" autocomplete="off" spellcheck="false">
            <div class="field-hint">
              例: <code style="font-family: 'JetBrains Mono', monospace; color: var(--cyan);">https://grok-tts-proxy.your-account.workers.dev</code>
            </div>
          </div>

          <div class="settings-field">
            <label for="grok-proxy-secret-input">プロキシ合言葉（任意・BYOK時のみ使用）</label>
            <input type="password" id="grok-proxy-secret-input" placeholder="（プロキシに PROXY_SHARED_SECRET を設定した場合のみ）" value="${apiConfig.grokProxySecret || ''}" autocomplete="off" spellcheck="false">
            <div class="field-hint">
              BYOK を乱用から守るための追加認証。Shared モードでは不要。
            </div>
          </div>

          <div class="settings-field">
            <label for="grok-key-input">xAI API キー（任意・入れると BYOK で無制限）</label>
            <input type="password" id="grok-key-input" placeholder="xai-... （未入力なら Shared モード）" value="${apiConfig.grokKey || ''}" autocomplete="off" spellcheck="false">
            <div class="field-hint">
              空欄にして保存すると、ブラウザから削除されます。
              <span id="grok-key-status" class="settings-field-status"></span>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="dialog-btn" id="grok-test-btn">🔍 接続テスト</button>
            <button class="dialog-btn primary" id="grok-save-btn">💾 保存</button>
          </div>
        </div>

        <div class="settings-section">
          <h3>💾 音声キャッシュ</h3>
          <p class="desc">
            生成した音声はお使いのブラウザ内（IndexedDB）にキャッシュされるため、
            同じ章を再生しても<strong>追加課金は発生しません</strong>。
            別のブラウザに移ると再生成が必要です。
          </p>
          <div class="settings-cache-info">
            <span>キャッシュ状況：</span>
            <span class="cache-stats" id="cache-stats-display">
              ${stats.count} 件 / ${sizeMB} MB
            </span>
            <button class="dialog-btn" id="cache-clear-btn" style="margin-left:auto;">🗑 キャッシュ削除</button>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <div class="dialog-hint">
          設定はお使いのブラウザに保存されます。
        </div>
        <div class="dialog-actions">
          <button class="dialog-btn primary" data-close="true">完了</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  const keyInput = document.getElementById('grok-key-input');
  const proxyUrlInput = document.getElementById('grok-proxy-url-input');
  const proxySecretInput = document.getElementById('grok-proxy-secret-input');
  const statusEl = document.getElementById('grok-key-status');
  const saveBtn = document.getElementById('grok-save-btn');
  const testBtn = document.getElementById('grok-test-btn');
  const clearBtn = document.getElementById('cache-clear-btn');
  const statsDisplay = document.getElementById('cache-stats-display');

  // 設定保存
  saveBtn.addEventListener('click', () => {
    apiConfig.grokKey = keyInput.value.trim();
    apiConfig.grokProxyUrl = proxyUrlInput.value.trim();
    apiConfig.grokProxySecret = proxySecretInput.value.trim();
    saveApiConfig();
    statusEl.className = 'settings-field-status ok';
    statusEl.textContent = '✓ 保存しました';
    populateProviderSelect();
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'settings-field-status'; }, 2500);
  });

  // 接続テスト（プロキシ経由で最小文字数を叩く）
  testBtn.addEventListener('click', async () => {
    const key = keyInput.value.trim();
    const proxyUrl = proxyUrlInput.value.trim();
    const proxySecret = proxySecretInput.value.trim();

    if (!proxyUrl) {
      statusEl.className = 'settings-field-status ng';
      statusEl.textContent = 'プロキシ URL を入力してください';
      return;
    }

    statusEl.className = 'settings-field-status';
    const modeLabel = key ? 'BYOK' : 'Shared';
    statusEl.textContent = `接続確認中 (${modeLabel} モード)...`;
    testBtn.disabled = true;

    try {
      const endpoint = proxyUrl.replace(/\/+$/, '') + '/v1/tts';
      const headers = { 'Content-Type': 'application/json' };
      if (key) headers['Authorization'] = `Bearer ${key}`;
      if (proxySecret) headers['X-Proxy-Secret'] = proxySecret;
      const res = await fetch(endpoint, {
        method: 'POST',
        headers,
        body: JSON.stringify({
          text: 'テスト',
          voice_id: 'ara',
          language: 'ja',
          output_format: { codec: 'mp3', sample_rate: 24000, bit_rate: 128000 },
        }),
      });
      const rl = extractRateLimit(res);
      if (res.ok) {
        const blob = await res.blob();
        statusEl.className = 'settings-field-status ok';
        let msg = `✓ 接続成功 (${modeLabel}, ${(blob.size/1024).toFixed(1)} KB)`;
        if (rl) msg += `　残り ${rl.remaining}/${rl.limit}（本日分）`;
        statusEl.textContent = msg;
      } else {
        statusEl.className = 'settings-field-status ng';
        let msg = `${res.status} エラー`;
        try {
          const err = await res.json();
          if (err.error && err.error.message) msg += `: ${err.error.message}`;
          else if (err.message) msg += `: ${err.message}`;
        } catch {}
        if (res.status === 429) {
          msg = '共有プロキシの1日上限に到達。⚙で xAI キーを入れると BYOK になり無制限。';
        } else if (res.status === 503) {
          msg += '（プロキシ側に共有キー未設定。自分の xAI キーを入れて BYOK で試してください）';
        } else if (res.status === 401 && proxySecret) {
          msg += '（プロキシ合言葉が違う可能性）';
        } else if (res.status === 401) {
          msg += '（xAI API キーが無効の可能性）';
        }
        statusEl.textContent = '✗ ' + msg;
      }
    } catch (e) {
      statusEl.className = 'settings-field-status ng';
      let msg = e.message || '通信エラー';
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
        msg += '（プロキシURL誤り・Worker未デプロイ・CORS未許可の可能性）';
      }
      statusEl.textContent = '✗ ' + msg;
    } finally {
      testBtn.disabled = false;
    }
  });

  // キャッシュ削除
  clearBtn.addEventListener('click', async () => {
    if (!confirm('音声キャッシュをすべて削除します。よろしいですか？\n削除後は、同じ章を再生すると再度課金されます。')) return;
    const ok = await cacheClear();
    if (ok) {
      const s = await cacheStats();
      statsDisplay.textContent = `${s.count} 件 / ${(s.bytes/1024/1024).toFixed(2)} MB`;
      alert('キャッシュを削除しました');
    } else {
      alert('キャッシュ削除に失敗しました');
    }
  });

  // 閉じるボタン
  backdrop.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', closeSettingsDialog);
  });
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) closeSettingsDialog();
  });

  const escHandler = (e) => {
    if (e.key === 'Escape') closeSettingsDialog();
  };
  backdrop._escHandler = escHandler;
  document.addEventListener('keydown', escHandler);

  // キー入力欄にフォーカス
  setTimeout(() => keyInput.focus(), 50);
}

function closeSettingsDialog() {
  const dialog = document.getElementById('settings-dialog');
  if (!dialog) return;
  if (dialog._escHandler) {
    document.removeEventListener('keydown', dialog._escHandler);
  }
  dialog.remove();
}

// 設定ボタンのハンドラ
document.getElementById('settings-toggle').addEventListener('click', openSettingsDialog);

// 章ページ・ホーム画面のボタンにイベント委任
document.addEventListener('click', (e) => {
  const chBtn = e.target.closest('[data-export-chapter]');
  if (chBtn) {
    const id = parseInt(chBtn.dataset.exportChapter);
    const ch = CHAPTERS.find(c => c.id === id);
    if (ch) openExportDialog({ type: 'chapter', chapter: ch });
    return;
  }
  const allBtn = e.target.closest('[data-export-all]');
  if (allBtn) {
    openExportDialog({ type: 'all' });
    return;
  }
});

// 初期描画
render();
</script>

import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

document.getElementById('loader-status').textContent = '3Dエンジン準備完了...';

// =============================================================================
// 2D SOLVER — carried over from v0.2, same Stable-Fluids implementation
// =============================================================================

const NX = 160, NY = 120;
const SIZE = (NX + 2) * (NY + 2);
const IX = (i, j) => i + (NX + 2) * j;

let u = new Float32Array(SIZE);
let v = new Float32Array(SIZE);
let u_prev = new Float32Array(SIZE);
let v_prev = new Float32Array(SIZE);
let dens = new Float32Array(SIZE);
let dens_prev = new Float32Array(SIZE);
let pressure = new Float32Array(SIZE);
let divergence = new Float32Array(SIZE);
let solid = new Uint8Array(SIZE);
let solidU = new Float32Array(SIZE);
let solidV = new Float32Array(SIZE);
const vort = new Float32Array(SIZE);

// Physical bounding box of the simulation domain (in world units = mm)
// Domain: X from -80 to +80, Z from -60 to +60 (i.e. width 160mm, depth 120mm)
const DOMAIN = { x0: -80, x1: 80, z0: -60, z1: 60 };
const DOMAIN_W = DOMAIN.x1 - DOMAIN.x0;
const DOMAIN_D = DOMAIN.z1 - DOMAIN.z0;

// Grid → world mapping helpers
function gridToWorld(i, j) {
  const x = DOMAIN.x0 + ((i - 0.5) / NX) * DOMAIN_W;
  const z = DOMAIN.z0 + ((j - 0.5) / NY) * DOMAIN_D;
  return [x, z];
}
function worldToGrid(x, z) {
  const i = ((x - DOMAIN.x0) / DOMAIN_W) * NX + 0.5;
  const j = ((z - DOMAIN.z0) / DOMAIN_D) * NY + 0.5;
  return [i, j];
}

  feedDir: [1, 0],
  slicePlaneY: 0, // mm, vertical position of the slice

// --- Solver core ---

function setBoundary(b, x) {
  for (let j = 1; j <= NY; j++) {
    x[IX(0, j)]    = b === 1 ? -x[IX(1, j)]  : x[IX(1, j)];
    x[IX(NX+1, j)] = b === 1 ? -x[IX(NX, j)] : x[IX(NX, j)];
  }
  for (let i = 1; i <= NX; i++) {
    x[IX(i, 0)]    = b === 2 ? -x[IX(i, 1)]  : x[IX(i, 1)];
    x[IX(i, NY+1)] = b === 2 ? -x[IX(i, NY)] : x[IX(i, NY)];
  }
  x[IX(0,0)]       = 0.5*(x[IX(1,0)]    + x[IX(0,1)]);
  x[IX(0,NY+1)]    = 0.5*(x[IX(1,NY+1)] + x[IX(0,NY)]);
  x[IX(NX+1,0)]    = 0.5*(x[IX(NX,0)]   + x[IX(NX+1,1)]);
  x[IX(NX+1,NY+1)] = 0.5*(x[IX(NX,NY+1)]+ x[IX(NX+1,NY)]);
}

function applySolidVelocity() {
  for (let k = 0; k < SIZE; k++) {
    if (solid[k] === 1) {
      u[k] = solidU[k];
      v[k] = solidV[k];
    } else if (solid[k] !== 0) {
      u[k] = 0;
      v[k] = 0;
    }
  }
}

function linearSolve(b, x, x0, a, c, iters = 20) {
  const cRecip = 1.0 / c;
  for (let k = 0; k < iters; k++) {
    for (let j = 1; j <= NY; j++) {
      for (let i = 1; i <= NX; i++) {
        if (solid[IX(i, j)]) continue;
        x[IX(i, j)] = (x0[IX(i, j)] + a * (x[IX(i-1, j)] + x[IX(i+1, j)] + x[IX(i, j-1)] + x[IX(i, j+1)])) * cRecip;
      }
    }
    setBoundary(b, x);
  }
}

function diffuse(b, x, x0, diff, dt) {
  const a = dt * diff * NX * NY;
  linearSolve(b, x, x0, a, 1 + 4 * a);
}

function advect(b, d, d0, uf, vf, dt) {
  const dtx = dt * NX;
  const dty = dt * NY;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      let x = i - dtx * uf[IX(i, j)];
      let y = j - dty * vf[IX(i, j)];
      if (x < 0.5) x = 0.5; if (x > NX + 0.5) x = NX + 0.5;
      if (y < 0.5) y = 0.5; if (y > NY + 0.5) y = NY + 0.5;
      const i0 = Math.floor(x), i1 = i0 + 1;
      const j0 = Math.floor(y), j1 = j0 + 1;
      const s1 = x - i0, s0 = 1 - s1;
      const t1 = y - j0, t0 = 1 - t1;
      d[IX(i, j)] =
        s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
        s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
    }
  }
  setBoundary(b, d);
}

function project(uf, vf, p, div) {
  const h = 1.0 / Math.min(NX, NY);
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) { div[IX(i, j)] = 0; p[IX(i, j)] = 0; continue; }
      div[IX(i, j)] = -0.5 * h * (uf[IX(i+1, j)] - uf[IX(i-1, j)] + vf[IX(i, j+1)] - vf[IX(i, j-1)]);
      p[IX(i, j)] = 0;
    }
  }
  setBoundary(0, div);
  setBoundary(0, p);
  linearSolve(0, p, div, 1, 4);
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      uf[IX(i, j)] -= 0.5 * (p[IX(i+1, j)] - p[IX(i-1, j)]) / h;
      vf[IX(i, j)] -= 0.5 * (p[IX(i, j+1)] - p[IX(i, j-1)]) / h;
    }
  }
  setBoundary(1, uf);
  setBoundary(2, vf);
}

function applyNozzles(dt) {
  const speed = params.inlet * 0.5;
  for (const n of scenario.nozzles) {
    const r2 = n.radius * n.radius;
    for (let dj = -n.radius; dj <= n.radius; dj++) {
      for (let di = -n.radius; di <= n.radius; di++) {
        if (di*di + dj*dj > r2) continue;
        const i = Math.round(n.x + di);
        const j = Math.round(n.y + dj);
        if (i < 1 || i > NX || j < 1 || j > NY) continue;
        if (solid[IX(i, j)]) continue;
        u[IX(i, j)] = n.dirX * speed;
        v[IX(i, j)] = n.dirY * speed;
        dens[IX(i, j)] = Math.min(1.0, dens[IX(i, j)] + 0.05);
      }
    }
  }
}

function velocityStep(dt) {
  const visc = params.visc;
  applyNozzles(dt);
  applySolidVelocity();
  [u_prev, u] = [u, u_prev];
  diffuse(1, u, u_prev, visc, dt);
  [v_prev, v] = [v, v_prev];
  diffuse(2, v, v_prev, visc, dt);
  applySolidVelocity();
  project(u, v, pressure, divergence);
  [u_prev, u] = [u, u_prev];
  [v_prev, v] = [v, v_prev];
  advect(1, u, u_prev, u_prev, v_prev, dt);
  advect(2, v, v_prev, u_prev, v_prev, dt);
  applySolidVelocity();
  project(u, v, pressure, divergence);
  applySolidVelocity();
}

function densityStep(dt) {
  [dens_prev, dens] = [dens, dens_prev];
  diffuse(0, dens, dens_prev, params.diff, dt);
  [dens_prev, dens] = [dens, dens_prev];
  advect(0, dens, dens_prev, u, v, dt);
  for (let k = 0; k < SIZE; k++) dens[k] *= 0.994;
}

function computeVorticity() {
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const dvdx = (v[IX(i+1, j)] - v[IX(i-1, j)]) * 0.5;
      const dudy = (u[IX(i, j+1)] - u[IX(i, j-1)]) * 0.5;
      vort[IX(i, j)] = dvdx - dudy;
    }
  }
}

function computeOmegaSign() {
  const SCALE = 0.00035;
  return params.rpm * SCALE;
}

function setupScenario() {
  solid.fill(0);
  solidU.fill(0);
  solidV.fill(0);
  u.fill(0); v.fill(0);
  u_prev.fill(0); v_prev.fill(0);
  dens.fill(0);
  pressure.fill(0);
  scenario.nozzles = [];

  const omega = computeOmegaSign();
  const toolRWorld = params.dia / 2; // mm
  const toolRGrid = toolRWorld / DOMAIN_W * NX;

  // === SLOTTING (溝切削) LAYOUT ===
  // Workpiece: large block centered, fills most of the XZ domain
  // Tool: positioned slightly LEFT of center (already advanced from -X toward +X)
  // Groove: already-cut channel behind the tool (-X side), narrow slot width = tool diameter
  //
  // Viewed from above (TOP):
  //   [==WP==][GROOVE][TOOL][==WP_UNCUT==]
  //           <------ cleared ----->  uncut

  const cxWorld = -10;    // tool center X (advanced from left)
  const czWorld = 0;      // tool center Z (centered)
  const [cxGrid, czGrid] = worldToGrid(cxWorld, czWorld);

  scenario.toolCenter = [cxGrid, czGrid];
  scenario.toolCenterWorld = [cxWorld, czWorld];
  scenario.toolRadiusGrid = toolRGrid;
  scenario.toolRadiusWorld = toolRWorld;
  scenario.toolOmega = omega;
  scenario.feedDir = [1, 0];

  // Workpiece footprint (larger than v3, fills most of domain)
  const wpLeftWorld   = -65;
  const wpRightWorld  = 65;
  const wpFrontWorld  = -45;
  const wpBackWorld   = 45;
  const wpHeight      = 22;  // mm, workpiece thickness

  // Groove: left side of tool is already cut
  // Groove extends from wpLeft to tool center x, width = 2 * toolR centered on Z=0
  const grooveLeftWorld  = wpLeftWorld;
  const grooveRightWorld = cxWorld; // tool is at the current cutting face
  const grooveFrontWorld = czWorld - toolRWorld;
  const grooveBackWorld  = czWorld + toolRWorld;

  // Fill solid=2 for workpiece, but leave groove open
  const [wpLeftI]  = worldToGrid(wpLeftWorld, 0);
  const [wpRightI] = worldToGrid(wpRightWorld, 0);
  const [, wpFrontJ] = worldToGrid(0, wpFrontWorld);
  const [, wpBackJ]  = worldToGrid(0, wpBackWorld);

  const [grvLeftI]  = worldToGrid(grooveLeftWorld, 0);
  const [grvRightI] = worldToGrid(grooveRightWorld, 0);
  const [, grvFrontJ] = worldToGrid(0, grooveFrontWorld);
  const [, grvBackJ]  = worldToGrid(0, grooveBackWorld);

  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const inWp = (i >= wpLeftI && i <= wpRightI && j >= wpFrontJ && j <= wpBackJ);
      const inGroove = (i >= grvLeftI && i <= grvRightI && j >= grvFrontJ && j <= grvBackJ);
      if (inWp && !inGroove) {
        solid[IX(i, j)] = 2; // solid workpiece
      }
    }
  }

  // Tool rotating disk (overwrites part of the groove)
  const r2 = toolRGrid * toolRGrid;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      const dx = i - cxGrid, dy = j - czGrid;
      if (dx*dx + dy*dy <= r2) {
        solid[IX(i, j)] = 1;
        solidU[IX(i, j)] = -omega * dy;
        solidV[IX(i, j)] =  omega * dx;
      }
    }
  }

  // Save workpiece info for 3D rendering (used by rebuildWorkpieceMesh)
  scenario.workpiece = {
    x0: wpLeftWorld, x1: wpRightWorld,
    z0: wpFrontWorld, z1: wpBackWorld,
    height: wpHeight,
  };
  scenario.groove = {
    x0: grooveLeftWorld, x1: grooveRightWorld,
    z0: grooveFrontWorld, z1: grooveBackWorld,
    depth: wpHeight * 0.6, // how deep the groove is cut (fraction of wp thickness)
    toolR: toolRWorld,
  };

  // Nozzle: from above-front, aimed at tool-workpiece contact (just ahead of tool in +X)
  const contactXWorld = cxWorld + toolRWorld * 0.85; // just inside leading edge
  const contactZWorld = 0;
  const nozzleXWorld = contactXWorld - 6;
  const nozzleZWorld = -22;
  const [nxGrid, nzGrid] = worldToGrid(nozzleXWorld, nozzleZWorld);
  const dirX = (contactXWorld - nozzleXWorld);
  const dirZ = (contactZWorld - nozzleZWorld);
  const len = Math.hypot(dirX, dirZ);
  scenario.nozzles.push({
    x: nxGrid, y: nzGrid,
    dirX: dirX / len, dirY: dirZ / len,
    radius: 3,
    worldPos: [nozzleXWorld, nozzleZWorld],
    worldDir: [dirX / len, dirZ / len],
  });
}

function refreshRotation() {
  const omega = computeOmegaSign();
  scenario.toolOmega = omega;
  const [cx, cz] = scenario.toolCenter;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)] === 1) {
        const dx = i - cx, dy = j - cz;
        solidU[IX(i, j)] = -omega * dy;
        solidV[IX(i, j)] =  omega * dx;
      }
    }
  }
}

function colormap(t) {
  t = Math.max(0, Math.min(1, t));
  const stops = [
    [  2,   8,  40],
    [  0,  78, 146],
    [  0, 180, 219],
    [ 42, 222, 122],
    [255, 201,  64],
    [255, 107,  26],
    [255,  59,  59],
  ];
  const f = t * (stops.length - 1);
  const i = Math.floor(f);
  const k = f - i;
  const a = stops[i];
  const b = stops[Math.min(i + 1, stops.length - 1)];
  return [
    a[0] + (b[0] - a[0]) * k,
    a[1] + (b[1] - a[1]) * k,
    a[2] + (b[2] - a[2]) * k,
  ];
}

// =============================================================================
// Update slice texture from 2D field
// =============================================================================

let maxField = 1.0;
function updateSliceTexture() {
  computeVorticity();
  let fieldMax = 0;
  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const gi = i + 1, gj = j + 1;
      const s = solid[IX(gi, gj)];
      // Flip j axis because the plane is mapped with texture (0,0) at top-left
      // Our grid: j increases with +Z; texture UV v increases downward
      const texI = i;
      const texJ = NY - 1 - j;
      const idx = (texI + texJ * NX) * 4;

      if (s) {
        // Transparent for solid cells so underlying 3D geometry shows through
        sliceImg.data[idx]   = 0;
        sliceImg.data[idx+1] = 0;
        sliceImg.data[idx+2] = 0;
        sliceImg.data[idx+3] = 0;
        continue;
      }

      let val;
      if (params.viz === 'velocity') {
        const uu = u[IX(gi, gj)], vv = v[IX(gi, gj)];
        val = Math.sqrt(uu*uu + vv*vv);
      } else if (params.viz === 'pressure') {
        val = Math.abs(pressure[IX(gi, gj)]) * 50;
      } else {
        val = Math.abs(vort[IX(gi, gj)]);
      }
      if (val > fieldMax) fieldMax = val;
      const normalized = Math.min(1, val / maxField);
      const [r, g, b] = colormap(normalized);
      const d = Math.min(1, dens[IX(gi, gj)]);
      sliceImg.data[idx]     = r * (1 - d * 0.5) +   0 * d * 0.5;
      sliceImg.data[idx + 1] = g * (1 - d * 0.5) + 212 * d * 0.5;
      sliceImg.data[idx + 2] = b * (1 - d * 0.5) + 212 * d * 0.5;
      // Alpha: lower for very small velocities (so background shows)
      const alpha = 0.35 + 0.65 * normalized;
      sliceImg.data[idx + 3] = Math.floor(alpha * 255);
    }
  }
  if (fieldMax > 0.001) maxField = maxField * 0.96 + fieldMax * 0.04;
  sliceCtx.putImageData(sliceImg, 0, 0);
  sliceTex.needsUpdate = true;

  document.getElementById('legend-max').textContent = maxField.toFixed(2);
  document.getElementById('legend-mid').textContent = (maxField * 0.5).toFixed(2);

  const title =
    params.viz === 'velocity' ? '流速の大きさ [m/秒]' :
    params.viz === 'pressure' ? '圧力の大きさ [Pa]' :
    '渦度の大きさ [1/秒]';
  document.getElementById('legend-title').textContent = title;
}

// =============================================================================
// Update 3D particles from 2D field
// =============================================================================

function updateParticles(dt) {
  const posAttr = particleGeom.attributes.position;
  const colAttr = particleGeom.attributes.color;
  const positions = posAttr.array;
  const colors = colAttr.array;

  for (let k = 0; k < NPARTS; k++) {
    const x = positions[k*3];
    const y = positions[k*3 + 1];
    const z = positions[k*3 + 2];

    // Map to grid
    const [gi, gj] = worldToGrid(x, z);
    const i = Math.floor(gi), j = Math.floor(gj);

    // Out of domain or in solid -> respawn
    if (i < 1 || i > NX || j < 1 || j > NY || solid[IX(i, j)]) {
      respawnParticle(k);
      continue;
    }

    // Sample velocity (with simple nearest)
    const uu = u[IX(i, j)];
    const vv = v[IX(i, j)];

    // Integrate (scale to world)
    const dx = uu * dt * DOMAIN_W * 1.0;
    const dz = vv * dt * DOMAIN_D * 1.0;

    positions[k*3]     = x + dx;
    positions[k*3 + 2] = z + dz;
    // y: slight vertical oscillation, clamped to groove interior
    positions[k*3 + 1] = y + (Math.random() - 0.5) * 0.3;
    const yFloor = TOOL_Y.grooveFloor + 0.2;
    const yCeil  = WP.height - 0.3;
    if (positions[k*3 + 1] < yFloor) positions[k*3 + 1] = yFloor;
    if (positions[k*3 + 1] > yCeil)  positions[k*3 + 1] = yCeil;

    particleAges[k]++;

    // Color by velocity magnitude
    const mag = Math.sqrt(uu*uu + vv*vv);
    const norm = Math.min(1, mag / Math.max(0.1, maxField));
    const [r, g, b] = colormap(norm);
    // Fade by age
    const fadeIn = Math.min(1, particleAges[k] / 10);
    const fadeOut = Math.max(0, 1 - (particleAges[k] - particleLives[k] * 0.7) / (particleLives[k] * 0.3));
    const fade = fadeIn * fadeOut;
    colors[k*3]     = (r / 255) * fade;
    colors[k*3 + 1] = (g / 255) * fade;
    colors[k*3 + 2] = (b / 255) * fade;

    if (particleAges[k] > particleLives[k]) {
      respawnParticle(k);
    }
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// =============================================================================
// Metrics
// =============================================================================

function computeMetrics() {
  let vmax = 0, vsum = 0, vcount = 0, wmax = 0, ke = 0;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      const uu = u[IX(i, j)], vv = v[IX(i, j)];
      const mag = Math.sqrt(uu*uu + vv*vv);
      if (mag > vmax) vmax = mag;
      vsum += mag; vcount++;
      ke += 0.5 * (uu*uu + vv*vv);
      const w = Math.abs(vort[IX(i, j)]);
      if (w > wmax) wmax = w;
    }
  }
  const vavg = vcount ? vsum / vcount : 0;

  let fx = 0, fy = 0;
  for (let j = 2; j < NY; j++) {
    for (let i = 2; i < NX; i++) {
      if (solid[IX(i, j)] !== 1) continue;
      if (!solid[IX(i-1, j)]) fx -= pressure[IX(i-1, j)];
      if (!solid[IX(i+1, j)]) fx += pressure[IX(i+1, j)];
      if (!solid[IX(i, j-1)]) fy -= pressure[IX(i, j-1)];
      if (!solid[IX(i, j+1)]) fy += pressure[IX(i, j+1)];
    }
  }
  fx *= 2.0; fy *= 2.0;
  const fMag = Math.sqrt(fx*fx + fy*fy);

  const L = params.dia / 1000;
  const U = params.inlet;
  const nu = Math.max(params.visc, 1e-6);
  const Re = (U * L) / nu;

  document.getElementById('m-vmax').textContent = vmax.toFixed(2) + ' m/s';
  document.getElementById('m-vavg').textContent = vavg.toFixed(2) + ' m/s';
  document.getElementById('m-wmax').textContent = wmax.toFixed(2) + ' /s';
  document.getElementById('m-ke').textContent = ke.toFixed(1) + ' J';
  document.getElementById('m-re').textContent = Re.toFixed(0);
  document.getElementById('f-fx').textContent = fx.toFixed(2) + ' N';
  document.getElementById('f-fy').textContent = fy.toFixed(2) + ' N';
  document.getElementById('f-mag').textContent = fMag.toFixed(2) + ' N';
  document.getElementById('reynolds').textContent = Re.toFixed(0);
}

// =============================================================================
// Resize handling
// =============================================================================

function onResize() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// =============================================================================
// Camera presets
// =============================================================================

const CAM_PRESETS = {
  iso:   { pos: [70, 110, 110], target: [0, 12, 0] },
  top:   { pos: [0, 200, 0.1],  target: [0, 0, 0] },
  front: { pos: [0, 35, 180],   target: [0, 15, 0] },
  side:  { pos: [180, 35, 0],   target: [0, 15, 0] },
};

function setCamera(preset, instant = false) {
  const p = CAM_PRESETS[preset];
  if (!p) return;
  if (instant) {
    camera.position.set(...p.pos);
    controls.target.set(...p.target);
    controls.update();
  } else {
    // simple interpolated transition
    const startPos = camera.position.clone();
    const startTgt = controls.target.clone();
    const endPos = new THREE.Vector3(...p.pos);
    const endTgt = new THREE.Vector3(...p.target);
    const dur = 600;
    const t0 = performance.now();
    function tick() {
      const k = Math.min(1, (performance.now() - t0) / dur);
      const ease = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2;
      camera.position.lerpVectors(startPos, endPos, ease);
      controls.target.lerpVectors(startTgt, endTgt, ease);
      controls.update();
      if (k < 1) requestAnimationFrame(tick);
    }
    tick();
  }
}

// =============================================================================
// Main loop
// =============================================================================

document.getElementById('loader-status').textContent = 'シミュレーション開始...';
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 400);

let lastT = performance.now();
let fpsBuf = [];
let toolSpinAngle = 0;

function loop() {
  const now = performance.now();
  const realDt = (now - lastT) / 1000;
  lastT = now;
  fpsBuf.push(1 / Math.max(0.001, realDt));
  if (fpsBuf.length > 30) fpsBuf.shift();
  const fps = fpsBuf.reduce((a, b) => a + b, 0) / fpsBuf.length;

  if (!params.paused) {
    velocityStep(params.dt);
    densityStep(params.dt);
    params.step++;

    // Spin tool visually
    if (params.animToolSpin) {
      const omegaVisual = (params.rpm / 60) * Math.PI * 2; // rad/sec
      toolSpinAngle += omegaVisual * realDt;
      toolGroup.rotation.y = toolSpinAngle;
    }
  }

  if (params.showSlice) updateSliceTexture();
  if (params.showParticles) updateParticles(params.dt);

  slicePlane.visible = params.showSlice;
  particles.visible = params.showParticles;
  gridHelper.visible = params.showGrid;

  controls.update();
  renderer.render(scene, camera);

  if (params.step % 6 === 0) {
    computeMetrics();
    document.getElementById('fps').textContent = fps.toFixed(0);
    document.getElementById('step').textContent = params.step;
  }

  requestAnimationFrame(loop);
}
loop();

function bindSlider(id, varId, fmt, onchange) {
  const el = document.getElementById(id);
  const vEl = document.getElementById(varId);
  el.addEventListener('input', () => {
    const val = parseFloat(el.value);
    vEl.textContent = fmt(val);
    onchange(val);
  });
}
bindSlider('inlet', 'v-inlet', v => v.toFixed(2), val => params.inlet = val);
bindSlider('visc',  'v-visc',  v => v.toFixed(5), val => params.visc = val);
bindSlider('rpm',   'v-rpm',   v => v.toFixed(0), val => { params.rpm = val; refreshRotation(); });
bindSlider('dia',   'v-dia',   v => v.toFixed(1), val => {
  params.dia = val;
  setupScenario();
  rebuildWorkpieceAndTool();
  maxField = 1.0;
});
bindSlider('feed',  'v-feed',  v => v.toFixed(0), val => params.feed = val);

function rebuildWorkpieceAndTool() {
  // Remove old workpiece group and tool group from scene, dispose meshes
  workpieceGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.geometry.dispose();
    }
  });
  scene.remove(workpieceGroup);

  toolGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.geometry.dispose();
    }
  });
  scene.remove(toolGroup);

  // Note: rebuild logic is complex (matches initial construction).
  // For v0.4 prototype, we use a simplified approach: adjust tool scale only.
  // The groove width in the workpiece does NOT re-cut dynamically — that
  // would require CSG or full workpiece rebuild.
  // TODO for v0.5: full workpiece reconstruction.

  // For now: re-add tool group with new scale
  scene.add(toolGroup);
  const newR = scenario.toolRadiusWorld;
  toolGroup.scale.set(newR / 8, 1, newR / 8);
  toolGroup.position.set(scenario.toolCenterWorld[0], 0, scenario.toolCenterWorld[1]);

  // Re-add workpiece as-is (can't rebuild without refactoring init code)
  scene.add(workpieceGroup);
}

// Legacy name retained for compatibility
function rebuildTool() {
  const newR = scenario.toolRadiusWorld;
  toolGroup.scale.set(newR / 8, 1, newR / 8);
  toolGroup.position.set(scenario.toolCenterWorld[0], 0, scenario.toolCenterWorld[1]);
}
