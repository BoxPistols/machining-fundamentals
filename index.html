// =============================================================================
// Update slice texture from 2D field
// =============================================================================

let maxField = 1.0;
function updateSliceTexture() {
  computeVorticity();
  let fieldMax = 0;
  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const gi = i + 1, gj = j + 1;
      const s = solid[IX(gi, gj)];
      // Flip j axis because the plane is mapped with texture (0,0) at top-left
      // Our grid: j increases with +Z; texture UV v increases downward
      const texI = i;
      const texJ = NY - 1 - j;
      const idx = (texI + texJ * NX) * 4;

      if (s) {
        // Transparent for solid cells so underlying 3D geometry shows through
        sliceImg.data[idx]   = 0;
        sliceImg.data[idx+1] = 0;
        sliceImg.data[idx+2] = 0;
        sliceImg.data[idx+3] = 0;
        continue;
      }

      let val;
      if (params.viz === 'velocity') {
        const uu = u[IX(gi, gj)], vv = v[IX(gi, gj)];
        val = Math.sqrt(uu*uu + vv*vv);
      } else if (params.viz === 'pressure') {
        val = Math.abs(pressure[IX(gi, gj)]) * 50;
      } else {
        val = Math.abs(vort[IX(gi, gj)]);
      }
      if (val > fieldMax) fieldMax = val;
      const normalized = Math.min(1, val / maxField);
      const [r, g, b] = colormap(normalized);
      const d = Math.min(1, dens[IX(gi, gj)]);
      sliceImg.data[idx]     = r * (1 - d * 0.5) +   0 * d * 0.5;
      sliceImg.data[idx + 1] = g * (1 - d * 0.5) + 212 * d * 0.5;
      sliceImg.data[idx + 2] = b * (1 - d * 0.5) + 212 * d * 0.5;
      // Alpha: lower for very small velocities (so background shows)
      const alpha = 0.35 + 0.65 * normalized;
      sliceImg.data[idx + 3] = Math.floor(alpha * 255);
    }
  }
  if (fieldMax > 0.001) maxField = maxField * 0.96 + fieldMax * 0.04;
  sliceCtx.putImageData(sliceImg, 0, 0);
  sliceTex.needsUpdate = true;

  document.getElementById('legend-max').textContent = maxField.toFixed(2);
  document.getElementById('legend-mid').textContent = (maxField * 0.5).toFixed(2);

  const title =
    params.viz === 'velocity' ? '流速の大きさ [m/秒]' :
    params.viz === 'pressure' ? '圧力の大きさ [Pa]' :
    '渦度の大きさ [1/秒]';
  document.getElementById('legend-title').textContent = title;
}

// =============================================================================
// Update 3D particles from 2D field
// =============================================================================

function updateParticles(dt) {
  const posAttr = particleGeom.attributes.position;
  const colAttr = particleGeom.attributes.color;
  const positions = posAttr.array;
  const colors = colAttr.array;

  for (let k = 0; k < NPARTS; k++) {
    const x = positions[k*3];
    const y = positions[k*3 + 1];
    const z = positions[k*3 + 2];

    // Map to grid
    const [gi, gj] = worldToGrid(x, z);
    const i = Math.floor(gi), j = Math.floor(gj);

    // Out of domain or in solid -> respawn
    if (i < 1 || i > NX || j < 1 || j > NY || solid[IX(i, j)]) {
      respawnParticle(k);
      continue;
    }

    // Sample velocity (with simple nearest)
    const uu = u[IX(i, j)];
    const vv = v[IX(i, j)];

    // Integrate (scale to world)
    const dx = uu * dt * DOMAIN_W * 1.0;
    const dz = vv * dt * DOMAIN_D * 1.0;

    positions[k*3]     = x + dx;
    positions[k*3 + 2] = z + dz;
    // y: slight vertical oscillation, clamped to groove interior
    positions[k*3 + 1] = y + (Math.random() - 0.5) * 0.3;
    const yFloor = TOOL_Y.grooveFloor + 0.2;
    const yCeil  = WP.height - 0.3;
    if (positions[k*3 + 1] < yFloor) positions[k*3 + 1] = yFloor;
    if (positions[k*3 + 1] > yCeil)  positions[k*3 + 1] = yCeil;

    particleAges[k]++;

    // Color by velocity magnitude
    const mag = Math.sqrt(uu*uu + vv*vv);
    const norm = Math.min(1, mag / Math.max(0.1, maxField));
    const [r, g, b] = colormap(norm);
    // Fade by age
    const fadeIn = Math.min(1, particleAges[k] / 10);
    const fadeOut = Math.max(0, 1 - (particleAges[k] - particleLives[k] * 0.7) / (particleLives[k] * 0.3));
    const fade = fadeIn * fadeOut;
    colors[k*3]     = (r / 255) * fade;
    colors[k*3 + 1] = (g / 255) * fade;
    colors[k*3 + 2] = (b / 255) * fade;

    if (particleAges[k] > particleLives[k]) {
      respawnParticle(k);
    }
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// =============================================================================
// Metrics
// =============================================================================

function computeMetrics() {
  let vmax = 0, vsum = 0, vcount = 0, wmax = 0, ke = 0;
  for (let j = 1; j <= NY; j++) {
    for (let i = 1; i <= NX; i++) {
      if (solid[IX(i, j)]) continue;
      const uu = u[IX(i, j)], vv = v[IX(i, j)];
      const mag = Math.sqrt(uu*uu + vv*vv);
      if (mag > vmax) vmax = mag;
      vsum += mag; vcount++;
      ke += 0.5 * (uu*uu + vv*vv);
      const w = Math.abs(vort[IX(i, j)]);
      if (w > wmax) wmax = w;
    }
  }
  const vavg = vcount ? vsum / vcount : 0;

  let fx = 0, fy = 0;
  for (let j = 2; j < NY; j++) {
    for (let i = 2; i < NX; i++) {
      if (solid[IX(i, j)] !== 1) continue;
      if (!solid[IX(i-1, j)]) fx -= pressure[IX(i-1, j)];
      if (!solid[IX(i+1, j)]) fx += pressure[IX(i+1, j)];
      if (!solid[IX(i, j-1)]) fy -= pressure[IX(i, j-1)];
      if (!solid[IX(i, j+1)]) fy += pressure[IX(i, j+1)];
    }
  }
  fx *= 2.0; fy *= 2.0;
  const fMag = Math.sqrt(fx*fx + fy*fy);

  const L = params.dia / 1000;
  const U = params.inlet;
  const nu = Math.max(params.visc, 1e-6);
  const Re = (U * L) / nu;

  document.getElementById('m-vmax').textContent = vmax.toFixed(2) + ' m/s';
  document.getElementById('m-vavg').textContent = vavg.toFixed(2) + ' m/s';
  document.getElementById('m-wmax').textContent = wmax.toFixed(2) + ' /s';
  document.getElementById('m-ke').textContent = ke.toFixed(1) + ' J';
  document.getElementById('m-re').textContent = Re.toFixed(0);
  document.getElementById('f-fx').textContent = fx.toFixed(2) + ' N';
  document.getElementById('f-fy').textContent = fy.toFixed(2) + ' N';
  document.getElementById('f-mag').textContent = fMag.toFixed(2) + ' N';
  document.getElementById('reynolds').textContent = Re.toFixed(0);
}

// =============================================================================
// Camera presets
// =============================================================================

const CAM_PRESETS = {
  iso:   { pos: [70, 110, 110], target: [0, 12, 0] },
  top:   { pos: [0, 200, 0.1],  target: [0, 0, 0] },
  front: { pos: [0, 35, 180],   target: [0, 15, 0] },
  side:  { pos: [180, 35, 0],   target: [0, 15, 0] },
};

function setCamera(preset, instant = false) {
  const p = CAM_PRESETS[preset];
  if (!p) return;
  if (instant) {
    camera.position.set(...p.pos);
    controls.target.set(...p.target);
    controls.update();
  } else {
    // simple interpolated transition
    const startPos = camera.position.clone();
    const startTgt = controls.target.clone();
    const endPos = new THREE.Vector3(...p.pos);
    const endTgt = new THREE.Vector3(...p.target);
    const dur = 600;
    const t0 = performance.now();
    function tick() {
      const k = Math.min(1, (performance.now() - t0) / dur);
      const ease = k < 0.5 ? 2*k*k : 1 - Math.pow(-2*k + 2, 2) / 2;
      camera.position.lerpVectors(startPos, endPos, ease);
      controls.target.lerpVectors(startTgt, endTgt, ease);
      controls.update();
      if (k < 1) requestAnimationFrame(tick);
    }
    tick();
  }
}

// =============================================================================
// Main loop
// =============================================================================

document.getElementById('loader-status').textContent = 'シミュレーション開始...';
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 400);

let lastT = performance.now();
let fpsBuf = [];
let toolSpinAngle = 0;

function loop() {
  const now = performance.now();
  const realDt = (now - lastT) / 1000;
  lastT = now;
  fpsBuf.push(1 / Math.max(0.001, realDt));
  if (fpsBuf.length > 30) fpsBuf.shift();
  const fps = fpsBuf.reduce((a, b) => a + b, 0) / fpsBuf.length;

  if (!params.paused) {
    velocityStep(params.dt);
    densityStep(params.dt);
    params.step++;

    // Spin tool visually
    if (params.animToolSpin) {
      const omegaVisual = (params.rpm / 60) * Math.PI * 2; // rad/sec
      toolSpinAngle += omegaVisual * realDt;
      toolGroup.rotation.y = toolSpinAngle;
    }
  }

  if (params.showSlice) updateSliceTexture();
  if (params.showParticles) updateParticles(params.dt);

  slicePlane.visible = params.showSlice;
  particles.visible = params.showParticles;
  gridHelper.visible = params.showGrid;

  controls.update();
  renderer.render(scene, camera);

  if (params.step % 6 === 0) {
    computeMetrics();
    document.getElementById('fps').textContent = fps.toFixed(0);
    document.getElementById('step').textContent = params.step;
  }

  requestAnimationFrame(loop);
}
loop();

  });
}
bindSlider('inlet', 'v-inlet', v => v.toFixed(2), val => params.inlet = val);
bindSlider('visc',  'v-visc',  v => v.toFixed(5), val => params.visc = val);
bindSlider('rpm',   'v-rpm',   v => v.toFixed(0), val => { params.rpm = val; refreshRotation(); });
bindSlider('dia',   'v-dia',   v => v.toFixed(1), val => {

bindSlider('feed',  'v-feed',  v => v.toFixed(0), val => params.feed = val);

function rebuildWorkpieceAndTool() {
  // Remove old workpiece group and tool group from scene, dispose meshes
  workpieceGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.geometry.dispose();
    }
  });
  scene.remove(workpieceGroup);

  toolGroup.traverse(obj => {
    if (obj.isMesh) {
      obj.geometry.dispose();
    }
  });
  scene.remove(toolGroup);

  // Note: rebuild logic is complex (matches initial construction).
  // For v0.4 prototype, we use a simplified approach: adjust tool scale only.
  // The groove width in the workpiece does NOT re-cut dynamically — that
  // would require CSG or full workpiece rebuild.
  // TODO for v0.5: full workpiece reconstruction.

  // For now: re-add tool group with new scale
  scene.add(toolGroup);
  const newR = scenario.toolRadiusWorld;
  toolGroup.scale.set(newR / 8, 1, newR / 8);
  toolGroup.position.set(scenario.toolCenterWorld[0], 0, scenario.toolCenterWorld[1]);

  // Re-add workpiece as-is (can't rebuild without refactoring init code)
  scene.add(workpieceGroup);
}

// Legacy name retained for compatibility
function rebuildTool() {
  const newR = scenario.toolRadiusWorld;
  toolGroup.scale.set(newR / 8, 1, newR / 8);
  toolGroup.position.set(scenario.toolCenterWorld[0], 0, scenario.toolCenterWorld[1]);
}

<script type="module">
// =============================================================================
// Chat AI Widget logic
// 注: DOM 操作は textContent / createElement のみ。innerHTML は使わない (XSS 対策)。
// =============================================================================
// 本番 Worker の URL。owner が埋めると設定 UI 不要で Anonymous tier が即動く
// (Worker 側の CHAT_LIMIT_ANON_REQ=50/day で自動レート制限)
const DEFAULT_CHAT_PROXY_URL = 'https://machining-chat.ito-atsu-mail.workers.dev';

const chatCfg = {
  // TTS の grokProxyUrl 継承は廃止。チャットは別 Worker のため独立した DEFAULT で初期化する
  proxyUrl: localStorage.getItem('chat-proxy-url') || DEFAULT_CHAT_PROXY_URL,
  inviteCode: localStorage.getItem('chat-invite-code') || '',
  byokKey: localStorage.getItem('chat-byok-key') || '',
  model: localStorage.getItem('chat-model') || 'gpt-5.4-nano',
  level: localStorage.getItem('chat-level') || 'intermediate',
  uiMode: localStorage.getItem('chat-ui-mode') || 'floating', // 'floating' | 'sidebar'
  levelAuto: localStorage.getItem('chat-level-auto') !== 'false', // true: 章から自動推定 / false: 手動固定
  // ピル常時表示用キャッシュ。送信なしでも前回の残量が見える
  lastRateLimit: (() => {
    try { return JSON.parse(localStorage.getItem('chat-rate-limit') || 'null'); }
    catch { return null; }
  })(),
};
const isMacUA = navigator.platform.toUpperCase().includes('MAC');
const modKey = isMacUA ? 'Cmd' : 'Ctrl';

const chatState = {
  history: (() => {
    try { return JSON.parse(sessionStorage.getItem('chat-history') || '[]'); }
    catch { return []; }
  })(),
  streaming: false,
  abortController: null,
};

const $ = (id) => document.getElementById(id);
const els = {
  widget: $('chat-widget'),
  fab: $('chat-fab'),
  panel: $('chat-panel'),
  closeBtn: $('chat-close-btn'),
  settingsBtn: $('chat-settings-btn'),
  clearBtn: $('chat-clear-btn'),
  modeBtn: $('chat-mode-btn'),
  messages: $('chat-messages'),
  settingsPane: $('chat-settings-pane'),
  proxyUrlInput: $('chat-proxy-url'),
  inviteCodeInput: $('chat-invite-code'),
  byokKeyInput: $('chat-byok-key'),
  settingsSave: $('chat-settings-save'),
  form: $('chat-form'),
  input: $('chat-input'),
  send: $('chat-send'),
  modelSel: $('chat-model-sel'),
  levelSel: $('chat-level-sel'),
  status: $('chat-status'),
  tierPill: $('chat-tier-pill'),
};
applyUiMode();

els.proxyUrlInput.value = chatCfg.proxyUrl;
els.inviteCodeInput.value = chatCfg.inviteCode;
els.byokKeyInput.value = chatCfg.byokKey;
els.modelSel.value = chatCfg.model;
els.levelSel.value = chatCfg.level;
updateModelDropdownState();
updateTierPill();
renderHistory();

function updateTierPill() {
  let tier = 'anonymous';
  if (chatCfg.byokKey) tier = 'byok';
  else if (chatCfg.inviteCode) tier = 'invited';
  const rl = chatCfg.lastRateLimit;
  // BYOK は無制限なので tier 名のみ。anon / invited は残量付き (直近の Worker レスポンスから)
  let label = tier;
  if (tier !== 'byok' && rl && Number.isFinite(rl.remaining) && Number.isFinite(rl.limit)) {
    label = `${tier} · ${rl.remaining}/${rl.limit}`;
  }
  els.tierPill.textContent = label;
  els.tierPill.className = 'tier-pill ' + tier;
  // ツールチップで JST リセット時刻を案内
  if (rl?.resetAt) {
    const d = new Date(rl.resetAt * 1000);
    els.tierPill.title = `今日残り ${rl.remaining}/${rl.limit}・${d.toLocaleString('ja-JP', { hour: '2-digit', minute: '2-digit' })} リセット`;
  } else {
    els.tierPill.title = '1 リクエスト送ると今日の残量が表示されます';
  }
}

function updateModelDropdownState() {
  const hasByok = !!chatCfg.byokKey;
  for (const opt of els.modelSel.options) {
    if (opt.dataset.byok === 'true') opt.disabled = !hasByok;
  }
  if (els.modelSel.selectedOptions[0]?.disabled) {
    els.modelSel.value = 'gpt-5.4-nano';
    chatCfg.model = 'gpt-5.4-nano';
    localStorage.setItem('chat-model', 'gpt-5.4-nano');
  }
}

function openPanel() {
  els.widget.classList.replace('closed', 'open');
  els.panel.hidden = false;
  els.fab.setAttribute('aria-expanded', 'true');
  // sidebar モードかつ広い画面なら body にも class 付けて main を縮める
  if (chatCfg.uiMode === 'sidebar' && window.innerWidth >= 1200) {
    document.body.classList.add('chat-sidebar-open');
  }
  // ペルソナ自動検出 (auto モード時のみ章から推定)
  maybeAutoDetectLevel();
  setTimeout(() => els.input.focus(), 50);
}
function closePanel() {
  els.widget.classList.replace('open', 'closed');
  els.panel.hidden = true;
  els.fab.setAttribute('aria-expanded', 'false');
  document.body.classList.remove('chat-sidebar-open');
  els.fab.focus();
}
function applyUiMode() {
  els.widget.classList.toggle('mode-sidebar', chatCfg.uiMode === 'sidebar');
  els.widget.classList.toggle('mode-floating', chatCfg.uiMode !== 'sidebar');
  if (els.widget.classList.contains('open') && chatCfg.uiMode === 'sidebar' && window.innerWidth >= 1200) {
    document.body.classList.add('chat-sidebar-open');
  } else {
    document.body.classList.remove('chat-sidebar-open');
  }
}
function toggleUiMode() {
  chatCfg.uiMode = (chatCfg.uiMode === 'sidebar') ? 'floating' : 'sidebar';
  localStorage.setItem('chat-ui-mode', chatCfg.uiMode);
  applyUiMode();
  showStatus(chatCfg.uiMode === 'sidebar' ? 'サイドバーモード' : 'フローティングモード', 1500);
}
els.modeBtn.addEventListener('click', toggleUiMode);

// 学習レベル自動推定 (章 ID から). 章を開いていない時 + auto モード時のみ
// a1-a3: beginner / a4-a5: intermediate / a6/c1/Part B 上位 (8-10): advanced
function maybeAutoDetectLevel() {
  if (!chatCfg.levelAuto) return;
  const ctx = currentContext();
  const id = ctx.chapterId;
  if (!id) return;
  let detected;
  if (id === 'a1' || id === 'a2' || id === 'a3' || id === '1' || id === '2') detected = 'beginner';
  else if (id === 'a4' || id === 'a5' || id === '3' || id === '4' || id === '5' || id === '6') detected = 'intermediate';
  else if (id === 'a6' || id === 'c1' || id === '7' || id === '8' || id === '9' || id === '10') detected = 'advanced';
  if (detected && detected !== chatCfg.level) {
    chatCfg.level = detected;
    els.levelSel.value = detected;
    localStorage.setItem('chat-level', detected);
  }
}
function toggleSettings() {
  els.settingsPane.hidden = !els.settingsPane.hidden;
}

els.fab.addEventListener('click', openPanel);
els.closeBtn.addEventListener('click', closePanel);
els.settingsBtn.addEventListener('click', toggleSettings);
els.panel.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

els.clearBtn.addEventListener('click', () => {
  if (chatState.streaming) return;
  if (chatState.history.length === 0) return;
  if (!confirm('会話履歴をクリアします。よろしいですか？')) return;
  chatState.history = [];
  sessionStorage.removeItem('chat-history');
  renderHistory();
});

els.settingsSave.addEventListener('click', () => {
  chatCfg.proxyUrl = els.proxyUrlInput.value.trim();
  chatCfg.inviteCode = els.inviteCodeInput.value.trim();
  chatCfg.byokKey = els.byokKeyInput.value.trim();
  localStorage.setItem('chat-proxy-url', chatCfg.proxyUrl);
  localStorage.setItem('chat-invite-code', chatCfg.inviteCode);
  localStorage.setItem('chat-byok-key', chatCfg.byokKey);
  updateModelDropdownState();
  updateTierPill();
  els.settingsPane.hidden = true;
  showStatus('保存しました', 1200);
});

els.modelSel.addEventListener('change', () => {
  chatCfg.model = els.modelSel.value;
  localStorage.setItem('chat-model', chatCfg.model);
});
els.levelSel.addEventListener('change', () => {
  chatCfg.level = els.levelSel.value;
  localStorage.setItem('chat-level', chatCfg.level);
  // ユーザーが手動で変更したら auto モードを OFF (二重制御回避)
  chatCfg.levelAuto = false;
  localStorage.setItem('chat-level-auto', 'false');
});

// === キーボードショートカット (グローバル捕捉) ===
// IME 入力中は発火させない (e.isComposing / keyCode 229 ガード)
document.addEventListener('keydown', (e) => {
  if (e.isComposing || e.keyCode === 229) return;
  const mod = isMacUA ? e.metaKey : e.ctrlKey;

  // Cmd/Ctrl + K : Chat 開閉
  if (mod && !e.shiftKey && !e.altKey && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault();
    if (els.widget.classList.contains('open')) closePanel();
    else openPanel();
    return;
  }
  // Esc : 閉じる (パネル開いている時のみ、他のモーダル干渉回避は最低限)
  if (e.key === 'Escape' && els.widget.classList.contains('open') && !chatState.streaming) {
    // チャット入力フォーカス時は閉じる、それ以外も閉じる (シンプル)
    closePanel();
    return;
  }
  // Cmd/Ctrl + Shift + L : 履歴クリア (パネル開いている時のみ)
  if (mod && e.shiftKey && (e.key === 'l' || e.key === 'L') && els.widget.classList.contains('open')) {
    e.preventDefault();
    if (chatState.history.length > 0 && confirm(prefs.lang === 'en'
      ? 'Clear conversation history?'
      : '会話履歴をクリアします。よろしいですか？')) {
      chatState.history = [];
      sessionStorage.removeItem('chat-history');
      renderHistory();
    }
    return;
  }
  // Cmd/Ctrl + Shift + M : UI モード切替 (フローティング ⇄ サイドバー)
  if (mod && e.shiftKey && (e.key === 'm' || e.key === 'M') && els.widget.classList.contains('open')) {
    e.preventDefault();
    toggleUiMode();
    return;
  }
  // Cmd/Ctrl + / : 設定パネル開閉 (パネル開いている時のみ)
  if (mod && (e.key === '/' || e.key === '?') && els.widget.classList.contains('open')) {
    e.preventDefault();
    toggleSettings();
    return;
  }
});

els.input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); els.form.requestSubmit(); }
});
els.input.addEventListener('input', () => {
  els.input.style.height = 'auto';
  els.input.style.height = Math.min(140, els.input.scrollHeight) + 'px';
});

els.form.addEventListener('submit', (e) => {
  e.preventDefault();
  if (chatState.streaming) {
    if (chatState.abortController) chatState.abortController.abort();
    return;
  }
  const text = els.input.value.trim();
  if (!text) return;
  sendMessage(text);
});

function showStatus(msg, autoHideMs) {
  els.status.textContent = msg || '';
  if (autoHideMs) setTimeout(() => { els.status.textContent = ''; }, autoHideMs);
}

// Worker レスポンスから tier/remaining/limit/resetAt を抽出して chatCfg + localStorage に保存
function persistRateLimit(res) {
  const tier = res.headers.get('X-Chat-Tier') || 'anonymous';
  const limit = parseInt(res.headers.get('X-RateLimit-Limit'), 10);
  const remaining = parseInt(res.headers.get('X-RateLimit-Remaining'), 10);
  const resetAt = parseInt(res.headers.get('X-RateLimit-Reset'), 10);
  if (!Number.isFinite(limit) || !Number.isFinite(remaining)) return;
  chatCfg.lastRateLimit = { tier, limit, remaining, resetAt: Number.isFinite(resetAt) ? resetAt : 0 };
  try { localStorage.setItem('chat-rate-limit', JSON.stringify(chatCfg.lastRateLimit)); } catch {}
}

// 429 到達時のバナー。BYOK 誘導 + 設定パネルを開く CTA 付き
function showQuotaExceeded() {
  const rl = chatCfg.lastRateLimit;
  const el = document.createElement('div');
  el.className = 'chat-msg chat-msg-system chat-error';
  const resetStr = rl?.resetAt
    ? new Date(rl.resetAt * 1000).toLocaleString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    : '明日 0:00 UTC';
  const tierLabel = rl?.tier === 'invited' ? 'Invited (100/日)' : 'Anonymous (50/日)';
  const text = document.createElement('div');
  text.textContent = `${tierLabel} の 1 日の上限に達しました。${resetStr} にリセットされます。`;
  const hint = document.createElement('div');
  hint.style.marginTop = '6px';
  const prefix = document.createTextNode('すぐ続ける場合は ');
  const btn = document.createElement('button');
  btn.className = 'link';
  btn.type = 'button';
  btn.textContent = '設定から BYOK キー登録';
  btn.addEventListener('click', () => {
    if (els.settingsPane.hidden) els.settingsPane.hidden = false;
    els.byokKeyInput.focus();
  });
  const suffix = document.createTextNode(' で無制限利用。');
  hint.append(prefix, btn, suffix);
  el.append(text, hint);
  els.messages.appendChild(el);
  scrollIfAtBottom();
}
function persistHistory() {
  try { sessionStorage.setItem('chat-history', JSON.stringify(chatState.history)); } catch {}
}

function appendMessage(msg) {
  const el = document.createElement('div');
  el.className = `chat-msg chat-msg-${msg.role}`;
  const roleSpan = document.createElement('span');
  roleSpan.className = 'role';
  roleSpan.textContent = msg.role === 'user' ? 'あなた' : msg.role === 'assistant' ? 'AI' : 'システム';
  const contentSpan = document.createElement('span');
  contentSpan.className = 'content';
  contentSpan.textContent = msg.content || '';
  el.appendChild(roleSpan);
  el.appendChild(contentSpan);
  els.messages.appendChild(el);
  scrollIfAtBottom();
  return el;
}

function scrollIfAtBottom() {
  const distance = els.messages.scrollHeight - els.messages.scrollTop - els.messages.clientHeight;
  if (distance < 80) els.messages.scrollTop = els.messages.scrollHeight;
}

function clearMessagesContainer() {
  while (els.messages.firstChild) els.messages.removeChild(els.messages.firstChild);
}

function renderHistory() {
  clearMessagesContainer();
  if (chatState.history.length === 0) { renderEmpty(); return; }
  for (const msg of chatState.history) appendMessage(msg);
}

function renderEmpty() {
  const ctx = currentContext();
  const sugg = suggestionsFor(ctx.chapterId);
  const div = document.createElement('div');
  div.className = 'chat-empty';
  const p1 = document.createElement('p');
  p1.textContent = '切削加工の質問にお答えします。';
  const p2 = document.createElement('p');
  p2.style.opacity = '0.6';
  p2.style.fontSize = '11px';
  p2.textContent = ctx.chapterId ? `現在の章: ${ctx.chapterId}` : '質問例:';
  div.appendChild(p1);
  div.appendChild(p2);
  for (const s of sugg) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'suggestion';
    btn.textContent = s;
    btn.addEventListener('click', () => sendSuggestion(s));
    div.appendChild(btn);
  }
  els.messages.appendChild(div);
}

function suggestionsFor(chapterId) {
  const map = {
    'a1': ['価電子とは何か簡単に教えて', 'なぜ金属には光沢があるの？'],
    'a2': ['なぜ Ti は熱伝導率が低いの？', '電子の海モデルって何？'],
    'a3': ['BCC と FCC の違いは？', 'なぜ Ti は HCP なの？'],
    'a4': ['転位の動きを物理的に説明して', 'すべり系の数で何が決まる？'],
    'a5': ['マルテンサイトはどう生まれる？', 'Inconel の γ\'\' とは？'],
    'a6': ['Johnson-Cook 構成式の3項目を説明', '断熱せん断帯はなぜ起きる？'],
    '3':  ['Vc と f はどう決める？', 'fz と f の違いは？'],
    '6':  ['Kc 値の意味と Kienzle 式の使い方', 'Inconel の Kc が大きい理由'],
    '7':  ['クライオ加工が Ti に効く理由', '内部給油はなぜ必要？'],
    '8':  ['Taylor 式の n を変えるには？', 'VB の限界値はどう決まる？'],
    '9':  ['理論 Ra の式を教えて', 'Ra と Rz の使い分け'],
    '10': ['なぜタービンブレードはセラミクス？', 'びびり対策の優先順位は？'],
  };
  return map[chapterId] || [
    '切削速度 Vc を上げると何が起きる？',
    'Ti が難削材なのはなぜ？',
    'Stability Lobe Diagram の見方を教えて',
  ];
}

function currentContext() {
  const h = (location.hash || '').replace(/^#/, '');
  const m = h.match(/^\/chapter\/([^/#?]+)(?:\/([^/#?]+))?/);
  return {
    chapterId: m ? decodeURIComponent(m[1]) : null,
    termId: m && m[2] ? decodeURIComponent(m[2]) : null,
  };
}

function findFallback(question, chapterId) {
  const q = question.toLowerCase();
  // 現在章の FAQ を優先
  const matches = FALLBACK_BANK.filter(entry =>
    entry.keys.every(k => q.includes(k.toLowerCase()))
  );
  if (matches.length === 0) return null;
  return matches.find(m => m.chapter === chapterId) || matches[0];
}

// 定型 assistant 応答を出す (user メッセージは呼び出し側で既に入っている前提)
function emitFallbackReply(question, reason) {
  const ctx = currentContext();
  const hit = findFallback(question, ctx.chapterId);
  const body = hit
    ? hit.answer
    : `申し訳ありません、AI バックエンドに接続できないためテンプレート外の質問にはお答えできません。\n\n代わりに:\n・左上 [ロードマップ] で関連章を開く\n・${isMacUA ? 'Cmd' : 'Ctrl'}+P で横断検索 (用語 / 本文)\n・右下 [設定] から BYOK キーを登録すると本来の AI 応答が使えます`;
  const suffix = hit?.chapter
    ? `\n\n— テンプレート応答 (AI 未接続 / ${reason})・詳細: 第${hit.chapter}章`
    : `\n\n— テンプレート応答 (AI 未接続 / ${reason})`;
  const assistantMsg = { role: 'assistant', content: body + suffix };
  chatState.history.push(assistantMsg);
  const el = appendMessage(assistantMsg);
  el.classList.add('chat-fallback');
  persistHistory();
  showStatus('フォールバック応答 (AI 未接続)', 4000);
}

// 入口 (proxyUrl 未設定時): user メッセージ + 定型応答をまとめて描画
function sendFallback(question, reason) {
  if (els.messages.querySelector('.chat-empty')) clearMessagesContainer();
  const userMsg = { role: 'user', content: question };
  chatState.history.push(userMsg);
  appendMessage(userMsg);
  els.input.value = '';
  els.input.style.height = 'auto';
  emitFallbackReply(question, reason);
}

// 二重構造 tier 1: 用意済回答を即時表示 + "AI で深掘り" ボタン。suggestion クリック経路で使う。
function sendSuggestion(question) {
  if (els.messages.querySelector('.chat-empty')) clearMessagesContainer();
  const userMsg = { role: 'user', content: question };
  chatState.history.push(userMsg);
  appendMessage(userMsg);
  els.input.value = '';
  els.input.style.height = 'auto';

  const ctx = currentContext();
  const hit = findFallback(question, ctx.chapterId);
  const body = hit
    ? hit.answer + (hit.chapter ? `\n\n関連章: 第${hit.chapter}章` : '')
    : 'このトピックの用意済回答はまだありません。下の [AI で深掘り] で AI に尋ねてください。';
  const assistantMsg = { role: 'assistant', content: body };
  chatState.history.push(assistantMsg);
  const el = appendMessage(assistantMsg);
  el.classList.add('chat-cached');

  // Tier 2 への誘導ボタン (proxy 未接続時は disabled + ヒント変更)
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'deep-dive-btn';
  btn.textContent = '▾ AI で深掘り';
  if (!chatCfg.proxyUrl) {
    btn.disabled = true;
    btn.title = 'AI 未接続 (歯車 [設定] からプロキシ URL 登録、または BYOK キー登録で有効化)';
  } else {
    btn.title = '具体的な数値・事例を交えた詳細解説を AI に依頼';
    btn.addEventListener('click', () => {
      btn.disabled = true;
      btn.textContent = '問い合わせ中...';
      // 履歴に canned 回答が残っているので、AI にはそれを前提に深掘りしてもらう。
      // 二次プロンプトは画面に出さず (skipUserBubble)、AI 応答だけが canned の下に続くようにする
      sendMessage(
        `上記の「${question}」について、数値や具体例を交えてさらに詳しく解説してください。`,
        { skipUserBubble: true }
      );
    });
  }
  el.appendChild(btn);
  persistHistory();
}

async function sendMessage(text, opts = {}) {
  if (!chatCfg.proxyUrl) {
    // Proxy 未設定 → エラー表示でなく定型応答でフォールバック (教材として最低限機能させる)
    sendFallback(text, 'proxy URL 未設定');
    return;
  }

  chatState.streaming = true;
  els.send.textContent = '停止';
  els.send.disabled = false;

  if (els.messages.querySelector('.chat-empty')) clearMessagesContainer();

  const userMsg = { role: 'user', content: text };
  chatState.history.push(userMsg);
  // opts.skipUserBubble: 深掘りボタン経由の二次プロンプトは画面に出さない (既に canned 回答の下に AI 応答が続くだけで十分)
  const userEl = opts.skipUserBubble ? null : appendMessage(userMsg);
  els.input.value = '';
  els.input.style.height = 'auto';

  const assistantMsg = { role: 'assistant', content: '' };
  chatState.history.push(assistantMsg);
  const assistantEl = appendMessage(assistantMsg);
  assistantEl.classList.add('streaming');
  const contentEl = assistantEl.querySelector('.content');

  chatState.abortController = new AbortController();
  showStatus(`送信中 (${chatCfg.model})...`);

  try {
    const ctx = currentContext();
    const headers = { 'Content-Type': 'application/json' };
    if (chatCfg.byokKey) headers['Authorization'] = `Bearer ${chatCfg.byokKey}`;
    if (chatCfg.inviteCode) headers['X-Invite-Code'] = chatCfg.inviteCode;
    const body = JSON.stringify({
      messages: chatState.history.slice(0, -1).filter(m => m.role !== 'system')
        .map(m => ({ role: m.role, content: m.content })),
      model: chatCfg.model,
      level: chatCfg.level,
      chapterId: ctx.chapterId,
      termId: ctx.termId,
    });
    const proxyUrl = chatCfg.proxyUrl.replace(/\/+$/, '');
    const res = await fetch(`${proxyUrl}/api/chat`, {
      method: 'POST', headers, body, signal: chatState.abortController.signal,
    });

    persistRateLimit(res);
    updateTierPill();
    if (chatCfg.lastRateLimit) {
      const rl = chatCfg.lastRateLimit;
      showStatus(`残り ${rl.remaining}/${rl.limit} (${rl.tier || '?'})`);
    }

    if (!res.ok) {
      // 429: 専用バナー (BYOK 誘導)。user ごと取り下げ、履歴にゴースト turn を残さない
      if (res.status === 429) {
        chatState.history.pop();  // 空 assistant
        chatState.history.pop();  // user
        assistantEl.remove();
        if (userEl) userEl.remove();
        showQuotaExceeded();
        return;
      }
      // 5xx (proxy / upstream 障害): 定型応答でフォールバック (user は画面に残す)
      if (res.status >= 500) {
        chatState.history.pop();     // 空の assistant を取り下げ (user メッセージは残す)
        assistantEl.remove();
        emitFallbackReply(text, `proxy ${res.status}`);
        return;
      }
      let errMsg = `エラー ${res.status}`;
      try {
        const err = await res.json();
        errMsg = err?.error?.message || JSON.stringify(err);
      } catch {}
      assistantMsg.content = errMsg;
      contentEl.textContent = errMsg;
      assistantEl.classList.add('chat-error');
      assistantEl.classList.remove('streaming');
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (!payload || payload === '[DONE]') continue;
        try {
          const obj = JSON.parse(payload);
          if (obj.error) {
            assistantMsg.content += `\n[stream error: ${obj.error}]`;
          } else if (obj.delta) {
            assistantMsg.content += obj.delta;
          }
          contentEl.textContent = assistantMsg.content;
          scrollIfAtBottom();
        } catch {}
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      assistantMsg.content += '\n[中断されました]';
      contentEl.textContent = assistantMsg.content;
    } else {
      // 通信エラー (fetch 失敗 / DNS / CORS 等): 定型応答でフォールバック
      chatState.history.pop();
      assistantEl.remove();
      emitFallbackReply(text, `network: ${e.message}`);
    }
  } finally {
    assistantEl.classList.remove('streaming');
    chatState.streaming = false;
    chatState.abortController = null;
    els.send.textContent = '送信';
    persistHistory();
  }
}

function showError(msg) {
  const el = appendMessage({ role: 'system', content: msg });
  el.classList.add('chat-error');
}
</script>
